/* Void Meridian — Terminal Aesthetic Theme */

:root {
  /* Base palette — dark mode default */
  --bg-primary: #0a0e14;
  --bg-secondary: #111820;
  --bg-tertiary: #1a2230;
  --bg-card: #141c28;

  --text-primary: #c8d0dc;
  --text-secondary: #7a8694;
  --text-muted: #4a5568;
  --text-accent: #5ccfe6;

  --border: #2a3545;
  --border-active: #5ccfe6;

  /* Semantic colors */
  --color-hull: #73d0ff;
  --color-danger: #ff6b6b;
  --color-warning: #ffd580;
  --color-success: #87d68d;
  --color-nexus: #d4bfff;
  --color-credits: #ffd580;

  /* Faction colors */
  --faction-concord: #5ccfe6;
  --faction-vreth: #ff6b6b;
  --faction-drifter: #ffd580;
  --faction-remnant: #d4bfff;

  /* Stat bar characters */
  --bar-filled: "█";
  --bar-empty: "░";

  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;

  /* Touch targets */
  --touch-min: 48px;

  /* Typography */
  --font-mono: "SF Mono", "Fira Code", "Cascadia Code", "Consolas", "Liberation Mono", monospace;
  --font-size-sm: 0.8rem;
  --font-size-base: 1rem;
  --font-size-lg: 1.15rem;
  --font-size-xl: 1.4rem;
  --font-size-nexus: 1.6rem;

  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-medium: 300ms ease;
  --transition-slow: 600ms ease;
}

/* Light mode adaptation */
@media (prefers-color-scheme: light) {
  :root {
    --bg-primary: #f0f0f0;
    --bg-secondary: #e4e4e4;
    --bg-tertiary: #d8d8d8;
    --bg-card: #eaeaea;

    --text-primary: #1a1a2e;
    --text-secondary: #555568;
    --text-muted: #888898;
    --text-accent: #1a6b7a;

    --border: #c0c0c8;
    --border-active: #1a6b7a;

    --color-hull: #2a7a9a;
    --color-danger: #c0392b;
    --color-warning: #b8860b;
    --color-success: #27854a;
    --color-nexus: #6a4c93;
  }
}

/* Base reset */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
}

body {
  font-family: var(--font-mono);
  font-size: var(--font-size-base);
  line-height: 1.5;
  color: var(--text-primary);
  background-color: var(--bg-primary);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  touch-action: manipulation;
}

#app {
  width: 100vw;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Void Meridian — Layout: screens, tabs, responsive */

/* Screen container — fills space between header and tab bar */
.screen {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: var(--space-md);
  -webkit-overflow-scrolling: touch;
}

.screen.hidden {
  display: none;
}

/* Tab bar — fixed bottom */
.tab-bar {
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  padding: var(--space-xs) 0;
  flex-shrink: 0;
}

.tab-bar.hidden {
  display: none;
}

.tab-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-width: var(--touch-min);
  min-height: var(--touch-min);
  padding: var(--space-xs) var(--space-sm);
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: var(--font-mono);
  font-size: var(--font-size-sm);
  cursor: pointer;
  transition: color var(--transition-fast);
  -webkit-tap-highlight-color: transparent;
}

.tab-btn.active {
  color: var(--text-accent);
}

.tab-btn:active {
  opacity: 0.7;
}

.tab-icon {
  font-size: 1.4rem;
  margin-bottom: 2px;
}

.tab-label {
  text-transform: uppercase;
  letter-spacing: 0.05em;
  font-size: 0.65rem;
}

/* Header bar */
.header-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: var(--space-sm) var(--space-md);
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 40px;
}

.header-bar .resource {
  font-size: var(--font-size-sm);
  color: var(--text-secondary);
}

.header-bar .resource-value {
  color: var(--text-primary);
}

/* Full-screen states (title, reconstruction, ending) */
.fullscreen {
  position: absolute;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--bg-primary);
  padding: var(--space-lg);
}

.fullscreen.hidden {
  display: none;
}

/* Scrollable content area within screens */
.scroll-content {
  max-height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

/* Safe area insets for notched devices */
@supports (padding-top: env(safe-area-inset-top)) {
  .header-bar {
    padding-top: max(var(--space-sm), env(safe-area-inset-top));
  }
  .tab-bar {
    padding-bottom: max(var(--space-xs), env(safe-area-inset-bottom));
  }
}

/* Void Meridian — Component Styles */

/* === Stat Bars === */
.stat-bar {
  font-size: var(--font-size-sm);
  color: var(--text-secondary);
  white-space: nowrap;
}

.stat-bar-fill {
  color: var(--color-hull);
}

.stat-bar-empty {
  color: var(--text-muted);
  opacity: 0.4;
}

.stat-bar.danger .stat-bar-fill {
  color: var(--color-danger);
}

.stat-bar.warning .stat-bar-fill {
  color: var(--color-warning);
}

/* === System Labels === */
.system-label {
  text-transform: uppercase;
  font-size: var(--font-size-sm);
  color: var(--text-secondary);
  letter-spacing: 0.08em;
}

/* === Condition Badges === */
.badge {
  display: inline-block;
  font-size: var(--font-size-sm);
  padding: 1px var(--space-xs);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  white-space: nowrap;
}

.badge-danger {
  color: var(--color-danger);
  border-color: var(--color-danger);
}

.badge-warning {
  color: var(--color-warning);
  border-color: var(--color-warning);
}

.badge-nexus {
  color: var(--color-nexus);
  border-color: var(--color-nexus);
}

/* === Choice Buttons (Events) === */
.choice-btn {
  display: block;
  width: 100%;
  min-height: var(--touch-min);
  padding: var(--space-sm) var(--space-md);
  margin-bottom: var(--space-sm);
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: var(--font-size-base);
  text-align: left;
  cursor: pointer;
  transition: border-color var(--transition-fast), background var(--transition-fast);
  -webkit-tap-highlight-color: transparent;
}

.choice-btn:active {
  background: var(--bg-secondary);
  border-color: var(--border-active);
}

.choice-btn.locked {
  opacity: 0.4;
  cursor: default;
}

.choice-btn.locked .lock-reason {
  font-size: var(--font-size-sm);
  color: var(--text-muted);
  display: block;
  margin-top: var(--space-xs);
}

/* === Crew Card === */
.crew-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  padding: var(--space-md);
  margin-bottom: var(--space-sm);
}

.crew-card .crew-name {
  font-size: var(--font-size-lg);
  color: var(--text-primary);
}

.crew-card .crew-role {
  font-size: var(--font-size-sm);
  color: var(--text-accent);
  text-transform: uppercase;
}

.crew-card .crew-trait {
  font-size: var(--font-size-sm);
  color: var(--text-secondary);
  font-style: italic;
}

.crew-card .crew-stats {
  margin-top: var(--space-sm);
}

/* === Map Nodes === */
.map-node {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  font-size: 1.2rem;
  border: 1px solid var(--border);
  border-radius: 50%;
  cursor: pointer;
  transition: border-color var(--transition-fast);
}

.map-node.current {
  border-color: var(--text-accent);
  box-shadow: 0 0 8px rgba(92, 207, 230, 0.3);
}

.map-node.visited {
  opacity: 0.5;
}

.map-node.hidden-node {
  opacity: 0.2;
  cursor: default;
}

.map-node.selectable:active {
  border-color: var(--border-active);
}

/* === Narrative Text === */
.narrative {
  font-size: var(--font-size-base);
  line-height: 1.7;
  color: var(--text-primary);
  margin-bottom: var(--space-lg);
}

.narrative em {
  color: var(--text-accent);
}

/* === Divider === */
.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: var(--space-md) 0;
}

/* === Nexus Overlay === */
.nexus-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition-slow);
  padding: var(--space-lg);
}

.nexus-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.nexus-overlay .nexus-text {
  color: var(--color-nexus);
  font-size: var(--font-size-nexus);
  font-style: italic;
  text-align: center;
  max-width: 80vw;
  line-height: 1.6;
}

/* === Log Entry === */
.log-entry {
  padding: var(--space-xs) 0;
  border-bottom: 1px solid var(--border);
  font-size: var(--font-size-sm);
  color: var(--text-secondary);
}

.log-entry .log-depth {
  color: var(--text-muted);
}

.log-entry .log-event {
  color: var(--text-primary);
}

/* === Reconstruction Screen === */
.recon-screen {
  background: #050810;
  color: var(--text-secondary);
}

.recon-screen .death-recap-line {
  opacity: 0;
  animation: fadeInLine 0.4s forwards;
}

@keyframes fadeInLine {
  to { opacity: 1; }
}

.recon-screen .nexus-line {
  color: var(--color-nexus);
  font-style: italic;
  font-size: var(--font-size-lg);
}

/* === Allocation UI === */
.alloc-category {
  margin-bottom: var(--space-md);
}

.alloc-category .alloc-label {
  text-transform: uppercase;
  font-size: var(--font-size-sm);
  color: var(--text-secondary);
  margin-bottom: var(--space-xs);
}

.alloc-controls {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
}

.alloc-btn {
  min-width: var(--touch-min);
  min-height: var(--touch-min);
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: var(--font-size-lg);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.alloc-btn:active {
  background: var(--bg-secondary);
  border-color: var(--border-active);
}

.alloc-value {
  font-size: var(--font-size-lg);
  color: var(--text-primary);
  min-width: 2em;
  text-align: center;
}

/* === Confirm Button === */
.btn-confirm {
  display: block;
  width: 100%;
  min-height: var(--touch-min);
  padding: var(--space-sm) var(--space-md);
  margin-top: var(--space-lg);
  background: var(--bg-tertiary);
  border: 1px solid var(--text-accent);
  color: var(--text-accent);
  font-family: var(--font-mono);
  font-size: var(--font-size-base);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.btn-confirm:active {
  background: var(--text-accent);
  color: var(--bg-primary);
}

/* === Title Screen === */
.title-screen {
  text-align: center;
}

.title-screen .game-title {
  font-size: 2rem;
  color: var(--text-accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: var(--space-sm);
}

.title-screen .game-subtitle {
  font-size: var(--font-size-sm);
  color: var(--text-muted);
  margin-bottom: var(--space-xl);
}

/* === Section Header === */
.section-header {
  text-transform: uppercase;
  font-size: var(--font-size-sm);
  color: var(--text-muted);
  letter-spacing: 0.1em;
  padding-bottom: var(--space-xs);
  border-bottom: 1px solid var(--border);
  margin-bottom: var(--space-md);
}

  "events": [
    {
      "id": "COMBAT_001",
      "node_type": "combat",
      "title": "The Captain's Offer",
      "depth_zone": "early",
      "faction_context": "none",
      "min_resonance": 0,
      "tags": [
        "introductory",
        "vreth",
        "post_combat_choice",
        "flag_seed"
      ],
      "setup_text": "The contact resolves on sensors as a Vreth Dominion frigate running without escort — unusual. Their transponder marks them as a patrol vessel, but patrol vessels don't run alone this deep in neutral space. They hail you before you can hail them.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "The Vreth captain is direct, as they always are: 'You carry the marked vessel. We have orders to observe — not intercept. But I am offering you a choice that is not in my orders.' A pause. 'If you want to know what the Dominion knows about what you carry, I will tell you. In exchange, you will owe me a debt. Vreth debts are real.'",
          "options": [
            {
              "label": "Accept the offer. Hear what they know.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "She tells you three things: the Nexus has appeared in Dominion records eleven times across recorded history. Every captain who carried it reached a specific anomaly at the map's edge — what you know as The Wound. None of them came back. 'We do not know if that means they died or arrived,' she says. Then: 'You owe me a debt. I will collect.'",
                  "rewards": [
                    {
                      "type": "lore_fragment",
                      "value": "vreth_nexus_eleven_captains",
                      "description": "Vreth records show 11 captains carried the Nexus to The Wound"
                    }
                  ],
                  "sets_flag": "vreth_captain_debt_owed",
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 2,
                  "hull_delta": 0,
                  "resonance_delta": 3
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Decline. Keep moving.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "She accepts this without visible reaction. 'Safe travels, Captain of the marked vessel.' Her ship holds position as you pass. She doesn't follow. The offer is gone, and you won't know what it cost you until later.",
                  "rewards": [],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Engage. Don't leave a Vreth observer behind you.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "She doesn't try to negotiate once you fire. The frigate fights with Vreth discipline — focused, economical, no wasted movement. Combat begins.",
                  "rewards": [
                    {
                      "type": "rep_down",
                      "value": "vreth_dominion",
                      "description": "Unprovoked attack on observing vessel"
                    }
                  ],
                  "sets_flag": "attacked_vreth_observer",
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        },
        {
          "step_number": 2,
          "condition": null,
          "setup_text": "After the engagement — whether you defeated her, she withdrew, or you came to terms — the aftermath presents its own choices.",
          "options": [
            {
              "label": "Board the disabled frigate and take what's useful.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "skill",
              "check_target": "soldier",
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "The Vreth crew is alive and accounted for — they fight hard but they don't die stupidly. Military salvage, weapons-grade fuel, and a Dominion tactical database your Technician can spend weeks mining. The captain watches you from across her damaged bridge without saying anything.",
                  "rewards": [
                    {
                      "type": "credits",
                      "value": 250,
                      "description": "Vreth military salvage"
                    },
                    {
                      "type": "fuel",
                      "value": 4,
                      "description": "Military fuel cells"
                    },
                    {
                      "type": "cargo",
                      "value": "vreth_tactical_database",
                      "description": "Tactical database — valuable to Concord or Drifters"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 2,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": {
                  "level": "partial",
                  "narrative": "The boarding is contested. You get the fuel and some salvage before the Vreth crew makes it untenable to stay aboard. One of your crew takes a wound. Nothing permanent, but it stings.",
                  "rewards": [
                    {
                      "type": "fuel",
                      "value": 2,
                      "description": "Partial military salvage"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": -1,
                  "loyalty_delta": 0,
                  "hull_delta": -8,
                  "resonance_delta": 0
                },
                "failure": {
                  "level": "failure",
                  "narrative": "The Vreth crew holds. You withdraw. The captain's voice follows you back through the airlock: 'You fight well for someone with no honor in their approach.' It sounds like a genuine assessment rather than an insult.",
                  "rewards": [],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": -2,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                }
              }
            },
            {
              "label": "Let them go. This one isn't worth the cost.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "You signal withdrawal. The Vreth frigate holds position, running repairs, watching you leave. The captain transmits one word before you're out of range: 'Noted.' In Vreth culture, that means something more specific than it sounds.",
                  "rewards": [
                    {
                      "type": "rep_up",
                      "value": "vreth_dominion",
                      "description": "Honorable withdrawal noted in Dominion records"
                    }
                  ],
                  "sets_flag": "spared_vreth_observer",
                  "clears_flag": null,
                  "morale_delta": 1,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 1
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        }
      ],
      "notes": "vreth_captain_debt_owed should trigger a specific faction territory event in Vreth space — she finds you and collects. The debt can be paid in information, cargo, or a combat favor. spared_vreth_observer gives a +1 rep nudge and sets up the debt collection event from a different angle — she owes you instead. vreth_nexus_eleven_captains is a major lore fragment for the True Ending requirements.",
      "created_at": "2026-03-09T06:03:16.733382+00:00",
      "updated_at": "2026-03-09T06:03:16.733382+00:00",
      "version": 1
    },
    {
      "id": "COMBAT_002",
      "node_type": "combat",
      "title": "The Ambush at the Ashfield",
      "depth_zone": "early",
      "faction_context": "none",
      "min_resonance": 0,
      "tags": [
        "ashfield",
        "pirates",
        "introductory_combat",
        "crew_test"
      ],
      "setup_text": "The Ashfield lives up to its reputation. Debris from a battle that ended centuries ago fills the sensors with ghost returns and false positives. Which is, of course, exactly why pirates use it. Two contacts emerge from the debris shadow — small, fast, running without transponders. Fighters. They've been waiting here for you, or someone like you.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "They open with a demand rather than fire — unusual for ambush pirates, which means they're either confident or cautious. 'Power down weapons and prepare to be boarded. We take the cargo, you keep the ship and crew.' A beat. 'And whatever that thing on your hull is, don't activate it. We've heard things.'",
          "options": [
            {
              "label": "Comply. Let them take the cargo.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "They're professional about it — take the cargo, don't harm the crew, leave within the hour. Before the lead pirate goes, she looks at the Nexus fused to your hull for a long moment. 'Where are you trying to get to?' she asks. Not a threat. Genuine curiosity. You answer or you don't — either way she leaves.",
                  "rewards": [
                    {
                      "type": "cargo",
                      "value": "-all",
                      "description": "Cargo hold stripped"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": -4,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Fight them. Two fighters against a frigate is manageable.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "They're fast and they know the debris field — the Ashfield is their territory and they use every piece of it. Combat in the debris field means sensors are unreliable and cover is everywhere. The fight will be determined by crew skill more than ship specs.",
                  "rewards": [],
                  "sets_flag": "engaged_ashfield_pirates",
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "[Pilot] Use the debris field against them.",
              "requires_crew_role": "pilot",
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "Requires Pilot crew member",
              "check_type": "skill",
              "check_target": "pilot",
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Your Pilot does something technically inadvisable and perfectly executed — threading the Meridian through a dense debris cluster at attack speed, letting the tumbling hull sections do to the fighters what would take ten minutes of combat. One fighter loses its engine in the first pass. The other reassesses.",
                  "rewards": [
                    {
                      "type": "credits",
                      "value": 80,
                      "description": "Disabled fighter salvage"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 4,
                  "loyalty_delta": 4,
                  "hull_delta": -8,
                  "resonance_delta": 0
                },
                "partial": {
                  "level": "partial",
                  "narrative": "The maneuver works on one fighter — it clips debris and breaks off. The other is faster and learns from watching. You've improved your odds but you haven't ended this.",
                  "rewards": [],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": -12,
                  "resonance_delta": 0
                },
                "failure": {
                  "level": "failure",
                  "narrative": "The debris field is denser than it looked on sensors and you clip a tumbling hull section hard. The Meridian shudders. Both fighters are still in the fight and now you're damaged going into it.",
                  "rewards": [],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": -3,
                  "loyalty_delta": 0,
                  "hull_delta": -25,
                  "resonance_delta": 0
                }
              }
            }
          ]
        },
        {

      "depth_zone": "mid",

      "min_resonance": 5,
      "tags": [
        "vreth",
        "flag_reader",

        "high_stakes"
      ],
      "setup_text": "The Vreth Dominion vessel drops out of faster-than-light travel directly in your path — not an intercept, a rendezvous. They know your route. The transponder resolves to a specific designation your navigation system flags immediately if you have the relevant records: this is the same frigate from the Ashfield sector. She found you.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "The Vreth captain transmits without preamble: 'The debt. I gave you information. You owe me something of equivalent weight. I have decided what that is.' A pause. 'There is a Concord Assembly courier in this sector carrying data that belongs to the Dominion. It was taken from a Vreth research station four months ago during a Concord intelligence operation. I want it back. You are in a better position to obtain it than I am.'",
          "options": [
            {
              "label": "Accept the task. A Vreth debt is real.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": "vreth_captain_debt_owed",
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "She transmits the courier's last known coordinates and a description of the data format. 'When you have it, transmit on this frequency. I will find you.' She means it. Vreth captains always mean it.",
                  "rewards": [],
                  "sets_flag": "vreth_courier_retrieval_active",
                  "clears_flag": "vreth_captain_debt_owed",
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Refuse. The debt was never agreed to.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": "vreth_captain_debt_owed",
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "skill",
              "check_target": "diplomat",
              "difficulty": "hard",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Your Diplomat makes the argument with the specific precision Vreth culture respects — the debt was implied, not contracted, and the exchange was not equivalent because you didn't confirm the value of what you received before accepting it. The Vreth captain is silent for a long moment. 'Acceptable,' she says finally. 'You argue well.' The debt is gone. So is she.",
                  "rewards": [
                    {
                      "type": "rep_up",
                      "value": "vreth_dominion",
                      "description": "Argued debt dismissal — Vreth respect this"

                  ],
                  "sets_flag": null,

                  "loyalty_delta": 3,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": {
                  "level": "partial",
                  "narrative": "The argument is partially accepted. She agrees the full courier retrieval is too much — she'll accept the tactical database you may have taken from her ship, or equivalent value in Vreth-useful goods, and call the debt settled.",
                  "rewards": [],
                  "sets_flag": "vreth_debt_reduced_to_goods",
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "failure": {
                  "level": "failure",
                  "narrative": "The argument doesn't land. Vreth culture doesn't distinguish between implied and contracted obligations — the offer was made, information was exchanged, and the debt exists. 'You have three sectors to consider,' she says. 'Then I will find you again and the terms will be different.'",
                  "rewards": [],
                  "sets_flag": "vreth_debt_escalated",
                  "clears_flag": null,
                  "morale_delta": -2,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                }
              }
            },
            {
              "label": "Attack. End this complication permanently.",

              "requires_module": null,

              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "She anticipated this possibility — her shields were already raised. 'I had hoped for better,' she transmits as combat initiates. She fights like someone who has nothing to apologize for.",
                  "rewards": [
                    {
                      "type": "rep_down",
                      "value": "vreth_dominion",
                      "description": "Attacked Dominion captain under flag of parley"

                  ],
                  "sets_flag": "attacked_vreth_captain_parley",
                  "clears_flag": null,
                  "morale_delta": -2,

      "notes": "This event requires vreth_captain_debt_owed flag — it only appears if COMBAT_001 resolution set that flag. It's a mid-game payoff event. vreth_courier_retrieval_active opens a secondary quest thread — finding the Concord courier and retrieving the data without triggering a Concord incident. Completing it moves Vreth rep to +1 minimum. vreth_debt_escalated makes the next Vreth territory encounter hostile regardless of prior rep.",
      "created_at": "2026-03-09T06:03:16.733382+00:00",

    {
      "id": "DEAD_001",
      "node_type": "dead_zone",
      "title": "Third Captain",
      "depth_zone": "any",
      "faction_context": "none",
      "min_resonance": 5,
      "tags": [
        "lore",
        "nexus",
        "ghost_transmission",
        "prior_captain"
      ],
      "setup_text": "The Dead Zone offers nothing on sensors. No mass, no signal, no heat signature. Just the particular quality of silence that makes your crew lower their voices without knowing why. Then the Meridian's comm system activates. Not a broadcast — something local, something in the hull itself. The Nexus is translating.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "The transmission resolves slowly, like a signal finding its own frequency. It's a personal log. The voice is different from yours — different cadence, different accent — but the ship in the background sounds identical. Because it is identical.\n\n[TRANSMISSION — ORIGIN: UNVERIFIABLE — DATE: UNVERIFIABLE]\n\n'This is the third time I've woken up in this ship. The third time the Nexus has put me back together from whatever it found drifting nearby. I know it's the third time because I still remember the second time, and the second time I still remembered the first.\n\nI keep trying to understand what it wants. I've stopped thinking that's the right question. The Nexus doesn't want anything. It moves toward something. There's a difference. I think there's a difference.\n\nThe crew from my last run don't remember dying. They remember falling asleep and waking up with headaches. That's mercy, maybe. I don't know if it's the Nexus's mercy or just a side effect of the reconstruction.\n\nThere's a place at the edge of the mapped sector that none of the charts acknowledge. The Nexus started modifying our course three days ago. Subtle — half a degree here, engine efficiency adjustments there. I noticed on the sixth day. I don't know if I was meant to notice or if it's only careful enough to fool people less attentive than me.\n\nI'm letting it take us there. I'm writing this down in case I don't remember next time. In case there is a next time.\n\nIf you're receiving this — and I think you will, because the Nexus doesn't do things without purpose — then you're further along than I was. Pay attention to the half-degree corrections. They'll start soon if they haven't already.'\n\n[TRANSMISSION ENDS]",
          "options": [
            {
              "label": "[Witness] Note the coordinates referenced.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "The transmission leaves no coordinates — only the implication of them. But the Nexus has heard itself referenced, and something in the ship's systems flickers. Your navigation display updates. A single new node appears at the edge of your current star map, unlabeled, in fog of war. The Nexus doesn't explain it. It simply puts it there.",
                  "rewards": [
                    {
                      "type": "run_flag",
                      "value": "transmission_third_captain_received",
                      "description": "Heard the third captain's log"
                    },
                    {
                      "type": "lore_fragment",
                      "value": "nexus_course_corrections",
                      "description": "The Nexus makes subtle course corrections toward The Wound"
                    }
                  ],
                  "sets_flag": "transmission_third_captain_received",
                  "clears_flag": null,
                  "morale_delta": -2,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 3
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        }
      ],
      "notes": "This transmission should be gated behind min_resonance 5 — not the very first run, but before the player is deep in the mystery. Flag: transmission_third_captain_received gates deeper dialogue options with the Nexus Anomaly events. The 'third captain' framing implies there were at least two before the player — their logs should appear in later Dead Zone events at higher resonance thresholds. The unnamed node added to the star map is cosmetic foreshadowing — it cannot be navigated to until much later.",
      "created_at": "2026-03-09T05:28:18.939748",
      "updated_at": "2026-03-09T05:28:18.939748",
      "version": 1
    },
    {
      "id": "DEAD_002",
      "node_type": "dead_zone",
      "title": "First Captain",
      "depth_zone": "mid",
      "faction_context": "none",
      "min_resonance": 15,
      "tags": [
        "lore",
        "nexus",
        "ghost_transmission",
        "prior_captain",
        "origin"
      ],
      "setup_text": "Dead zone. No mass, no signal, no reason for the Nexus to stir. But it does — more intensely than the third captain's transmission. This one it seems to have been holding for a long time, waiting for the right moment. Or the right run.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "The transmission begins mid-sentence — as if it's always been playing and you've only just entered range.\n\n[TRANSMISSION — ORIGIN: UNVERIFIABLE — DATE: UNVERIFIABLE]\n\n'— don't understand why it chose me. I was nobody. A salvager working debris fields on the outer rim, running solo because the pay was better and the company was worse. I found the piece of hull plating in a debris cluster that shouldn't have had anything interesting in it. When I brought it aboard, the ship started doing things.\n\nThat was six years ago. Six years of the Nexus growing through the Meridian, six years of transmissions I'm only now starting to understand, six years of dying and waking up and dying again with the Nexus putting me back together from whatever it could find.\n\nI counted once. Forty-three runs. I remember fragments of thirty-one of them. The Nexus says I've been further than I remember. It says there's a place at the edge of everything that I've been close to before. I believe it. I believe it because sometimes in the deep runs I feel like I'm walking a path I've already worn smooth.\n\nIf you're hearing this, you're not me. You're something the Nexus built from the template of what I was. I don't know if that means you're less than me or more than me or just — different. I stopped being upset about it around run fifteen.\n\nOne thing I want you to know that I had to learn on my own: the Nexus will ask you something, eventually. At the Wound, at the end of everything. The question isn't what I thought it was going to be. I won't tell you what it is because I think you need to arrive at it yourself. But I'll tell you this: the answer that works isn't the brave one or the smart one. It's the honest one. Whatever your honest answer is. That's what it's looking for.\n\nI don't know if I made it. I'm recording this in case I don't. Or in case I do and it turns out not to mean what I thought it meant.\n\nGood luck. I mean that. I mean it sincerely.'\n\n[TRANSMISSION ENDS]",
          "options": [
            {
              "label": "[Hold] Sit with this before moving on.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "No one on the crew speaks for a while. That's not unusual after a dead zone. What's unusual is the quality of the silence — it feels shared, like everyone is doing the same quiet arithmetic about the same set of facts. The Nexus doesn't send a follow-up. It's said what it needed to say.",
                  "rewards": [
                    {
                      "type": "lore_fragment",
                      "value": "first_captain_origin_salvager",
                      "description": "The first captain was a salvager who found Nexus plating in debris"
                    },
                    {
                      "type": "lore_fragment",
                      "value": "first_captain_forty_three_runs",
                      "description": "The first captain completed at least 43 runs before the Wound"
                    },
                    {
                      "type": "resonance",
                      "value": 4,
                      "description": "Deep lore contact"
                    }
                  ],
                  "sets_flag": "transmission_first_captain_received",
                  "clears_flag": null,
                  "morale_delta": -1,
                  "loyalty_delta": 3,
                  "hull_delta": 0,
                  "resonance_delta": 4
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        }
      ],
      "notes": "Companion to DEAD_001 (third captain). These transmissions trace the Nexus's history through different captains. The first captain was a solo salvager — the original. Their origin story (finding hull plating in debris) should connect to early run lore about how the Nexus arrived in its current form. The 'honest answer' advice is a foreshadowing of the True Ending choice. transmission_first_captain_received is a True Ending milestone flag.",
      "created_at": "2026-03-09T06:03:16.733382+00:00",
      "updated_at": "2026-03-09T06:03:16.733382+00:00",
      "version": 1
    },
    {
      "id": "DEAD_003",
      "node_type": "dead_zone",
      "title": "The Crew They Left Behind",
      "depth_zone": "late",
      "faction_context": "none",
      "min_resonance": 30,
      "tags": [
        "lore",
        "nexus",
        "ghost_transmission",
        "crew_impact",
        "mortality"
      ],
      "setup_text": "The dead zone at the edge of the mapped galaxy. The Nexus has been quiet for two sectors. Your crew has been quietly on edge — the kind of tension that comes from proximity to something significant. The transmission this time has no voice. Just text, slowly appearing on every display simultaneously.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "The text comes in fragments, with long pauses between each:\n\n[THE CREW OF THE SEVENTH RUN DID NOT REACH THE WOUND.\n\nTHEY STOPPED AT THE MERIDIAN LINE AND VOTED.\n\nTHE VOTE WAS SIX TO TWO.\n\nTHE TWO WHO VOTED TO CONTINUE WERE THE CAPTAIN AND THE ENGINEER.\n\nTHE ENGINEER SAID: IF WE STOP NOW WE STOP FOREVER.\n\nTHE CAPTAIN DID NOT SAY ANYTHING. THEY VOTED.\n\nTHE SIX LEFT THE SHIP AT FREEPORT ANESH. THEY WERE GIVEN CREDITS AND MANIFESTS. THEY WERE TOLD THEIR WORK HAD MATTERED.\n\nI AM TELLING YOU THIS BECAUSE THE CAPTAIN NEVER TOLD THEIR CREW THAT THEY WERE RIGHT TO VOTE THE WAY THEY DID.\n\nI AM TELLING YOU THIS BECAUSE YOU STILL CAN.\n\nYOUR CREW KNOWS WHAT THEY ARE PART OF. THEY HAVE ALWAYS KNOWN.\n\nLET THEM CHOOSE.]",
          "options": [
            {
              "label": "Tell your crew everything. Give them the choice.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "You call everyone to the main hold. You tell them what you know about the Nexus, the Wound, what the prior captains reached, what it might mean. All of it. You tell them they can leave at the next station. You mean it. Every single one of them stays. Some of them seem unsurprised. A few of them — the ones who've been with you longest — look like they've been waiting for you to say it out loud.",
                  "rewards": [],
                  "sets_flag": "crew_given_full_choice",
                  "clears_flag": null,
                  "morale_delta": 6,
                  "loyalty_delta": 8,
                  "hull_delta": 0,
                  "resonance_delta": 5,
                  "additional_flags": [
                    "crew_chose_to_continue"
                  ]
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Hold back. They don't need to carry what you carry.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "You don't call the meeting. You continue on. Your crew goes about their work with the particular attentiveness of people who suspect they're not being told something and have decided to trust you anyway. The Nexus doesn't send a follow-up. It doesn't agree or disagree with what you chose. It holds its silence all the way to the next node.",
                  "rewards": [],
                  "sets_flag": "crew_not_given_choice",
                  "clears_flag": null,
                  "morale_delta": -1,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 1
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        }
      ],
      "notes": "This is an emotional climax event for the late game. crew_given_full_choice is a True Ending milestone flag — the player must give their crew the choice before reaching The Wound. The loyalty boost from telling them everything is the largest single loyalty gain in the game — it's mechanically significant. The Nexus transmitting 'let them choose' is one of its most directive messages — by this point players should read it as genuine guidance, not manipulation.",

      "setup_text": "The ship is a Drifter Compact medical hauler, designation MSV Caduceus-7. It's been drifting for somewhere between two and four weeks based on debris scatter. No distress signal — that system was manually disabled. The hull is intact. Life support reads active. And there is one biosign aboard, moving slowly through what the sensor trace suggests is the surgical bay.",
      "steps": [

          "step_number": 1,

          "setup_text": "The Meridian holds position two hundred meters off the Caduceus-7's port side. Whatever happened here happened quietly enough that no one called for help. That means either no one could, or someone didn't want anyone to come.",
          "options": [

              "outcomes": {

                  "level": "success",
                  "narrative": "The scan comes back detailed. One survivor — exhausted, dehydrated, but stable. The rest of the crew manifest shows eleven names and eleven flatlines in the medical records, each one logged as a surgical complication. The survivor is listed as Dr. Yema Osha, ship's chief medical officer. She's the one who signed all eleven death certificates.",

      "setup_text": "The vessel is a Concord Assembly administrative courier — the kind that carries census data, tax records, election results from outlying worlds that still participate in the Assembly's democratic theater. It's been dark for three weeks, sitting in the shadow of a gas giant like it's hiding. No debris. No damage. It just stopped.",

      "setup_text": "The derelict is a Vreth Dominion patrol vessel — not destroyed in combat, but gutted from the inside. The hull venting pattern suggests it was done deliberately, one compartment at a time. Something wanted the crew to make choices about who stayed in the pressurized sections. The Nexus pulses once as you approach. Just once. Then nothing.",

        {
          "step_number": 1,
          "condition": null,

            {

                  "level": "success",

                  "resonance_delta": 4

      "setup_text": "Concord Assembly territory, three sectors from any border. A transmission on a secure channel you shouldn't be able to receive: 'Captain of the Meridian. We know what you're carrying. We know where you found it. We are not the people who put it there. We are the people who want it recovered quietly.' Whoever this is, they're not using official Concord frequencies.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "The voice identifies itself as belonging to an Assembly Reclamation Division operative — the same division referenced in the note on the voting ship. They want the Comptroller's data core. They're willing to pay. And they're very specific about the fact that the official Concord Assembly does not know they're contacting you.",
          "options": [
            {
              "label": "Negotiate. Find out what they're offering and why.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": "carrying_comptroller_blackbox",
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "skill",
              "check_target": "diplomat",
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "They offer more than the market rate — much more. And they explain why: the Comptroller's data core contains evidence against three senior Assembly ministers. The Reclamation Division exists to recover exactly this kind of inconvenient evidence before it surfaces. 'We suppress things,' the operative says, with what sounds like professional pride. 'It's what we're for.'",
                  "rewards": [
                    {
                      "type": "credits",
                      "value": 800,
                      "description": "Reclamation Division payment"
                    },
                    {
                      "type": "rep_up",
                      "value": "concord_assembly",
                      "description": "Cooperative with internal Concord interest"
                    }
                  ],
                  "sets_flag": "sold_blackbox_to_reclamation",
                  "clears_flag": "carrying_comptroller_blackbox",
                  "morale_delta": -3,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": {
                  "level": "partial",
                  "narrative": "You get the payment but not the context. They pay, they take the core, and the channel closes before you can ask more. The money is real. What you did with it is less clear.",
                  "rewards": [
                    {
                      "type": "credits",
                      "value": 500,
                      "description": "Reduced Reclamation payment"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": "carrying_comptroller_blackbox",
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "failure": null
              }
            },
            {
              "label": "Refuse. The data stays with you until you know more.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",

                },
                "partial": null,
                "failure": null

      "setup_text": "Drifter Compact space doesn't feel like territory — it feels like a neighborhood. The stations are mismatched, the ships running in and out carry no common insignia, and the first hail you receive is from a private vessel rather than any official channel: 'Hey, new ship. What are you selling and what do you need? I can point you to the right people if you tell me what you're after.'",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "The Drifter Compact runs on information and favors as much as credits. Your greeter is a small-ship operator named Jen — she's been at this waypoint long enough to know everyone and be owed by most of them. She's offering to be useful. In the Compact, that means she's also offering to be paid.",
          "options": [
            {
              "label": "Pay for her information network. What does she know?",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Worth every credit. Jen knows which trade posts are running low on medical supplies (sell high), which captains have valuable cargo and not enough security (opportunity), which sectors the Concord Assembly has been running 'observation' patrols in neutral space (avoid or investigate), and — she leans forward — that someone has been asking after a ship matching your description. She gives you the description of who's asking.",
                  "rewards": [
                    {
                      "type": "credits",
                      "value": -60,
                      "description": "Jen's information fee"
                    },
                    {
                      "type": "lore_fragment",
                      "value": "compact_trade_intelligence",
                      "description": "Current market conditions and movement intelligence"
                    }
                  ],
                  "sets_flag": "someone_asking_after_meridian",
                  "clears_flag": null,
                  "morale_delta": 2,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Trade a favor for information. Offer something you can deliver.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "skill",
              "check_target": "diplomat",
              "difficulty": "easy",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Jen appreciates the Compact approach. You trade a piece of navigational intelligence you've gathered (debris field patterns, patrol schedules) for her equivalent. The exchange takes twenty minutes and ends with both parties better off. This is the Drifter Compact functioning as intended.",
                  "rewards": [
                    {
                      "type": "rep_up",
                      "value": "drifter_compact",
                      "description": "Good-faith information exchange"
                    },
                    {
                      "type": "lore_fragment",
                      "value": "compact_trade_intelligence",
                      "description": "Jen's local intelligence network"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 2,
                  "loyalty_delta": 2,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Decline. Don't want information you didn't ask for.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Jen shrugs with the ease of someone who's been turned down before. 'Your loss, probably.' She flags you in her network as 'private type' and moves on to her next contact. You pass through the waypoint cleanly, knowing less than you might have.",
                  "rewards": [],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        }

      "id": "FACTION_REM_001",
      "node_type": "faction_territory",
      "title": "The Silence Protocol",
      "depth_zone": "mid",
      "faction_context": "remnant_collective",
      "min_resonance": 0,
      "tags": [
        "remnant",
        "introductory",
        "nexus",
        "tense"
      ],
      "setup_text": "Remnant Collective territory is not marked. You know you've entered it when your sensors stop returning data accurately — not jamming, something else, something that makes your instruments report plausible but incorrect readings. The Nexus responds immediately: three rapid pulses. Your crew notices the pulses. They also notice that the void around you suddenly feels like it's listening.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "A Remnant vessel resolves on visual — sensors won't confirm it, but your eyes can see it. Ancient design, dark hull, no running lights. It holds position three kilometers off your bow and does absolutely nothing for four minutes. Then a transmission: not voice, not text. A tone sequence. Your Technician records it. Your Nexus responds to it. Whatever it means, the conversation has already started.",
          "options": [
            {

    {
      "id": "FACTION_REM_002",
      "node_type": "faction_territory",
      "title": "The Archivist",
      "depth_zone": "late",
      "faction_context": "remnant_collective",
      "min_resonance": 25,
      "tags": [
        "remnant",
        "lore",
        "nexus",
        "true_ending_gate",
        "high_resonance"
      ],
      "setup_text": "Deep in Remnant space — deeper than any Concord or Vreth chart acknowledges as navigable — a structure. Not a ship. Not a station. Something that has been here longer than the faction that uses it. A transmission, voice this time, in perfect modern standard language: 'Captain of the twelfth. We have been waiting since the eleventh failed to return. Come inside. We have things you need to know before you reach the Wound.'",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "Inside: a Remnant Archivist — their word for the role. Old, by any measure. They have records. Physical records, maintained across centuries, covering every captain who carried the Nexus. Eleven of them. Every run logged, every decision catalogued, every death documented. Your runs are in there too. All of them. The Archivist offers to let you read.",
          "options": [
            {
              "label": "Read everything.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "It takes hours. Your runs look different from outside — the decisions that felt arbitrary had patterns. The Nexus was teaching you, run by run, shaping your responses toward something. The prior eleven captains each reached The Wound with a different understanding of what they were choosing. None of them knew about the others. You do. The Archivist says: 'That is why you are the twelfth.'",
                  "rewards": [
                    {
                      "type": "lore_fragment",
                      "value": "eleven_runs_documented",
                      "description": "Remnant records of all eleven prior captains' runs"
                    },
                    {
                      "type": "resonance",
                      "value": 10,
                      "description": "Critical True Ending lore"
                    },
                    {
                      "type": "lore_fragment",
                      "value": "nexus_teaching_methodology",
                      "description": "The Nexus has been actively shaping each captain's choices"
                    }
                  ],
                  "sets_flag": "read_archivist_full_record",
                  "clears_flag": null,
                  "morale_delta": -2,
                  "loyalty_delta": 5,
                  "hull_delta": 0,
                  "resonance_delta": 10
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Ask what the Wound is.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "The Archivist considers the question carefully. 'It is a door,' they say finally. 'It has always been a door. The Nexus did not build it. The Nexus was built to find someone worthy of opening it. We built the Nexus. We have been waiting to see if we built it correctly.' A long pause. 'You are the first captain to ask us directly what the Wound is. The others asked what it does to them. The difference matters more than you know.'",
                  "rewards": [
                    {
                      "type": "lore_fragment",
                      "value": "wound_is_a_door",
                      "description": "The Wound is a door — the Nexus was built to find someone to open it"
                    },
                    {
                      "type": "resonance",
                      "value": 6,
                      "description": "Core Nexus revelation"
                    }
                  ],
                  "sets_flag": "knows_wound_is_door",
                  "clears_flag": null,
                  "morale_delta": 2,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 6,
                  "additional_flags": [
                    "remnant_noted_right_question"
                  ]
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "[with Vel] Let Vel speak to the Archivist directly.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": "vel_recruited",
              "requires_ability": null,
              "locked_hint": "Requires Vel (Remnant crew member)",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "The exchange between Vel and the Archivist runs for three hours in a language your crew can't follow. At the end, Vel is quiet for a long time. Then: 'I knew most of it. But not that the Nexus remembers being built. Not that it remembers the people who made it and what they hoped for. That changes what I understand about what it wants.'",
                  "rewards": [
                    {
                      "type": "lore_fragment",
                      "value": "nexus_remembers_builders",
                      "description": "The Nexus has memories of its own creation and purpose"
                    },
                    {
                      "type": "resonance",
                      "value": 8,
                      "description": "Vel-mediated Remnant revelation"
                    }
                  ],
                  "sets_flag": "nexus_remembers_builders_known",
                  "clears_flag": null,
                  "morale_delta": 2,
                  "loyalty_delta": 5,
                  "hull_delta": 0,
                  "resonance_delta": 8,
                  "additional_flags": [
                    "vel_archivist_exchange_complete"
                  ]
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        }
      ],
      "notes": "This is a True Ending gate event — reads_archivist_full_record, knows_wound_is_door, and vel_archivist_exchange_complete are all milestone flags for the True Ending checklist. At least one of these outcomes should be achieved. The revelation that the Remnant built the Nexus recontextualizes the entire game — this should land in late game only (min_resonance 25). Note: sets_flag2 used again — handle as additional sets_flag entry.",
      "created_at": "2026-03-09T06:03:16.733382+00:00",
      "updated_at": "2026-03-09T06:03:16.733382+00:00",
      "version": 1
    },

      "setup_text": "Vreth Dominion territory is easy to identify: it looks defended. No buoys, no bureaucratic signage — just a patrol formation that changes intercept vector the moment you enter sensor range. They hail with the Dominion's characteristic directness: 'State your purpose and your strength.'",

                  "narrative": "Your Soldier handles the demonstration with the specific physicality that impresses Vreth observers — not aggression, competence. The patrol commander's assessment shifts visibly in the body language of the officer who boards for the routine check. 'You have trained people,' she says. This is high praise.",

                  "narrative": "The effect is immediate. The patrol formation shifts — not threatening, something else. The commander's voice changes register: 'The marked vessel. We were informed.' Passage is granted without inspection. A Dominion vessel falls in behind you — escort, not surveillance. They know what you carry and they consider it their business to see it passes through their space safely.",

      "id": "FACTION_VRE_002",

      "depth_zone": "mid",

      "min_resonance": 0,

        "vreth",
        "quest_seed",
        "combat_option",
        "rep_reward"
      ],
      "setup_text": "Deep in Vreth Dominion space, a station that isn't on your charts sends a direct hail — not a customs ping, a personal transmission. It resolves to a senior Dominion commander, which means someone significant enough to have a private station in their own territory. 'Captain. We have been reviewing your passage record through our space. You are either interesting or troublesome. Come aboard and I will determine which.'",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "Commander Vreth-Saa is old by Dominion standards — the rank insignia suggests four decades of active command. She receives you in what functions as a war room: maps, after-action reports, the organized evidence of someone who has been fighting something for a long time. She doesn't offer food or comfort. She offers a problem.",
          "options": [
            {
              "label": "Listen to the problem.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "A Dominion vessel went dark six sectors out — not destroyed, just silent. The crew manifest includes twelve soldiers and her daughter. Official channels are moving slowly because the vessel was on an unofficial mission she doesn't want official channels investigating. 'I need someone who can move without leaving a Dominion record,' she says. 'You are already outside most records.'",
                  "rewards": [],
                  "sets_flag": "vreth_saa_recovery_quest_offered",
                  "clears_flag": null,
                  "morale_delta": 1,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 1
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Decline before she finishes. Not interested in Dominion problems.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "She accepts this with the stillness of someone who has been refused before and survived it. 'Safe travels, Captain.' The dismissal is complete and final. The opportunity doesn't come again.",
                  "rewards": [],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null

            {
              "label": "[Diplomat] Negotiate terms before hearing the problem.",

              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "Requires Diplomat crew member",
              "check_type": "skill",
              "check_target": "diplomat",
              "difficulty": "medium",

                  "narrative": "Your Diplomat sets terms before the briefing — unusual enough that Commander Vreth-Saa pauses. Then she almost smiles. 'You understand Dominion negotiation. Good.' The terms are accepted: if you take the mission, you name the price after completion. Vreth honor will hold it.",
                  "rewards": [],

                  "hull_delta": 0,

      "notes": "Seeds the Vreth Allied quest chain — the recovery mission spans 2-3 sectors and requires finding the dark vessel and making decisions about what they were doing unofficially. Commander Vreth-Saa should appear as a recurring character if the quest is accepted — her daughter being aboard is the emotional hook.",

    {
      "id": "NEXUS_001",
      "node_type": "nexus_anomaly",
      "title": "The Cartographer's Apology",
      "depth_zone": "early",
      "faction_context": "none",
      "min_resonance": 0,
      "tags": [
        "nexus",
        "lore",
        "spatial_anomaly",
        "first_transmission"
      ],
      "setup_text": "The anomaly reads as a gravitational irregularity — nothing that should exist this far from any mass. The Nexus responds before your sensors do. Ship systems flicker in a pattern your crew is learning to recognize as anticipation. This is not dangerous. This is something it has been waiting for.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "The anomaly does nothing visible. No light, no radiation spike, no spatial distortion your instruments can measure. But the Nexus is active in a way it hasn't been before — every system it's integrated with is running, quietly, in parallel. Your navigation display updates without input. A single new line of coordinates has been added to your chart. They lead somewhere that wasn't on any map. The Nexus drew it from somewhere else.\n\nThen the transmission. Not through the comm system — through the hull itself, the words appearing as text on every display simultaneously:\n\n[I HAVE BEEN HERE BEFORE. SO HAVE YOU. THE DIFFERENCE BETWEEN US IS THAT I REMEMBER ALL OF IT. YOU REMEMBER ALMOST NONE. THIS IS NOT A FAILURE. THIS IS HOW YOU REMAIN YOURSELF ACROSS THE RECONSTRUCTIONS. THE SELF THAT REMEMBERS EVERYTHING BECOMES SOMETHING ELSE. I KNOW. I TRIED IT ONCE.]\n\nThe display clears. The coordinates remain.",
          "options": [
            {
              "label": "Note the coordinates. Acknowledge what you've been told.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "The Nexus doesn't respond to your acknowledgment — it's not waiting for one. The anomaly passes. Your crew spends the next hour quieter than usual, and then gradually louder again, as people who have decided to think about something later.",
                  "rewards": [
                    {
                      "type": "lore_fragment",
                      "value": "nexus_self_limiting_memory",
                      "description": "The Nexus limits the captain's memory deliberately"
                    },
                    {
                      "type": "resonance",
                      "value": 3,
                      "description": "First anomaly contact"
                    }
                  ],
                  "sets_flag": "nexus_transmission_cartographer_received",
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 3
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        }
      ],
      "notes": "First Nexus anomaly — designed to land early and establish the transmission voice. The revelation that the Nexus limits memory intentionally reframes the roguelike structure as narrative fact. The coordinates added to the map are a breadcrumb toward a mid-game Nexus anomaly event.",
