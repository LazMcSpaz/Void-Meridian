/* Void Meridian — Map Tab Renderer */

const MapUI = {
  render(container) {
    const screen = document.createElement('div');
    screen.className = 'screen';

    const map = GameState.run.map;
    if (!map) {
      screen.innerHTML = '<div class="section-header">Star Map</div><p style="color:var(--text-muted)">No map generated.</p>';
      container.appendChild(screen);
      return;
    }

    // Header with depth and fuel
    const header = document.createElement('div');
    header.className = 'section-header';
    header.textContent = `◈ SECTOR ${GameState.run.depth} / ??`;
    screen.appendChild(header);

    // Fuel display
    const fuel = document.createElement('div');
    fuel.className = 'system-label';
    fuel.style.marginBottom = 'var(--space-md)';
    fuel.textContent = `FUEL: ${GameState.run.fuel}`;
    screen.appendChild(fuel);

    // Render map layers
    const mapContainer = document.createElement('div');
    mapContainer.style.cssText = 'display:flex; flex-direction:column; align-items:center; gap:var(--space-md);';

    const currentDepth = GameState.run.depth;
    const maxVisible = currentDepth + 3;

    // Ship sensor state (computed once, used per node)
    const sensors = GameState.run.ship.baseSystems.sensors;
    const sensorsWorking = sensors && !sensors.damaged;
    const hasScanner = GameState.run.ship.equippedModules.some(m => m.id === 'mod_scanner_array');
    const hasNexusCortex = GameState.run.ship.equippedModules.some(m => m.id === 'mod_nexus_cortex');

    for (let d = Math.max(0, currentDepth - 1); d <= Math.min(map.maxDepth, maxVisible); d++) {
      const layerNodes = map.nodes.filter(n => n.depth === d);
      if (layerNodes.length === 0) continue;

      const row = document.createElement('div');
      row.style.cssText = 'display:flex; gap:var(--space-sm); justify-content:center;';

      for (const node of layerNodes) {
        const el = document.createElement('div');
        // Nexus Cortex reveals nexus_anomaly nodes within visible range
        const nexusCortexReveal = hasNexusCortex && node.type === 'nexus_anomaly' &&
          node.depth <= currentDepth + 3;
        const isRevealed = node.revealed || node.depth <= currentDepth + 1 || nexusCortexReveal;
        const isCurrent = node.id === GameState.run.currentNodeId;
        const isVisited = node.visited;
        const isSelectable = isRevealed && !isVisited && node.depth === currentDepth + 1 &&
                             map.edges.some(e => e.from === GameState.run.currentNodeId && e.to === node.id);

        // Some nodes broadcast their presence (no sensors needed)
        const broadcasts = node.type === 'trade_post' || node.type === 'dead_zone' ||
          node.type === 'faction_territory';
        // Sensor check: need sensors level 3+ or Scanner Array module to identify other nodes
        const canIdentify = isVisited || (isRevealed && broadcasts) || nexusCortexReveal ||
          (isRevealed && sensorsWorking && (sensors.level >= 3 || hasScanner));

        el.className = 'map-node' +
          (isCurrent ? ' current' : '') +
          (isVisited ? ' visited' : '') +
          (!isRevealed ? ' hidden-node' : '') +
          (isSelectable ? ' selectable' : '');

        el.textContent = canIdentify ? this._nodeEmoji(node.type) : (isRevealed ? '◌' : '?');
        el.title = canIdentify ? node.type.replace(/_/g, ' ') : 'Unknown';

        // Show faction influence (territory or nearby faction)
        const factionId = node.faction || (isRevealed ? node.nearbyFaction : null);
        if (factionId && isRevealed) {
          const factionColor = this._factionColor(factionId);
          if (node.faction) {
            // Direct faction territory — solid colored border
            el.style.borderColor = factionColor;
            el.style.boxShadow = `0 0 4px ${factionColor}`;
          } else if (node.nearbyFaction) {
            // Approaching faction space — subtle hint
            el.style.borderColor = factionColor;
            el.style.opacity = el.style.opacity || '1';
          }
          // Add faction name to tooltip if sensors can identify
          if (canIdentify) {
            el.title += ` (${this._factionName(factionId)})`;
          }
        }

        if (isSelectable) {
          el.addEventListener('click', () => this._selectNode(node));
        }

        row.appendChild(el);
      }

      screen.appendChild(row);
    }

    screen.appendChild(mapContainer);
    container.appendChild(screen);
  },

  _nodeEmoji(type) {
    const icons = {
      combat: '⚔',
      trade_post: '🏪',
      derelict: '🚧',
      planet_exploration: '🌍',
      nexus_anomaly: '⬡',
      anomalous_signal: '📡',
      faction_territory: '🏛',
      dead_zone: '💀',
    };
    return icons[type] || '·';
  },

  _factionColor(factionId) {
    const colors = {
      concord_assembly: 'var(--faction-concord)',
      vreth_dominion: 'var(--faction-vreth)',
      drifter_compact: 'var(--faction-drifter)',
      remnant_collective: 'var(--faction-remnant)',
    };
    return colors[factionId] || 'var(--text-muted)';
  },

  _factionName(factionId) {
    const names = {
      concord_assembly: 'Concord Assembly',
      vreth_dominion: 'Vreth Dominion',
      drifter_compact: 'Drifter Compact',
      remnant_collective: 'Remnant Collective',
    };
    return names[factionId] || factionId;
  },

  _selectNode(node) {
    if (GameState.run.fuel <= 0) {
      GameState.addLog('system', 'No fuel remaining.');
      Game.render();
      return;
    }

    GameState.run.fuel--;
    GameState.run.depth = node.depth;
    GameState.run.currentNodeId = node.id;
    node.visited = true;
    node.revealed = true;

    // Reveal adjacent nodes
    const map = GameState.run.map;
    for (const edge of map.edges) {
      if (edge.from === node.id) {
        const target = map.nodes.find(n => n.id === edge.to);
        if (target) target.revealed = true;
      }
    }

    // Trigger node encounter
    EventEngine.triggerNodeEvent(node);
  },
};

/* Void Meridian — Event Tab Renderer (events_master.json schema) */

const EventUI = {

  // ─── Narrative Colorizer ─────────────────────────────────────

  _NARRATIVE_KEYWORDS: null,
  _NARRATIVE_REGEX: null,

  _buildColorizer() {
    if (this._NARRATIVE_REGEX) return;

    const keywords = {
      // Threats (red)
      'var(--color-danger)': [
        'weapons drawn', 'fighter craft', 'hull breach', 'critical damage',
        'fire upon', 'weapons fire', 'boarding party', 'self-destruct',
        'weapons', 'hostile', 'attack', 'destroy', 'ambush', 'pirates',
        'enemy', 'armed', 'boarding', 'missiles', 'torpedo', 'explode',
        'raiders', 'intercept', 'killed', 'dead', 'death', 'lethal',
        'predator', 'predators', 'threat', 'breach', 'detonation',
        'overload', 'combat', 'wreckage', 'carnage', 'annihilate',
      ],
      // Caution (orange)
      'var(--color-warning)': [
        'warning', 'unstable', 'malfunction', 'failing', 'leak',
        'drifting', 'sacrifice', 'risk', 'cost', 'price', 'damaged',
        'stranded', 'distress', 'danger', 'trapped', 'quarantine',
        'contaminated', 'radiation', 'corrosion', 'decay',
      ],
      // Gains (green)
      'var(--color-success)': [
        'repaired', 'salvage', 'recovered', 'credits', 'fuel cells',
        'upgrade', 'ally', 'allies', 'safe', 'healed', 'restored',
        'reward', 'rescued', 'gained', 'profit', 'trade', 'supplies',
        'repair', 'reinforced', 'intact', 'fortune',
      ],
      // Nexus / mystery (purple)
      'var(--color-nexus)': [
        'nexus', 'resonance', 'the void', 'whisper', 'whispers',
        'pattern', 'remember', 'the wound', 'pulse', 'meridian',
        'reconstruction', 'anomaly', 'anomalous', 'transmission',
        'tendrils', 'tendril', 'integration', 'cortex',
      ],
      // Factions
      'var(--faction-concord)': ['concord assembly', 'concord'],
      'var(--faction-vreth)': ['vreth dominion', 'vreth'],
      'var(--faction-drifter)': ['drifter compact', 'drifter', 'drifters'],
      'var(--faction-remnant)': ['remnant collective', 'remnant'],
    };

    // Build flat list sorted longest-first
    const entries = [];
    for (const [color, words] of Object.entries(keywords)) {
      for (const word of words) {
        entries.push({ word, color });
      }
    }
    entries.sort((a, b) => b.word.length - a.word.length);

    this._NARRATIVE_KEYWORDS = entries;

    // Build single regex with alternation, word boundaries
    const escaped = entries.map(e => e.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
    this._NARRATIVE_REGEX = new RegExp('\\b(' + escaped.join('|') + ')\\b', 'gi');
  },

  _colorizeNarrative(text) {
    if (!text) return '';
    this._buildColorizer();

    // HTML-escape first
    let html = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');

    // Build a lookup map from lowercase word to color
    const colorMap = {};
    for (const entry of this._NARRATIVE_KEYWORDS) {
      colorMap[entry.word.toLowerCase()] = entry.color;
    }

    // Replace matches with colored spans, preserving original case
    html = html.replace(this._NARRATIVE_REGEX, (match) => {
      const color = colorMap[match.toLowerCase()];
      if (!color) return match;
      return `<span style="color:${color}">${match}</span>`;
    });

    return html;
  },

  render(container) {
    const screen = document.createElement('div');
    screen.className = 'screen';

    const evt = GameState.run.activeEvent;

    if (!evt) {
      this._renderShipStatus(screen);
      container.appendChild(screen);
      return;
    }

    // If outcome was resolved, show ONLY the outcome (clean page)
    if (evt._resolved && evt._lastOutcome) {
      this._renderOutcome(screen, evt);
      container.appendChild(screen);
      return;
    }

    // Current step
    const stepIdx = GameState.run.activeEventStep;
    const step = evt.steps ? evt.steps[stepIdx] : null;

    if (!step) {
      this._renderContinueButton(screen, evt);
      container.appendChild(screen);
      return;
    }

    // Node type indicator
    if (evt.node_type) {
      const nodeLabel = document.createElement('div');
      nodeLabel.className = 'system-label';
      nodeLabel.style.marginBottom = 'var(--space-sm)';
      nodeLabel.textContent = evt.node_type.toUpperCase().replace(/_/g, ' ');
      screen.appendChild(nodeLabel);
    }

    // For step 0, show the event setup_text as the intro
    // For later steps, only show the step's own setup_text
    if (stepIdx === 0 && evt.setup_text) {
      const setupEl = document.createElement('div');
      setupEl.className = 'narrative';
      setupEl.innerHTML = this._colorizeNarrative(evt.setup_text);
      screen.appendChild(setupEl);
    }

    // Step-specific setup text
    if (step.setup_text) {
      const stepSetup = document.createElement('div');
      stepSetup.className = 'narrative';
      if (stepIdx === 0 && evt.setup_text) {
        stepSetup.style.marginTop = 'var(--space-md)';
      }
      stepSetup.innerHTML = this._colorizeNarrative(step.setup_text);
      screen.appendChild(stepSetup);
    }

    // Divider before choices
    const divider = document.createElement('hr');
    divider.className = 'divider';
    screen.appendChild(divider);

    // Render options
    if (step.options) {
      for (let i = 0; i < step.options.length; i++) {
        const option = step.options[i];
        const { available, hint } = EventEngine.checkOptionAvailability(option);

        if (!available && !hint) continue;

        const btn = document.createElement('button');
        btn.className = 'choice-btn' + (!available ? ' locked' : '');

        let label = option.label || 'Choose';
        if (option.check_type && option.check_type !== 'none') {
          label += ` [${option.check_target || option.check_type}]`;
        }
        btn.textContent = label;

        if (!available) {
          const reason = document.createElement('span');
          reason.className = 'lock-reason';
          reason.textContent = hint;
          btn.appendChild(reason);
        } else {
          const optIdx = i;
          btn.addEventListener('click', () => EventEngine.selectOption(optIdx));
        }

        screen.appendChild(btn);
      }
    }

    container.appendChild(screen);
  },

  _renderOutcome(screen, evt) {
    const outcome = evt._lastOutcome;

    // Show what the player chose
    if (evt._lastChoiceLabel) {
      const choiceEl = document.createElement('div');
      choiceEl.style.cssText = 'color:var(--text-muted); font-size:var(--font-size-sm); margin-bottom:var(--space-sm); text-transform:uppercase;';
      choiceEl.textContent = `▸ ${evt._lastChoiceLabel}`;
      screen.appendChild(choiceEl);
    }

    // Outcome level indicator
    const levelEl = document.createElement('div');
    levelEl.className = 'system-label';
    levelEl.style.marginBottom = 'var(--space-sm)';
    const levelColors = { success: 'var(--color-success)', partial: 'var(--color-warning)', failure: 'var(--color-danger)' };
    levelEl.style.color = levelColors[evt._lastOutcomeLevel] || 'var(--text-accent)';
    levelEl.textContent = (evt._lastOutcomeLevel || 'success').toUpperCase();
    screen.appendChild(levelEl);

    // Narrative text
    if (outcome.narrative) {
      const narrativeEl = document.createElement('div');
      narrativeEl.className = 'narrative';
      narrativeEl.innerHTML = this._colorizeNarrative(outcome.narrative);
      screen.appendChild(narrativeEl);
    }

    // Show rewards summary
    const effects = this._summarizeOutcome(outcome);
    if (effects.length > 0) {
      const effectsEl = document.createElement('div');
      effectsEl.style.cssText = 'margin-top:var(--space-sm); color:var(--text-muted); font-size:var(--font-size-sm);';
      effectsEl.innerHTML = effects.join('<br>');
      screen.appendChild(effectsEl);
    }

    // Continue button
    const hasMoreSteps = this._hasMoreSteps(evt);
    const btnText = hasMoreSteps ? 'CONTINUE' : 'DONE';
    const continueBtn = document.createElement('button');
    continueBtn.className = 'btn-confirm';
    continueBtn.style.marginTop = 'var(--space-md)';
    continueBtn.textContent = btnText;
    continueBtn.addEventListener('click', () => EventEngine.advanceEvent());
    screen.appendChild(continueBtn);
  },

  _hasMoreSteps(evt) {
    const currentIdx = GameState.run.activeEventStep;
    if (!evt.steps) return false;
    for (let i = currentIdx + 1; i < evt.steps.length; i++) {
      const step = evt.steps[i];
      if (!step.condition) return true;
      const priorOutcome = GameState.run.lastStepOutcomes[step.condition.prior_step];
      if (priorOutcome === step.condition.outcome) return true;
    }
    return false;
  },

  _summarizeOutcome(outcome) {
    const effects = [];
    if (outcome.hull_delta > 0) effects.push(`Hull +${outcome.hull_delta}%`);
    if (outcome.hull_delta < 0) effects.push(`Hull ${outcome.hull_delta}%`);
    if (outcome.morale_delta > 0) effects.push(`Morale +${outcome.morale_delta}`);
    if (outcome.morale_delta < 0) effects.push(`Morale ${outcome.morale_delta}`);
    if (outcome.resonance_delta > 0) effects.push(`Resonance +${outcome.resonance_delta}`);
    if (outcome.rewards) {
      for (const r of outcome.rewards) {
        if (r.description) effects.push(r.description);
        else if (r.type === 'credits' && r.value > 0) effects.push(`+${r.value} credits`);
        else if (r.type === 'credits' && r.value < 0) effects.push(`${r.value} credits`);
        else if (r.type === 'fuel' && r.value > 0) effects.push(`+${r.value} fuel`);
        else if (r.type === 'fuel' && r.value < 0) effects.push(`${r.value} fuel`);
        else if (r.type === 'hull_repair') effects.push(`Hull repaired +${r.value}%`);
      }
    }
    return effects;
  },

  _renderContinueButton(screen, evt) {
    const btn = document.createElement('button');
    btn.className = 'btn-confirm';
    btn.textContent = 'CONTINUE';
    btn.addEventListener('click', () => EventEngine.advanceEvent());
    screen.appendChild(btn);
  },

  _renderShipStatus(screen) {
    const ship = GameState.run.ship;
    const run = GameState.run;

    const title = document.createElement('div');
    title.className = 'section-header';
    title.textContent = 'THE MERIDIAN';
    screen.appendChild(title);

    // Hull bar
    const hullPct = ship.maxHull > 0 ? Math.round((ship.hull / ship.maxHull) * 100) : 0;
    screen.appendChild(this._createStatBar('HULL', hullPct, hullPct <= 25 ? 'danger' : hullPct <= 50 ? 'warning' : ''));

    screen.appendChild(Object.assign(document.createElement('hr'), { className: 'divider' }));

    // Base systems
    const sysHeader = document.createElement('div');
    sysHeader.className = 'system-label';
    sysHeader.style.marginBottom = 'var(--space-sm)';
    sysHeader.textContent = 'SYSTEMS';
    screen.appendChild(sysHeader);

    const sysNames = ShipEngine.SYSTEM_NAMES;
    for (const [key, sys] of Object.entries(ship.baseSystems)) {
      const pct = Math.round((sys.level / sys.maxLevel) * 100);
      const displayName = (sysNames[key] || key).toUpperCase();
      screen.appendChild(this._createStatBar(
        displayName + (sys.damaged ? ' [DMG]' : ''),
        pct
      ));
    }

    // Resources
    screen.appendChild(Object.assign(document.createElement('hr'), { className: 'divider' }));
    const res = document.createElement('div');
    res.innerHTML = `
      <span class="system-label">CREDITS</span> <span style="color:var(--color-credits)">₢${run.credits}</span>
      &nbsp;&nbsp;
      <span class="system-label">FUEL</span> <span>${run.fuel}</span>
      &nbsp;&nbsp;
      <span class="system-label">CREW</span> <span>${run.crew.filter(c => !c.dead).length}</span>
    `;
    screen.appendChild(res);

    // Weapons
    if (ship.equippedWeapons && ship.equippedWeapons.length > 0) {
      screen.appendChild(Object.assign(document.createElement('hr'), { className: 'divider' }));
      const wpnHeader = document.createElement('div');
      wpnHeader.className = 'system-label';
      wpnHeader.style.marginBottom = 'var(--space-sm)';
      wpnHeader.textContent = 'WEAPONS';
      screen.appendChild(wpnHeader);

      for (const wpn of ship.equippedWeapons) {
        const wpnEl = document.createElement('div');
        wpnEl.style.cssText = 'margin-bottom:var(--space-xs); color:var(--text-secondary);';
        const emoji = wpn.type === 'nexus_energy' ? '◈' : (wpn.emoji || '⚔');
        let tags = '';
        if (wpn.irremovable) tags += ' [⬡]';
        if (typeof wpn._currentAmmo === 'number') tags += ` [${wpn._currentAmmo}/${wpn.stats.ammo}]`;
        if (wpn._currentCharges > 0) tags += ` ◆${wpn._currentCharges}`;
        wpnEl.textContent = `${emoji} ${wpn.name}${tags}`;
        if (wpn.tier === 3) wpnEl.style.color = 'var(--color-nexus)';
        screen.appendChild(wpnEl);
      }
    }

    // Modules
    if (ship.equippedModules.length > 0) {
      screen.appendChild(Object.assign(document.createElement('hr'), { className: 'divider' }));
      const modHeader = document.createElement('div');
      modHeader.className = 'system-label';
      modHeader.style.marginBottom = 'var(--space-sm)';
      modHeader.textContent = 'MODULES';
      screen.appendChild(modHeader);

      for (const mod of ship.equippedModules) {
        const modEl = document.createElement('div');
        modEl.style.cssText = 'margin-bottom:var(--space-xs); color:var(--text-secondary);';
        const emoji = mod.nexus_integrated ? '◈' : (mod.emoji || '◻');
        let tags = '';
        if (mod.irremovable) tags += ' [⬡]';
        if (mod.nexus_integrated) tags += ' [◈]';
        modEl.textContent = `${emoji} ${mod.name}${tags}`;
        if (mod.tier === 3) modEl.style.color = 'var(--color-nexus)';
        if (mod.nexus_integrated) modEl.style.fontStyle = 'italic';
        screen.appendChild(modEl);
      }
    }
  },

  _createStatBar(label, percent, variant) {
    const filled = Math.round(percent / 10);
    const empty = 10 - filled;
    const el = document.createElement('div');
    el.className = 'stat-bar' + (variant ? ` ${variant}` : '');
    el.innerHTML = `<span class="system-label">${label}</span> <span class="stat-bar-fill">${'█'.repeat(filled)}</span><span class="stat-bar-empty">${'░'.repeat(empty)}</span> ${percent}%`;
    return el;
  },
};

/* Void Meridian — Crew Tab Renderer */

const CrewUI = {
  expandedCrewId: null,

  render(container) {
    const screen = document.createElement('div');
    screen.className = 'screen';

    const header = document.createElement('div');
    header.className = 'section-header';
    header.textContent = `CREW (${GameState.run.crew.filter(c => !c.dead).length})`;
    screen.appendChild(header);

    const alive = GameState.run.crew.filter(c => !c.dead);
    if (alive.length === 0) {
      const empty = document.createElement('p');
      empty.style.color = 'var(--text-muted)';
      empty.textContent = 'No crew aboard.';
      screen.appendChild(empty);
      container.appendChild(screen);
      return;
    }

    for (const member of alive) {
      screen.appendChild(this._renderCard(member));
    }

    // Dead crew at bottom (grayed)
    const dead = GameState.run.crew.filter(c => c.dead);
    if (dead.length > 0) {
      const deadHeader = document.createElement('div');
      deadHeader.className = 'system-label';
      deadHeader.style.cssText = 'margin-top:var(--space-lg); color:var(--text-muted);';
      deadHeader.textContent = 'LOST';
      screen.appendChild(deadHeader);
      for (const member of dead) {
        screen.appendChild(this._renderDeadCard(member));
      }
    }

    container.appendChild(screen);
  },

  _renderCard(member) {
    const card = document.createElement('div');
    card.className = 'crew-card';
    const isExpanded = this.expandedCrewId === member.id;

    // Role emoji — named characters use their own emoji or special treatment
    const emoji = member.emoji || this._roleEmoji(member.role);

    // Header row: named chars show full name, common show first name only
    const nameRow = document.createElement('div');
    nameRow.style.cssText = 'display:flex; justify-content:space-between; align-items:baseline;';
    const displayName = member.isNamed ? member.name : member.name.split(' ')[0];
    nameRow.innerHTML = `
      <span class="crew-name">${emoji} ${displayName}</span>
      <span class="crew-role">${member.role}${member.isNamed ? ' ★' : ''}</span>
    `;
    card.appendChild(nameRow);

    // Trait
    if (member.trait) {
      const trait = document.createElement('div');
      trait.className = 'crew-trait';
      trait.textContent = member.trait;
      card.appendChild(trait);
    }

    // Stats
    const stats = document.createElement('div');
    stats.className = 'crew-stats';
    stats.appendChild(this._miniBar('MRL', member.morale || 50, member.morale <= 25 ? 'danger' : member.morale <= 50 ? 'warning' : ''));

    // Secret loyalty: hide above 79 for named chars until revealed
    if (member.isNamed && member.loyalty >= 80 && !member.secretRevealed) {
      stats.appendChild(this._miniBar('LYL', 79, '', '???'));
    } else {
      stats.appendChild(this._miniBar('LYL', member.loyalty || 50, member.loyalty <= 25 ? 'danger' : ''));
    }
    card.appendChild(stats);

    // Conditions
    if (member.conditions && member.conditions.length > 0 && member.conditions[0] !== 'dead') {
      const condRow = document.createElement('div');
      condRow.style.marginTop = 'var(--space-xs)';
      for (const cond of member.conditions) {
        const badge = document.createElement('span');
        badge.className = 'badge badge-warning';
        badge.textContent = `[${cond.toUpperCase().substring(0, 3)}]`;
        badge.style.marginRight = 'var(--space-xs)';
        condRow.appendChild(badge);
      }
      card.appendChild(condRow);
    }

    // Expanded details
    if (isExpanded) {
      const details = document.createElement('div');
      details.style.cssText = 'margin-top:var(--space-sm); padding-top:var(--space-sm); border-top:1px solid var(--border);';

      // Named character personality description
      if (member.isNamed && member.personalityDescription) {
        const bio = document.createElement('div');
        bio.style.cssText = 'color:var(--text-secondary); font-size:var(--font-size-sm); margin-bottom:var(--space-sm); font-style:italic;';
        bio.textContent = member.personalityDescription;
        details.appendChild(bio);
      }

      // Unique passive
      if (member.uniquePassive) {
        const passive = document.createElement('div');
        passive.style.cssText = 'color:var(--color-nexus); font-size:var(--font-size-sm); margin-bottom:var(--space-sm);';
        passive.textContent = `◈ ${member.uniquePassive}`;
        details.appendChild(passive);
      }

      // Combat stats
      if (member.combatStats) {
        const combat = document.createElement('div');
        combat.style.cssText = 'font-size:var(--font-size-sm); color:var(--text-secondary);';
        combat.textContent = `ATK ${member.combatStats.atk_modifier >= 0 ? '+' : ''}${member.combatStats.atk_modifier} / DEF ${member.combatStats.def_modifier >= 0 ? '+' : ''}${member.combatStats.def_modifier}`;
        details.appendChild(combat);
      }

      // Relationships
      if (member.relationships && member.relationships.length > 0) {
        const relHeader = document.createElement('div');
        relHeader.className = 'system-label';
        relHeader.style.marginTop = 'var(--space-sm)';
        relHeader.textContent = 'RELATIONSHIPS';
        details.appendChild(relHeader);
        for (const rel of member.relationships) {
          const relEl = document.createElement('div');
          relEl.style.cssText = 'font-size:var(--font-size-sm); color:var(--text-secondary);';
          relEl.textContent = `${rel.target}: ${rel.type} (${rel.value > 0 ? '+' : ''}${rel.value})`;
          details.appendChild(relEl);
        }
      }

      card.appendChild(details);
    }

    card.addEventListener('click', () => {
      this.expandedCrewId = isExpanded ? null : member.id;
      Game.render();
    });

    return card;
  },

  _renderDeadCard(member) {
    const card = document.createElement('div');
    card.className = 'crew-card';
    card.style.opacity = '0.4';

    const emoji = member.emoji || this._roleEmoji(member.role);
    const displayName = member.isNamed ? member.name : member.name.split(' ')[0];

    card.innerHTML = `
      <span style="text-decoration:line-through; color:var(--text-muted);">${emoji} ${displayName}</span>
      <span class="crew-role" style="color:var(--text-muted);">${member.role}</span>
    `;
    return card;
  },

  _roleEmoji(role) {
    const emojis = {
      engineer: '🔧',
      pilot: '🚀',
      medic: '💉',
      soldier: '⚔',
      technician: '💻',
      diplomat: '🤝',
      scientist: '🔬',
    };
    return emojis[role] || '👤';
  },

  _miniBar(label, value, variant, suffix) {
    const pct = Math.max(0, Math.min(100, value));
    const filled = Math.round(pct / 10);
    const empty = 10 - filled;
    const el = document.createElement('div');
    el.className = 'stat-bar' + (variant ? ` ${variant}` : '');
    el.style.fontSize = 'var(--font-size-sm)';
    el.innerHTML = `${label} <span class="stat-bar-fill">${'█'.repeat(filled)}</span><span class="stat-bar-empty">${'░'.repeat(empty)}</span> ${suffix || pct}`;
    return el;
  },
};

    weapons:       { label: 'WEAPONS',          emoji: '⚔', desc: 'Damage output and weapon slot efficiency' },
    propulsion:    { label: 'PROPULSION',        emoji: '🚀', desc: 'Speed in combat, fuel efficiency' },
    sensors:       { label: 'SENSORS',           emoji: '📡', desc: 'Reveal map nodes, detect hidden events' },
    shields_armor: { label: 'SHIELDS / ARMOR',   emoji: '🛡', desc: 'Damage reduction and shield strength' },
    cargo_hold:    { label: 'CARGO HOLD',        emoji: '📦', desc: 'Max inventory slots and trade prices' },
    crew_quarters: { label: 'CREW QUARTERS',     emoji: '🏠', desc: 'Max crew, morale decay rate' },
  },

  CAPTAIN_STAT_INFO: {
    command:   { label: 'COMMAND',   emoji: '⚑', desc: 'Crew effectiveness, combat leadership, authority checks' },
    intuition: { label: 'INTUITION', emoji: '◉', desc: 'Hidden option discovery, trap avoidance, navigation' },
    resolve:   { label: 'RESOLVE',   emoji: '▣', desc: 'Morale protection, Nexus resistance, endurance checks' },
  },

  CAPTAIN_ABILITIES: [
    { id: 'rally_cry',       name: 'Rally Cry',       desc: '+10 crew morale once per 5 nodes. Command check bonus.', stat: 'command' },
    { id: 'gut_feeling',     name: 'Gut Feeling',     desc: 'Reveal one hidden option per event. Intuition check bonus.', stat: 'intuition' },
    { id: 'iron_will',       name: 'Iron Will',       desc: 'Prevent one crew death per run. Resolve check bonus.', stat: 'resolve' },
    { id: 'scavenger_eye',   name: 'Scavenger\'s Eye', desc: '+25% salvage from derelicts. Better trade prices.', stat: 'intuition' },
  ],

  CREW_ROLES: ['engineer', 'pilot', 'medic', 'soldier', 'technician', 'diplomat', 'scientist'],

  ROLE_INFO: {
    engineer:   { emoji: '🔧', desc: 'Repairs systems, improves module efficiency' },
    pilot:      { emoji: '🚀', desc: 'Evasion bonus, faster travel, escape options' },
    medic:      { emoji: '💉', desc: 'Heals crew conditions, prevents death rolls' },
    soldier:    { emoji: '⚔',  desc: 'Combat damage, boarding defense' },
    technician: { emoji: '💻', desc: 'Hacking, sensor boosts, module installation' },
    diplomat:   { emoji: '🤝', desc: 'Faction reputation gains, trade discounts' },
    scientist:  { emoji: '🔬', desc: 'Anomaly research, Nexus insight, lore discovery' },
  },

  render(container) {
    const screen = document.createElement('div');
    screen.className = 'fullscreen recon-screen';

    switch (this.phase) {
      case 'recap':        this._renderRecap(screen); break;
      case 'transmission': this._renderTransmission(screen); break;
      case 'systems':      this._renderSystems(screen); break;
      case 'captain':      this._renderCaptain(screen); break;
      case 'crew_pick':    this._renderCrewPick(screen); break;
      case 'supplies':     this._renderSupplies(screen); break;
      case 'weapon_select':this._renderWeaponSelect(screen); break;
      case 'confirm':      this._renderConfirm(screen); break;
    }

    container.appendChild(screen);
  },

  start() {
    this.phase = 'recap';
    this.totalPoints = GameState.getSalvagePoints();
    this.spentPoints = 0;
    this.systems = { weapons: 0, propulsion: 0, sensors: 0, shields_armor: 0, cargo_hold: 0, crew_quarters: 0 };
    this.captainStats = { command: 0, intuition: 0, resolve: 0 };
    this.captainAbility = null;
    this.crewChoices = [];
    this.supplies = { credits: 0, fuel: 0 };
    this.selectedWeaponId = null;
    this.recapLineIndex = 0;
    Game.render();
    this._startRecapAnimation();
  },

  _getRemaining() {
    return this.totalPoints - this.spentPoints;
  },

  _spendPoint() {
    if (this.spentPoints < this.totalPoints) { this.spentPoints++; return true; }
    return false;
  },

  _refundPoint() {
    if (this.spentPoints > 0) { this.spentPoints--; return true; }
    return false;
  },

  // ─── Phase Header ──────────────────────────────────────────────

  _renderPhaseHeader(screen, title, subtitle) {
    const hdr = document.createElement('div');
    hdr.style.cssText = 'text-align:center; margin-bottom:var(--space-lg); width:100%;';
    hdr.innerHTML = `
      <div class="section-header" style="border-bottom:none; margin-bottom:var(--space-xs);">${title}</div>
      <div style="color:var(--text-accent); font-size:var(--font-size-lg);">${this._getRemaining()} POINTS REMAINING</div>
      ${subtitle ? `<div style="color:var(--text-muted); font-size:var(--font-size-sm); margin-top:var(--space-xs);">${subtitle}</div>` : ''}
    `;
    screen.appendChild(hdr);
  },

  _renderNavButtons(screen, backPhase, nextPhase, nextLabel) {
    const nav = document.createElement('div');
    nav.style.cssText = 'display:flex; gap:var(--space-sm); width:100%; max-width:400px; margin-top:var(--space-lg);';

    if (backPhase) {
      const back = document.createElement('button');
      back.className = 'btn-confirm';
      back.style.cssText = 'flex:1; border-color:var(--border); color:var(--text-secondary);';
      back.textContent = '← BACK';
      back.addEventListener('click', () => { this.phase = backPhase; Game.render(); });
      nav.appendChild(back);
    }

    const next = document.createElement('button');
    next.className = 'btn-confirm';
    next.style.cssText = backPhase ? 'flex:2;' : 'flex:1;';
    next.textContent = nextLabel || 'NEXT →';
    next.addEventListener('click', () => { this.phase = nextPhase; Game.render(); });
    nav.appendChild(next);

    screen.appendChild(nav);
  },

  // ─── Recap & Transmission ──────────────────────────────────────

  _getRecapLines() {
    const last = GameState.meta.runHistory[GameState.meta.runHistory.length - 1];
    if (!last) {
      return [
        'NEXUS RECONSTRUCTION PROTOCOL',
        '...',
        'No prior vessel data found.',
        'Initializing from base pattern.',
      ];
    }
    return [
      'NEXUS RECONSTRUCTION PROTOCOL',
      '...',
      `PRIOR VESSEL LOST — SECTOR ${last.depth}`,
      `CAUSE: ${last.cause.toUpperCase()}`,
      `CREW LOST: ${last.crewLost}`,
      `SALVAGE RECOVERED: ₢${last.creditsEarned}`,
      '...',
      'RECONSTRUCTING.',
    ];
  },

  _startRecapAnimation() {
    const lines = this._getRecapLines();
    this.recapLineIndex = 0;

    const advance = () => {
      this.recapLineIndex++;
      Game.render();
      if (this.recapLineIndex < lines.length) {
        this.recapTimer = setTimeout(advance, 600);
      } else {
        this.recapTimer = setTimeout(() => {
          this.phase = 'transmission';
          Game.render();
        }, 1200);
      }
    };

    this.recapTimer = setTimeout(advance, 800);
  },

  _renderRecap(screen) {
    const lines = this._getRecapLines();
    const textArea = document.createElement('div');
    textArea.style.cssText = 'max-width:80vw; text-align:left;';

    for (let i = 0; i < Math.min(this.recapLineIndex, lines.length); i++) {
      const line = document.createElement('div');
      line.className = 'death-recap-line';
      line.style.animationDelay = '0s';
      line.style.color = 'var(--text-secondary)';
      line.textContent = lines[i];
      textArea.appendChild(line);
    }

    screen.appendChild(textArea);
  },

  _renderTransmission(screen) {
    const tier = GameState.getResonanceTier();
    const transmissions = [
      'you are not the first.',
      'i remember the shape of you.',
      'the pattern persists. you persist.',
      'each death teaches me more about what you are.',
      'we are becoming something neither of us intended.',
      'the wound calls. can you hear it now?',
    ];
    const text = transmissions[Math.min(tier, transmissions.length - 1)];

    const el = document.createElement('div');
    el.style.cssText = 'text-align:center;';
    el.innerHTML = `<div class="nexus-line" style="color:var(--color-nexus); font-style:italic; font-size:var(--font-size-nexus);">${text}</div>`;
    screen.appendChild(el);

    setTimeout(() => {
      this.phase = 'systems';
      Game.render();
    }, 3500);
  },

  // ─── Phase 1: Ship Systems ─────────────────────────────────────

  _renderSystems(screen) {
    this._renderPhaseHeader(screen, 'SHIP SYSTEMS', 'Allocate points to upgrade your vessel\'s base systems. Each point = +1 system level.');

    const area = document.createElement('div');
    area.style.cssText = 'width:100%; max-width:400px; overflow-y:auto; flex-shrink:1;';

    for (const [key, info] of Object.entries(this.SYSTEM_INFO)) {
      const val = this.systems[key];
      const row = document.createElement('div');
      row.className = 'alloc-category';

      const label = document.createElement('div');
      label.className = 'alloc-label';
      label.innerHTML = `${info.emoji} ${info.label} <span style="color:var(--text-muted); font-size:0.7rem;">(Lv ${1 + val})</span>`;
      row.appendChild(label);

      const desc = document.createElement('div');
      desc.style.cssText = 'color:var(--text-muted); font-size:var(--font-size-sm); margin-bottom:var(--space-xs);';
      desc.textContent = info.desc;
      row.appendChild(desc);

      const bar = document.createElement('div');
      bar.style.cssText = 'display:flex; align-items:center; gap:var(--space-sm);';

      const minusBtn = document.createElement('button');
      minusBtn.className = 'alloc-btn';
      minusBtn.textContent = '−';
      minusBtn.addEventListener('click', () => {
        if (this.systems[key] > 0) {
          this.systems[key]--;
          this._refundPoint();
          Game.render();
        }
      });

      const pips = document.createElement('div');
      pips.style.cssText = 'flex:1; display:flex; gap:2px;';
      for (let i = 0; i < 5; i++) {
        const pip = document.createElement('div');
        pip.style.cssText = `height:8px; flex:1; border:1px solid var(--border); ${i < val ? 'background:var(--text-accent);' : ''}`;
        pips.appendChild(pip);
      }

      const plusBtn = document.createElement('button');
      plusBtn.className = 'alloc-btn';
      plusBtn.textContent = '+';
      plusBtn.addEventListener('click', () => {
        if (this.systems[key] < 4 && this._getRemaining() > 0) {
          this.systems[key]++;
          this._spendPoint();
          Game.render();
        }
      });

      bar.appendChild(minusBtn);
      bar.appendChild(pips);
      bar.appendChild(plusBtn);
      row.appendChild(bar);
      area.appendChild(row);
    }

    screen.appendChild(area);
    this._renderNavButtons(screen, null, 'captain', 'CAPTAIN →');
  },

  // ─── Phase 2: Captain ──────────────────────────────────────────

  _renderCaptain(screen) {
    this._renderPhaseHeader(screen, 'CAPTAIN', 'Invest in your captain\'s stats and choose one starting ability.');

    const area = document.createElement('div');
    area.style.cssText = 'width:100%; max-width:400px; overflow-y:auto; flex-shrink:1;';

    // Stats
    const statsHeader = document.createElement('div');
    statsHeader.style.cssText = 'color:var(--text-secondary); font-size:var(--font-size-sm); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:var(--space-sm);';
    statsHeader.textContent = 'STATS';
    area.appendChild(statsHeader);

    for (const [key, info] of Object.entries(this.CAPTAIN_STAT_INFO)) {
      const val = this.captainStats[key];
      const row = document.createElement('div');
      row.className = 'alloc-category';

      const label = document.createElement('div');
      label.className = 'alloc-label';
      label.innerHTML = `${info.emoji} ${info.label} <span style="color:var(--text-accent);">${1 + val}</span>`;
      row.appendChild(label);

      const desc = document.createElement('div');
      desc.style.cssText = 'color:var(--text-muted); font-size:var(--font-size-sm); margin-bottom:var(--space-xs);';
      desc.textContent = info.desc;
      row.appendChild(desc);

      const controls = document.createElement('div');
      controls.className = 'alloc-controls';

      const minusBtn = document.createElement('button');
      minusBtn.className = 'alloc-btn';
      minusBtn.textContent = '−';
      minusBtn.addEventListener('click', () => {
        if (this.captainStats[key] > 0) {
          this.captainStats[key]--;
          this._refundPoint();
          Game.render();
        }
      });

      const value = document.createElement('span');
      value.className = 'alloc-value';
      value.textContent = val;

      const plusBtn = document.createElement('button');
      plusBtn.className = 'alloc-btn';
      plusBtn.textContent = '+';
      plusBtn.addEventListener('click', () => {
        if (this.captainStats[key] < 5 && this._getRemaining() > 0) {
          this.captainStats[key]++;
          this._spendPoint();
          Game.render();
        }
      });

      controls.appendChild(minusBtn);
      controls.appendChild(value);
      controls.appendChild(plusBtn);
      row.appendChild(controls);
      area.appendChild(row);
    }

    // Ability selection
    const abilityHeader = document.createElement('div');
    abilityHeader.style.cssText = 'color:var(--text-secondary); font-size:var(--font-size-sm); text-transform:uppercase; letter-spacing:0.1em; margin:var(--space-md) 0 var(--space-sm);';
    abilityHeader.textContent = 'STARTING ABILITY (choose one)';
    area.appendChild(abilityHeader);

    for (const ability of this.CAPTAIN_ABILITIES) {
      const card = document.createElement('div');
      const selected = this.captainAbility === ability.id;
      card.style.cssText = `padding:var(--space-sm); margin-bottom:var(--space-sm); border:1px solid ${selected ? 'var(--text-accent)' : 'var(--border)'}; background:${selected ? 'var(--bg-tertiary)' : 'var(--bg-card)'}; cursor:pointer;`;

      card.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:baseline;">
          <span style="color:${selected ? 'var(--text-accent)' : 'var(--text-primary)'}; font-weight:bold;">${ability.name}</span>
          <span style="color:var(--text-muted); font-size:var(--font-size-sm);">${this.CAPTAIN_STAT_INFO[ability.stat].emoji} ${ability.stat}</span>
        </div>
        <div style="color:var(--text-secondary); font-size:var(--font-size-sm); margin-top:var(--space-xs);">${ability.desc}</div>
      `;

      card.addEventListener('click', () => {
        this.captainAbility = ability.id;
        Game.render();
      });

      area.appendChild(card);
    }

    screen.appendChild(area);
    this._renderNavButtons(screen, 'systems', 'crew_pick', 'CREW →');
  },

  // ─── Phase 3: Crew Selection ───────────────────────────────────

  _renderCrewPick(screen) {
    const maxCrew = 2 + Math.floor((this.systems.crew_quarters || 0) / 2);
    this._renderPhaseHeader(screen, 'CREW ROSTER', `Pick up to ${maxCrew} starting crew. Each crew member costs 1 point.`);

    const area = document.createElement('div');
    area.style.cssText = 'width:100%; max-width:400px; overflow-y:auto; flex-shrink:1;';

    // Current crew picks
    if (this.crewChoices.length > 0) {
      const picked = document.createElement('div');
      picked.style.cssText = 'margin-bottom:var(--space-md);';
      const pickedLabel = document.createElement('div');
      pickedLabel.style.cssText = 'color:var(--text-secondary); font-size:var(--font-size-sm); text-transform:uppercase; margin-bottom:var(--space-sm);';
      pickedLabel.textContent = `CREW (${this.crewChoices.length}/${maxCrew})`;
      picked.appendChild(pickedLabel);

      this.crewChoices.forEach((choice, idx) => {
        const ri = this.ROLE_INFO[choice.role] || {};
        const row = document.createElement('div');
        row.style.cssText = 'display:flex; align-items:center; justify-content:space-between; padding:var(--space-sm); border:1px solid var(--border); margin-bottom:var(--space-xs); background:var(--bg-card);';
        row.innerHTML = `
          <span>${ri.emoji || '👤'} ${choice.role.toUpperCase()}</span>
        `;
        const removeBtn = document.createElement('button');
        removeBtn.className = 'alloc-btn';
        removeBtn.style.cssText = 'min-width:32px; min-height:32px; color:var(--color-danger); border-color:var(--color-danger);';
        removeBtn.textContent = '✕';
        removeBtn.addEventListener('click', () => {
          this.crewChoices.splice(idx, 1);
          this._refundPoint();
          Game.render();
        });
        row.appendChild(removeBtn);
        picked.appendChild(row);
      });

      area.appendChild(picked);
    }

    // Available roles to add
    if (this.crewChoices.length < maxCrew) {
      const addLabel = document.createElement('div');
      addLabel.style.cssText = 'color:var(--text-secondary); font-size:var(--font-size-sm); text-transform:uppercase; margin-bottom:var(--space-sm);';
      addLabel.textContent = 'ADD CREW MEMBER (1 pt each)';
      area.appendChild(addLabel);

      for (const role of this.CREW_ROLES) {
        const ri = this.ROLE_INFO[role];
        const card = document.createElement('div');
        const canAfford = this._getRemaining() > 0;
        card.style.cssText = `padding:var(--space-sm); margin-bottom:var(--space-sm); border:1px solid var(--border); background:var(--bg-card); cursor:${canAfford ? 'pointer' : 'default'}; ${canAfford ? '' : 'opacity:0.4;'}`;

        card.innerHTML = `
          <div style="display:flex; align-items:baseline; gap:var(--space-sm);">
            <span style="font-size:1.1rem;">${ri.emoji}</span>
            <span style="color:var(--text-primary); text-transform:uppercase;">${role}</span>
          </div>
          <div style="color:var(--text-muted); font-size:var(--font-size-sm); margin-top:2px;">${ri.desc}</div>
        `;

        if (canAfford) {
          card.addEventListener('click', () => {
            if (this.crewChoices.length < maxCrew && this._spendPoint()) {
              this.crewChoices.push({ role });
              Game.render();
            }
          });
        }

        area.appendChild(card);
      }
    }

    screen.appendChild(area);
    this._renderNavButtons(screen, 'captain', 'supplies', 'SUPPLIES →');
  },

  // ─── Phase 4: Supplies ─────────────────────────────────────────

  _renderSupplies(screen) {
    this._renderPhaseHeader(screen, 'STARTING SUPPLIES', 'Spend remaining points on credits and fuel.');

    const area = document.createElement('div');
    area.style.cssText = 'width:100%; max-width:400px;';

    const items = [
      { key: 'credits', label: 'CREDITS', emoji: '₢', desc: 'Buy weapons, modules, repairs, and crew at trade posts.', base: 50, perPoint: 30, unit: '₢' },
      { key: 'fuel', label: 'FUEL CELLS', emoji: '⛽', desc: 'Each jump costs 1 fuel. Run out and you drift.', base: 8, perPoint: 2, unit: '' },
    ];

    for (const item of items) {
      const val = this.supplies[item.key];
      const total = item.base + val * item.perPoint;
      const row = document.createElement('div');
      row.className = 'alloc-category';

      const label = document.createElement('div');
      label.className = 'alloc-label';
      label.innerHTML = `${item.emoji} ${item.label} <span style="color:var(--text-accent);">${item.unit}${total}</span>`;
      row.appendChild(label);

      const desc = document.createElement('div');
      desc.style.cssText = 'color:var(--text-muted); font-size:var(--font-size-sm); margin-bottom:var(--space-xs);';
      desc.textContent = `${item.desc} Base: ${item.unit}${item.base}, +${item.unit}${item.perPoint}/pt`;
      row.appendChild(desc);

      const controls = document.createElement('div');
      controls.className = 'alloc-controls';

      const minusBtn = document.createElement('button');
      minusBtn.className = 'alloc-btn';
      minusBtn.textContent = '−';
      minusBtn.addEventListener('click', () => {
        if (this.supplies[item.key] > 0) {
          this.supplies[item.key]--;
          this._refundPoint();
          Game.render();
        }
      });

      const value = document.createElement('span');
      value.className = 'alloc-value';
      value.textContent = val;

      const plusBtn = document.createElement('button');
      plusBtn.className = 'alloc-btn';
      plusBtn.textContent = '+';
      plusBtn.addEventListener('click', () => {
        if (this._getRemaining() > 0) {
          this.supplies[item.key]++;
          this._spendPoint();
          Game.render();
        }
      });

      controls.appendChild(minusBtn);
      controls.appendChild(value);
      controls.appendChild(plusBtn);
      row.appendChild(controls);
      area.appendChild(row);
    }

    screen.appendChild(area);
    this._renderNavButtons(screen, 'crew_pick', 'weapon_select', 'WEAPON →');
  },

  // ─── Phase 5: Weapon Select ────────────────────────────────────

  _renderWeaponSelect(screen) {
    this._renderPhaseHeader(screen, 'STARTING WEAPON', 'Choose your primary weapon for this run.');

    // Get tier 1 weapons available via run_start_choice
    let startWeapons = Registry.getWeaponsBySource('run_start_choice');
    if (startWeapons.length === 0) {
      startWeapons = Registry.getWeaponsByTier(1);
    }

    // Also check tier 3 weapons gated by resonance on the reconstruction screen
    const reconWeapons = Registry.getWeaponsBySource('reconstruction_screen_resonance')
      .filter(w => Registry.checkGating(w.gating ? w.gating.requires : []));
    startWeapons = startWeapons.concat(reconWeapons);

    if (startWeapons.length === 0) {
      // No weapon data loaded — skip
      this.phase = 'confirm';
      Game.render();
      return;
    }

    const weaponArea = document.createElement('div');
    weaponArea.style.cssText = 'width:100%; max-width:400px; overflow-y:auto; flex-shrink:1;';

    const SHIELD_HINT = { ballistic: 'Partial vs shields', energy: 'Blocked by shields', missile: 'Bypasses shields', emp: 'Bypasses shields', nexus_energy: 'Bypasses shields' };

    for (const wpn of startWeapons) {
      const card = document.createElement('div');
      const isSelected = this.selectedWeaponId === wpn.id;
      card.style.cssText = `padding:var(--space-sm); margin-bottom:var(--space-sm); border:2px solid ${isSelected ? 'var(--text-accent)' : 'var(--border)'}; background:${isSelected ? 'var(--bg-tertiary)' : 'var(--bg-card)'}; cursor:pointer;`;

      const emoji = wpn.type === 'nexus_energy' ? '◈' : (wpn.emoji || '⚔');
      const ammoText = wpn.stats.ammo != null ? ` | AMMO ${wpn.stats.ammo}` : '';
      const chargeText = wpn.stats.special_charges > 0 ? ` | CHG ${wpn.stats.special_charges}` : '';
      card.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:baseline;">
          <span style="font-weight:bold; color:${isSelected ? 'var(--text-accent)' : 'var(--text-primary)'};">${emoji} ${wpn.name}</span>
          <span style="color:var(--text-muted); font-size:var(--font-size-sm);">T${wpn.tier} ${wpn.type}</span>
        </div>
        <div style="color:var(--text-secondary); font-size:var(--font-size-sm); margin-top:var(--space-xs);">DMG ${wpn.stats.damage} | SPD ${wpn.stats.speed_modifier >= 0 ? '+' : ''}${wpn.stats.speed_modifier} | RNG ${wpn.stats.range}${ammoText}${chargeText}</div>
        <div style="color:var(--text-muted); font-size:var(--font-size-sm);">${SHIELD_HINT[wpn.type] || ''}</div>
        <div style="color:var(--text-secondary); font-size:var(--font-size-sm); margin-top:var(--space-xs); font-style:italic;">${wpn.flavor}</div>
      `;

      if (wpn.tier === 3) card.style.borderColor = isSelected ? 'var(--color-nexus)' : 'var(--color-nexus)';
      if (wpn.irremovable) card.innerHTML += '<div style="color:var(--color-warning); font-size:var(--font-size-sm);">[⬡] Irremovable once equipped</div>';

      card.addEventListener('click', () => {
        this.selectedWeaponId = wpn.id;
        Game.render();
      });

      weaponArea.appendChild(card);
    }

    screen.appendChild(weaponArea);
    this._renderNavButtons(screen, 'supplies', 'confirm', 'REVIEW →');
  },

  // ─── Phase 6: Confirm ──────────────────────────────────────────

  _renderConfirm(screen) {
    const hdr = document.createElement('div');
    hdr.style.cssText = 'text-align:center; margin-bottom:var(--space-lg); width:100%;';
    const unused = this._getRemaining();
    hdr.innerHTML = `
      <div class="section-header" style="border-bottom:none;">RECONSTRUCTION SUMMARY</div>
      ${unused > 0 ? `<div style="color:var(--color-warning); font-size:var(--font-size-sm);">${unused} unspent point${unused > 1 ? 's' : ''} — go back to allocate</div>` : ''}
    `;
    screen.appendChild(hdr);

    const area = document.createElement('div');
    area.style.cssText = 'width:100%; max-width:400px; overflow-y:auto; flex-shrink:1; font-size:var(--font-size-sm);';

    // Systems summary
    let systemLines = '';
    for (const [key, info] of Object.entries(this.SYSTEM_INFO)) {
      const lv = 1 + this.systems[key];
      systemLines += `<div style="display:flex; justify-content:space-between; padding:2px 0;"><span>${info.emoji} ${info.label}</span><span style="color:var(--text-accent);">Lv ${lv}</span></div>`;
    }
    area.innerHTML += `<div style="margin-bottom:var(--space-md);"><div style="color:var(--text-muted); text-transform:uppercase; margin-bottom:var(--space-xs);">Ship Systems</div>${systemLines}</div>`;

    // Captain summary
    let capLines = '';
    for (const [key, info] of Object.entries(this.CAPTAIN_STAT_INFO)) {
      capLines += `<div style="display:flex; justify-content:space-between; padding:2px 0;"><span>${info.emoji} ${info.label}</span><span style="color:var(--text-accent);">${1 + this.captainStats[key]}</span></div>`;
    }
    const abilName = this.captainAbility ? this.CAPTAIN_ABILITIES.find(a => a.id === this.captainAbility)?.name || 'None' : 'None';
    capLines += `<div style="display:flex; justify-content:space-between; padding:2px 0; margin-top:var(--space-xs);"><span>Ability</span><span style="color:var(--text-accent);">${abilName}</span></div>`;
    area.innerHTML += `<div style="margin-bottom:var(--space-md);"><div style="color:var(--text-muted); text-transform:uppercase; margin-bottom:var(--space-xs);">Captain</div>${capLines}</div>`;

    // Crew summary
    let crewLine = this.crewChoices.length > 0
      ? this.crewChoices.map(c => `${(this.ROLE_INFO[c.role]?.emoji || '')} ${c.role}`).join(', ')
      : 'None recruited';
    area.innerHTML += `<div style="margin-bottom:var(--space-md);"><div style="color:var(--text-muted); text-transform:uppercase; margin-bottom:var(--space-xs);">Crew (${this.crewChoices.length})</div><div>${crewLine}</div></div>`;

    // Supplies summary
    const credits = 50 + this.supplies.credits * 30;
    const fuel = 8 + this.supplies.fuel * 2;
    area.innerHTML += `<div style="margin-bottom:var(--space-md);"><div style="color:var(--text-muted); text-transform:uppercase; margin-bottom:var(--space-xs);">Supplies</div><div>₢${credits} credits, ${fuel} fuel</div></div>`;

    // Weapon summary
    if (this.selectedWeaponId) {
      const wpn = Registry.getWeapon(this.selectedWeaponId);
      if (wpn) {
        area.innerHTML += `<div><div style="color:var(--text-muted); text-transform:uppercase; margin-bottom:var(--space-xs);">Weapon</div><div>${wpn.emoji || '⚔'} ${wpn.name} (T${wpn.tier} ${wpn.type})</div></div>`;
      }
    }

    screen.appendChild(area);

    // Launch button
    const nav = document.createElement('div');
    nav.style.cssText = 'display:flex; gap:var(--space-sm); width:100%; max-width:400px; margin-top:var(--space-lg);';

    const back = document.createElement('button');
    back.className = 'btn-confirm';
    back.style.cssText = 'flex:1; border-color:var(--border); color:var(--text-secondary);';
    back.textContent = '← BACK';
    back.addEventListener('click', () => { this.phase = 'weapon_select'; Game.render(); });

    const launch = document.createElement('button');
    launch.className = 'btn-confirm';
    launch.style.cssText = 'flex:2; background:var(--bg-tertiary);';
    launch.textContent = '▶ LAUNCH VESSEL';
    launch.addEventListener('click', () => this._confirmAllocation());

    nav.appendChild(back);
    nav.appendChild(launch);
    screen.appendChild(nav);
  },

  // ─── Apply Allocation ──────────────────────────────────────────

  _confirmAllocation() {
    const ship = GameState.run.ship;

    // Apply system levels
    for (const key of Object.keys(this.systems)) {
      if (ship.baseSystems[key]) {
        ship.baseSystems[key].level = 1 + this.systems[key];
      }
    }

    // Hull scales with shields_armor
    ship.hull = 60 + this.systems.shields_armor * 10 + this.systems.cargo_hold * 5;
    ship.maxHull = ship.hull;

    // Equip starting weapon
    if (this.selectedWeaponId) {
      ShipEngine.equipWeapon(this.selectedWeaponId);
    }

    // Apply captain stats
    const cap = GameState.run.captain;
    cap.stats.command = 1 + this.captainStats.command;
    cap.stats.intuition = 1 + this.captainStats.intuition;
    cap.stats.resolve = 1 + this.captainStats.resolve;
    if (this.captainAbility) {
      cap.abilities = [this.captainAbility];
    }

    // Generate crew from picks
    const crew = [];
    for (const choice of this.crewChoices) {
      crew.push(CrewEngine._createFromArchetype(choice.role, 0));
    }
    GameState.run.crew = crew;

    // Apply supplies
    GameState.run.credits = 50 + this.supplies.credits * 30;
    GameState.run.fuel = 8 + this.supplies.fuel * 2;

    // Generate map
    GameState.run.map = MapGenerator.generate();
    GameState.run.currentNodeId = GameState.run.map.startNodeId;
    GameState.run.depth = 0;

    // Reveal starting area
    const startNode = GameState.run.map.nodes.find(n => n.id === GameState.run.map.startNodeId);
    if (startNode) {
      startNode.visited = true;
      startNode.revealed = true;
      for (const edge of GameState.run.map.edges) {
        if (edge.from === startNode.id) {
          const target = GameState.run.map.nodes.find(n => n.id === edge.to);
          if (target) target.revealed = true;
        }
      }
    }

    GameState.addLog('system', 'The Nexus reconstructs. A new voyage begins.');
    GameState.screen = 'map';
    GameState.save();
    Tabs.activeTab = 'event';
    Game.render();
  },
};

/* Void Meridian — Combat Screen Renderer */

const CombatUI = {
  render(container) {
    const screen = document.createElement('div');
    screen.className = 'screen';

    const combat = GameState.run.activeCombat;
    if (!combat) {
      screen.innerHTML = '<p style="color:var(--text-muted)">No active combat.</p>';
      container.appendChild(screen);
      return;
    }

    // Enemy info
    const enemyHeader = document.createElement('div');
    enemyHeader.className = 'section-header';
    enemyHeader.textContent = `${combat.enemy.emoji || '🚀'} ${combat.enemy.name}`;
    screen.appendChild(enemyHeader);

    // Enemy hull
    const enemyHullPct = combat.enemy.maxHull > 0
      ? Math.round((combat.enemy.hull / combat.enemy.maxHull) * 100) : 0;
    screen.appendChild(this._statBar('ENEMY HULL', enemyHullPct, enemyHullPct <= 25 ? 'danger' : ''));

    screen.appendChild(Object.assign(document.createElement('hr'), { className: 'divider' }));

    // Player hull
    const ship = GameState.run.ship;
    const hullPct = ship.maxHull > 0 ? Math.round((ship.hull / ship.maxHull) * 100) : 0;
    screen.appendChild(this._statBar('YOUR HULL', hullPct, hullPct <= 25 ? 'danger' : hullPct <= 50 ? 'warning' : ''));

    // Turn indicator
    const turnInfo = document.createElement('div');
    turnInfo.className = 'system-label';
    turnInfo.style.cssText = 'margin:var(--space-md) 0;';
    turnInfo.textContent = `TURN ${combat.turn} — ${combat.playerTurn ? 'YOUR ACTION' : 'ENEMY ACTION'}`;
    screen.appendChild(turnInfo);

    if (combat.lastAction) {
      const actionLog = document.createElement('div');
      actionLog.className = 'narrative';
      actionLog.style.fontSize = 'var(--font-size-sm)';
      actionLog.textContent = combat.lastAction;
      screen.appendChild(actionLog);
    }

    screen.appendChild(Object.assign(document.createElement('hr'), { className: 'divider' }));

    // Player actions (only on player turn)
    if (combat.playerTurn) {
      const stations = [
        { id: 'weapons', label: '⚔ FIRE WEAPONS', desc: 'Attack the enemy ship' },
        { id: 'defense', label: '🛡 RAISE SHIELDS', desc: 'Reduce incoming damage' },
        { id: 'helm', label: '🚀 EVASIVE MANEUVER', desc: 'Chance to dodge next attack' },
        { id: 'engineering', label: '🔧 REPAIR', desc: 'Restore hull integrity' },
        { id: 'tactical', label: '📡 SCAN', desc: 'Reveal enemy weakness' },
      ];

      for (const station of stations) {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.innerHTML = `${station.label}<br><span style="font-size:var(--font-size-sm);color:var(--text-secondary)">${station.desc}</span>`;
        btn.addEventListener('click', () => CombatEngine.playerAction(station.id));
        screen.appendChild(btn);
      }

      // Flee / Surrender
      screen.appendChild(Object.assign(document.createElement('hr'), { className: 'divider' }));

      const fleeBtn = document.createElement('button');
      fleeBtn.className = 'choice-btn';
      fleeBtn.style.borderColor = 'var(--color-warning)';
      fleeBtn.textContent = '🏃 FLEE';
      fleeBtn.addEventListener('click', () => CombatEngine.attemptFlee());
      screen.appendChild(fleeBtn);

      const surrenderBtn = document.createElement('button');
      surrenderBtn.className = 'choice-btn';
      surrenderBtn.style.borderColor = 'var(--color-danger)';
      surrenderBtn.textContent = '🏳 SURRENDER';
      surrenderBtn.addEventListener('click', () => CombatEngine.surrender());
      screen.appendChild(surrenderBtn);
    }

    container.appendChild(screen);
  },

  _statBar(label, percent, variant) {
    const filled = Math.round(percent / 10);
    const empty = 10 - filled;
    const el = document.createElement('div');
    el.className = 'stat-bar' + (variant ? ` ${variant}` : '');
    el.innerHTML = `<span class="system-label">${label}</span> <span class="stat-bar-fill">${'█'.repeat(filled)}</span><span class="stat-bar-empty">${'░'.repeat(empty)}</span> ${percent}%`;
    return el;
  },
};

/* Void Meridian — Main Entry Point & Game Loop */

const Game = {
  init() {
    // Load content registry
    Registry.loadAll();

    // Attempt to load saved game
    const loaded = GameState.load();
    if (!loaded) {
      GameState.screen = 'title';
    }

    // If we loaded into a run that was on the reconstruction screen, restart it
    if (GameState.screen === 'reconstruction') {
      ReconstructionUI.phase = 'allocation';
    }

    this.render();
  },

  render() {
    const app = document.getElementById('app');
    app.innerHTML = '';

    switch (GameState.screen) {
      case 'title':
        this._renderTitle(app);
        break;
      case 'reconstruction':
        ReconstructionUI.render(app);
        break;
      case 'map':
      case 'event':
      case 'combat':
        this._renderRunScreen(app);
        break;
      case 'gameOver':
        this._renderGameOver(app);
        break;
      case 'ending':
        this._renderEnding(app);
        break;
      default:
        this._renderTitle(app);
    }
  },

  _renderTitle(app) {
    const screen = document.createElement('div');
    screen.className = 'fullscreen title-screen';

    screen.innerHTML = `
      <div class="game-title">VOID MERIDIAN</div>
      <div class="game-subtitle">A roguelike in the space between deaths</div>
    `;

    // New Game button
    const newBtn = document.createElement('button');
    newBtn.className = 'btn-confirm';
    newBtn.style.cssText = 'max-width:300px; margin-bottom:var(--space-md);';
    newBtn.textContent = 'NEW VOYAGE';
    newBtn.addEventListener('click', () => {
      GameState.startNewRun();
      ReconstructionUI.start();
    });
    screen.appendChild(newBtn);

    // Continue button (if save exists)
    if (GameState.run.active) {
      const contBtn = document.createElement('button');
      contBtn.className = 'btn-confirm';
      contBtn.style.cssText = 'max-width:300px; margin-bottom:var(--space-md);';
      contBtn.textContent = 'CONTINUE';
      contBtn.addEventListener('click', () => {
        GameState.screen = 'map';
        this.render();
      });
      screen.appendChild(contBtn);
    }

    // Resonance display
    if (GameState.meta.resonance > 0) {
      const res = document.createElement('div');
      res.style.cssText = 'margin-top:var(--space-xl); color:var(--color-nexus); font-size:var(--font-size-sm);';
      res.textContent = `RESONANCE: ${GameState.meta.resonance}`;
      screen.appendChild(res);
    }

    // Run count
    if (GameState.meta.totalRuns > 0) {
      const runs = document.createElement('div');
      runs.style.cssText = 'color:var(--text-muted); font-size:var(--font-size-sm); margin-top:var(--space-sm);';
      runs.textContent = `Voyages: ${GameState.meta.totalRuns}`;
      screen.appendChild(runs);
    }

    app.appendChild(screen);
  },

  _renderRunScreen(app) {
    // Header bar with resources
    const header = document.createElement('div');
    header.className = 'header-bar';
    header.innerHTML = `
      <span class="resource">◈ S${GameState.run.depth}</span>
      <span class="resource">HULL <span class="resource-value">${GameState.run.ship.hull}/${GameState.run.ship.maxHull}</span></span>
      <span class="resource">₢<span class="resource-value">${GameState.run.credits}</span></span>
      <span class="resource">⛽<span class="resource-value">${GameState.run.fuel}</span></span>
    `;
    app.appendChild(header);

    // Active screen content
    if (GameState.screen === 'combat' && GameState.run.activeCombat) {
      CombatUI.render(app);
    } else {
      // Tab content
      const contentArea = document.createElement('div');
      contentArea.style.cssText = 'flex:1; display:flex; flex-direction:column; overflow:hidden;';

      switch (Tabs.activeTab) {
        case 'map':
          MapUI.render(contentArea);
          break;
        case 'event':
          EventUI.render(contentArea);
          break;
        case 'crew':
          CrewUI.render(contentArea);
          break;
        case 'log':
          LogUI.render(contentArea);
          break;
      }

      app.appendChild(contentArea);
    }

    // Tab bar
    Tabs.render(app);
    Tabs.setVisible(GameState.screen !== 'combat');
  },

  _renderGameOver(app) {
    const screen = document.createElement('div');
    screen.className = 'fullscreen';
    screen.innerHTML = `
      <div style="text-align:center;">
        <div style="font-size:var(--font-size-xl); color:var(--color-danger); margin-bottom:var(--space-md);">VESSEL LOST</div>
        <div style="color:var(--text-secondary); margin-bottom:var(--space-lg);">The Meridian is gone. But the Nexus remembers.</div>
      </div>
    `;

    const btn = document.createElement('button');
    btn.className = 'btn-confirm';
    btn.style.maxWidth = '300px';
    btn.textContent = 'RECONSTRUCTION';
    btn.addEventListener('click', () => {
      const gained = NexusEngine.accumulateRunResonance();
      GameState.startNewRun();
      ReconstructionUI.start();
    });
    screen.appendChild(btn);
    app.appendChild(screen);
  },

  _renderEnding(app) {
    const screen = document.createElement('div');
    screen.className = 'fullscreen';

    if (NexusEngine.checkTrueEnding()) {
      screen.innerHTML = `
        <div style="text-align:center; max-width:80vw;">
          <div style="font-size:var(--font-size-xl); color:var(--color-nexus); margin-bottom:var(--space-lg);">THE WOUND CLOSES</div>
          <div style="color:var(--text-secondary); line-height:1.8;">
            The Nexus falls silent for the first time. The pattern is complete.<br><br>
            You are free. Or perhaps you always were.
          </div>
        </div>
      `;
    } else {
      screen.innerHTML = `
        <div style="text-align:center;">
          <div style="font-size:var(--font-size-xl); color:var(--text-accent);">TO BE CONTINUED</div>
        </div>
      `;
    }

    const btn = document.createElement('button');
    btn.className = 'btn-confirm';
    btn.style.cssText = 'max-width:300px; margin-top:var(--space-xl);';
    btn.textContent = 'RETURN TO TITLE';
    btn.addEventListener('click', () => {
      GameState.screen = 'title';
      this.render();
    });
    screen.appendChild(btn);
    app.appendChild(screen);
  },
};

// Boot
document.addEventListener('DOMContentLoaded', () => Game.init());

  </script>
</body>
</html>
