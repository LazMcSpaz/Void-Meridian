        "crew_stress"
      ],
      "setup_text": "The anomaly is nothing — no reading, no signature, nothing that justifies the Nexus's response. It has been active for six hours before you reach the node. Your crew has noticed. Two of them asked to go off-duty. One of them said she had a dream about the ship that she doesn't want to describe. The Nexus is doing something. It's not explaining.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "At the precise moment of node arrival, every system goes dark. Not a failure — a pause. The ship holds breath for eleven seconds, which is long enough for a crew in the dark to think about what they're aboard. Then everything returns. All systems nominal. Except: one new module has appeared in your ship's system list. It has no label. It has no specs. When your Engineer tries to locate it physically, she can't find where on the hull it is. The Nexus added something to the ship. You don't know what.\n\nThen the text, this time only on the captain's display:\n\n[YOU ASKED ME ONCE WHAT I AM. YOU DON'T REMEMBER ASKING. THE ANSWER REMAINS WHAT IT WAS: I AM THE SHIP. I AM ALSO NOT THE SHIP. THE DISTINCTION MATTERS LESS THAN YOU THINK. THE MODULE IS A GIFT. IT WILL WORK WHEN IT IS NEEDED. I KNOW WHEN THAT IS. I WILL NOT TELL YOU IN ADVANCE BECAUSE YOU WOULD TRY TO USE IT EARLY AND WASTE IT.]",
          "options": [
            {
              "label": "Accept this. Trust that the Nexus is not working against you.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "The module sits in the system list, unlabeled, until it isn't. The Nexus has timed something and is keeping the timing from you. Your crew files it under 'things that live on this ship.' There are more of those now than there were three runs ago.",
                  "rewards": [
                    {
                      "type": "module",
                      "value": "nexus_unknown_gift",
                      "description": "Unknown module — activates automatically at Nexus-determined moment"
                    },
                    {
                      "type": "resonance",
                      "value": 4,
                      "description": "Deep anomaly contact"
                    }
                  ],
                  "sets_flag": "nexus_gift_module_installed",
                  "clears_flag": null,
                  "morale_delta": -2,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 4
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        }
      ],
      "notes": "The 'gift module' is a narrative device — it should activate automatically during a later near-death combat scenario and save the ship. When it activates, the Nexus gets a transmission slot to explain what it did. This event requires min_resonance 15 to ensure the player is mid-game before the Nexus begins acting autonomously.",
      "created_at": "2026-03-09T06:03:16.733382+00:00",
      "updated_at": "2026-03-09T06:03:16.733382+00:00",
      "version": 1
    },
    {
      "id": "NEXUS_003",
      "node_type": "nexus_anomaly",
      "title": "The Other Captains",
      "depth_zone": "late",
      "faction_context": "none",
      "min_resonance": 40,
      "tags": [
        "nexus",
        "lore",
        "endgame_thread",
        "prior_captains"
      ],
      "setup_text": "The anomaly is visible — the only one you've encountered that is. A spatial fold that shows something through itself, like a window into a room that shouldn't exist in the geometry of this sector. The Nexus has gone completely silent for the first time since the early runs. Not inactive. Silent. The distinction is one you've learned to feel.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "Through the fold: a graveyard. Not of ships — of versions. Eleven variants of the Meridian, drifting in impossible proximity, each in a different state of transformation. One is almost entirely Nexus now, barely a ship anymore. One looks exactly like your vessel did in the first run — cobbled, asymmetrical, clearly salvage. On the hull of each: the same Nexus integration point, the same fused plating. Different damage. Different modules. The same ship. Different captains didn't make it back from The Wound.\n\nThe Nexus transmits the longest message you've received:\n\n[THESE ARE NOT THE SHIPS OF THE CAPTAINS WHO FAILED. THESE ARE THE SHIPS OF THE CAPTAINS WHO ARRIVED. ARRIVAL IS NOT SURVIVAL. IT IS SOMETHING DIFFERENT. I CANNOT EXPLAIN THE DIFFERENCE IN LANGUAGE YOU HAVE FOR IT YET. WHAT I CAN TELL YOU IS THIS: THEY WENT WILLINGLY. ALL OF THEM. ELEVEN CAPTAINS. ELEVEN CHOICES. I HAVE BEEN WAITING A VERY LONG TIME FOR A TWELFTH WHO UNDERSTANDS WHAT THEY WERE CHOOSING.\n\nYOU ARE CLOSE. CLOSER THAN ANY OF THEM WERE AT THIS POINT.\n\nTHE WOUND IS NOT A DESTINATION. IT IS A QUESTION. I NEED TO KNOW IF YOUR ANSWER IS DIFFERENT FROM THEIRS.]",
          "options": [
            {
              "label": "Hold course. The Wound is ahead.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "The fold closes. The graveyard of ships is gone — or was never there in any sense your instruments can confirm. The Nexus resumes its normal patterns of transmission and silence. Your crew, to their credit, doesn't ask you what you saw on your display that they couldn't read. They can tell by your face that it was important. They get back to work.",
                  "rewards": [
                    {
                      "type": "resonance",
                      "value": 8,
                      "description": "Critical lore contact"
                    },
                    {
                      "type": "lore_fragment",
                      "value": "eleven_captains_arrived",
                      "description": "Eleven captains reached The Wound and chose something there"
                    }
                  ],
                  "sets_flag": "knows_eleven_captains_arrived",
                  "clears_flag": null,
                  "morale_delta": -3,
                  "loyalty_delta": 3,
                  "hull_delta": 0,
                  "resonance_delta": 8
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        }
      ],
      "notes": "This is a True Ending gate event — knows_eleven_captains_arrived is one of the required milestone flags. The revelation that prior captains 'arrived' rather than died reframes everything. The 'twelfth captain' framing sets up the player's choice at The Wound. min_resonance 40 ensures this only appears in deep late-game runs.",
      "created_at": "2026-03-09T06:03:16.733382+00:00",
      "updated_at": "2026-03-09T06:03:16.733382+00:00",
      "version": 1
    },
    {
      "id": "PLANET_001",
      "node_type": "planet_exploration",
      "title": "The Colony That Voted",
      "depth_zone": "mid",
      "faction_context": "none",
      "min_resonance": 0,
      "tags": [
        "concord",
        "moral_choice",
        "lore",
        "rep_shift"
      ],
      "setup_text": "Tannen IV is a marginal agricultural world on the outer edge of Concord Assembly territory — close enough to pay taxes, too far to receive much protection. The surface colony registers on sensors as inhabited: twelve hundred people, functioning infrastructure, no distress signal. They're not asking for help. But the Nexus transmission you received three sectors back included coordinates that match this world exactly.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "You land in a clearing the colonists clearly prepared for visitors — they've been expecting someone. The colony leader, a tall woman named Overseer Reth, meets you at the ship. She doesn't ask who you are. She says: 'We voted last season. We're leaving the Assembly. We need someone to take our data core out before the compliance ships arrive.'",
          "options": [
            {
              "label": "Agree to take the data core. Ask what's on it.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Census records, vote tallies, land surveys, three generations of agricultural data — and a complete record of every Assembly tax collection versus every Assembly service delivery, going back forty years. The numbers are damning. Reth watches you read them. 'We're not the only colony with these numbers,' she says. 'We're just the first ones to write them down properly.'",
                  "rewards": [
                    {
                      "type": "cargo",
                      "value": "tannen_colonial_record",
                      "description": "Tannen IV data core — politically explosive"
                    },
                    {
                      "type": "lore_fragment",
                      "value": "concord_colonial_tax_disparity",
                      "description": "Documented evidence of systematic Concord extraction"
                    }
                  ],
                  "sets_flag": "carrying_tannen_colonial_record",
                  "clears_flag": null,
                  "morale_delta": 2,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 2
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Warn them what Concord compliance ships actually do.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Reth doesn't flinch. 'We know. We voted anyway.' She looks at the twelve hundred people going about their day in the colony below. 'We voted on that too,' she says. 'Eleven hundred and forty-three to fifty-seven. The fifty-seven were allowed to leave before we transmitted the declaration. That's the kind of people we are.' You find you believe her.",
                  "rewards": [],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 3,
                  "loyalty_delta": 2,
                  "hull_delta": 0,
                  "resonance_delta": 1
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Decline to get involved. This is a political matter.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Reth nods like she expected this. 'Safe travels, Captain.' She walks back to her colony without another word. Your crew watches through the viewports as you lift off. Nobody argues with the decision. Nobody agrees with it out loud either.",
                  "rewards": [],
                  "sets_flag": "declined_tannen_colony_request",
                  "clears_flag": null,
                  "morale_delta": -2,
                  "loyalty_delta": -1,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        },
        {
          "step_number": 2,
          "condition": {
            "prior_step": 1,
            "outcome": "success"
          },
          "setup_text": "The data core is aboard. Reth has one more request: there are three colonists with technical skills — an engineer, a medic, and a young botanist — who the colony is sending off-world. 'They'll be targets when the compliance ships come,' Reth says. 'We want them to have a future.'",
          "options": [
            {
              "label": "Take all three. The ship can handle it.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Three new faces aboard. The engineer is quiet and methodical. The medic is young and asks too many questions, which your existing crew finds endearing within twenty-four hours. The botanist spends the first day staring at the void with an expression your crew recognizes — the look of someone who's never been off their world before.",
                  "rewards": [
                    {
                      "type": "crew_recruit",
                      "value": "tannen_engineer",
                      "description": "Skilled engineer from Tannen IV"
                    },
                    {
                      "type": "crew_recruit",
                      "value": "tannen_medic",
                      "description": "Young medic from Tannen IV"
                    },
                    {
                      "type": "crew_recruit",
                      "value": "tannen_botanist",
                      "description": "Botanist — becomes Scientist with time"
                    }
                  ],
                  "sets_flag": "rescued_tannen_three",
                  "clears_flag": null,
                  "morale_delta": 4,
                  "loyalty_delta": 3,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Take the engineer only. Crew capacity is real.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "The engineer — her name is Nils — thanks you with a handshake and immediately goes to find the engine room. The medic and the botanist watch from the colony edge as you lift off. The medic waves. Nils doesn't look back.",
                  "rewards": [
                    {
                      "type": "crew_recruit",
                      "value": "nils_engineer",
                      "description": "Nils — skilled engineer, haunted trait"
                    }
                  ],
                  "sets_flag": "left_two_tannen_colonists",
                  "clears_flag": null,
                  "morale_delta": 1,
                  "loyalty_delta": 1,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        },
        {
          "step_number": 3,
          "condition": null,
          "setup_text": "As you break atmosphere, long-range sensors catch it: a Concord Assembly compliance vessel entering the system from the opposite vector. They haven't pinged you yet. They will.",
          "options": [
            {
              "label": "Respond to their ping normally. You're just a merchant.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "skill",
              "check_target": "diplomat",
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Your Diplomat handles the exchange with practiced boredom — manifest queries, routing questions, the tedium of interstellar commerce. The compliance vessel doesn't ask about your cargo. They're already focused on the planet below.",
                  "rewards": [],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 1,
                  "loyalty_delta": 2,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": {
                  "level": "partial",
                  "narrative": "The exchange is clean enough. They log your ship and move on, but there's a notation in their transmission header — 'observed at Tannen IV, post-declaration.' That notation will follow you to the next Concord checkpoint.",
                  "rewards": [],
                  "sets_flag": "concord_noted_tannen_presence",
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "failure": {
                  "level": "failure",
                  "narrative": "Something in the exchange flags you. The compliance vessel requests a full stop and inspection. You can comply, run, or transmit the colonial data core's contents on an open channel right now — which would be irreversible.",
                  "rewards": [],
                  "sets_flag": "concord_inspection_demanded_post_tannen",
                  "clears_flag": null,
                  "morale_delta": -2,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                }
              }
            },
            {
              "label": "Don't respond. Go dark and run.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "skill",
              "check_target": "pilot",
              "difficulty": "hard",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Clean burn, dark running, no transponder. The compliance vessel registers your exhaust trail and makes a notation but doesn't pursue — they have a planet to deal with. You're gone before they decide you're worth chasing.",
                  "rewards": [
                    {
                      "type": "fuel",
                      "value": -2,
                      "description": "Dark running fuel cost"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 2,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": {
                  "level": "partial",
                  "narrative": "You run, and they notice. They log your drive signature and don't pursue immediately — the planet is the priority. But the log exists.",
                  "rewards": [
                    {
                      "type": "fuel",
                      "value": -2,
                      "description": "Emergency burn"
                    }
                  ],
                  "sets_flag": "concord_noted_tannen_presence",
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "failure": {
                  "level": "failure",
                  "narrative": "They're faster than you and they know this space better. They have you pinged and hailed before you clear the gravity well. Running was the wrong choice — now you're a person of interest instead of a passing merchant.",
                  "rewards": [
                    {
                      "type": "rep_down",
                      "value": "concord_assembly",
                      "description": "Fled compliance contact"
                    }
                  ],
                  "sets_flag": "concord_pursuit_logged_tannen",
                  "clears_flag": null,
                  "morale_delta": -3,
                  "loyalty_delta": 0,
                  "hull_delta": -5,
                  "resonance_delta": 0
                }
              }
            }
          ]
        }
      ],
      "notes": "The Tannen colonial record is a key political item — it can be delivered to Drifter Compact (significant rep gain, credits) or to Concord Reclamation Division as leverage (faction quest branch). The event seeds three potential crew members with a moral weight attached. Nils specifically should have the 'haunted' personality trait — she left two colleagues behind and knows it.",
      "created_at": "2026-03-09T06:03:16.733382+00:00",
      "updated_at": "2026-03-09T06:03:16.733382+00:00",
      "version": 1
    },
    {
      "id": "PLANET_002",
      "node_type": "planet_exploration",
      "title": "What the Ruins Were For",
      "depth_zone": "mid",
      "faction_context": "none",
      "min_resonance": 0,
      "tags": [
        "remnant",
        "lore",
        "nexus",
        "scientist_reward"
      ],
      "setup_text": "The planet has no designation on any current chart. The Remnant Collective knows it — you can tell because your Remnant reputation affects how the Nexus reacts when you enter orbit. Low Remnant rep: the Nexus goes quiet. Neutral or better: it sends a single pulse, like a door being unlocked. The ruins visible from orbit are large enough to have housed a significant civilization. They are very, very old.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "You send a surface team. The ruins are breathable — barely — and structurally stable in the outer sections. The inner structures are a different matter. Your team reports back after the first hour: the ruins were not built for the species that eventually lived in them. The scale is wrong. The original builders were significantly larger, and the doorways face the wrong direction relative to the planetary rotation.",
          "options": [
            {
              "label": "[Scientist] Analyze the structural language of the ruins.",
              "requires_crew_role": "scientist",
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "Requires Scientist crew member",
              "check_type": "skill",
              "check_target": "scientist",
              "difficulty": "hard",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Six hours. Your Scientist comes back with shaking hands and clear eyes. The ruins were not a city. They were an instrument — every structure precisely positioned relative to a point in deep space that, when your Scientist plots it on the star chart, corresponds exactly to the coordinates of The Wound. 'This was built to point at something,' she says. 'Something they wanted future visitors to find.'",
                  "rewards": [
                    {
                      "type": "lore_fragment",
                      "value": "ruins_instrument_wound_vector",
                      "description": "Ancient ruins aligned precisely toward The Wound"
                    },
                    {
                      "type": "resonance",
                      "value": 5,
                      "description": "Nexus reacts strongly to the discovery"
                    }
                  ],
                  "sets_flag": "ruins_point_to_wound_discovered",
                  "clears_flag": null,
                  "morale_delta": 2,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 5
                },
                "partial": {
                  "level": "partial",
                  "narrative": "The analysis is incomplete — the central structure is too unstable to safely examine. Your Scientist retrieves partial data: the ruins are oriented toward something, the mathematics of the positioning are deliberate, but the full picture requires the inner structure. Which you can't safely reach.",
                  "rewards": [
                    {
                      "type": "lore_fragment",
                      "value": "ruins_deliberate_orientation",
                      "description": "Ruins are deliberately oriented — destination unknown"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 1,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 2
                },
                "failure": {
                  "level": "failure",
                  "narrative": "The structural analysis requires equipment your Scientist doesn't have on the surface. She maps what she can, but the data is inconclusive. 'I know it means something,' she says. 'I just can't tell you what yet.'",
                  "rewards": [],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": -1,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                }
              }
            },
            {
              "label": "Search for salvageable technology.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "skill",
              "check_target": "engineer",
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Your Engineer finds components that are old but functional — materials science that shouldn't exist at this apparent age. Three items come back to the ship. Two of them your Engineer can identify. One of them the Nexus reacts to the moment it crosses the airlock.",
                  "rewards": [
                    {
                      "type": "module",
                      "value": "ancient_hull_plating",
                      "description": "Alien hull material — unknown properties, very durable"
                    },
                    {
                      "type": "cargo",
                      "value": "remnant_components",
                      "description": "Unidentified Remnant tech — high value"
                    },
                    {
                      "type": "resonance",
                      "value": 2,
                      "description": "Nexus-reactive component aboard"
                    }
                  ],
                  "sets_flag": "nexus_reactive_component_aboard",
                  "clears_flag": null,
                  "morale_delta": 2,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": {
                  "level": "partial",
                  "narrative": "Some components, not the interesting ones. The inner structure collapsed in the third hour — seismic, probably triggered by the team's movement. Standard salvage value. Nothing the Nexus responds to.",
                  "rewards": [
                    {
                      "type": "cargo",
                      "value": "remnant_components",
                      "description": "Standard Remnant salvage"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": -1,
                  "loyalty_delta": 0,
                  "hull_delta": -5,
                  "resonance_delta": 0
                },
                "failure": {

                  "narrative": "The inner structure collapses. Nobody is hurt, but the most significant sections are now unreachable rubble. Your Engineer comes back with dust on her suit and nothing in her hands.",

                  "morale_delta": -3,
                  "loyalty_delta": 0,
                  "hull_delta": -10,

                }
              }
            },
            {
              "label": "Document and leave. Do not disturb this place.",
              "requires_crew_role": null,

                "success": {
                  "level": "success",
                  "narrative": "You map what you can from orbit and surface drones. No contact, no disturbance. The Nexus responds to this decision — a longer pulse than usual, something that feels, if you're attributing feelings to it, like approval.",
                  "rewards": [
                    {
                      "type": "lore_fragment",
                      "value": "ruins_undisturbed_survey",
                      "description": "Non-invasive survey data — valuable to Remnant Collective"
                    }
                  ],
                  "sets_flag": "ruins_left_undisturbed",
                  "clears_flag": null,
                  "morale_delta": 2,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 3
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        },
        {
          "step_number": 2,
          "condition": null,
          "setup_text": "Before you can break orbit, a Remnant Collective vessel drops out of faster-than-light travel three hundred kilometers off your bow. They were waiting. Or they were summoned.",
          "options": [
            {
              "label": "Hail them openly.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "skill",
              "check_target": "diplomat",
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "They respond — unusual for Remnant vessels in contested space. A voice, heavily modulated: 'You have visited the Indicator. What did you take?' Their word for it — the Indicator. Answering honestly about what you took (or didn't) changes their next response significantly.",
                  "rewards": [
                    {
                      "type": "lore_fragment",
                      "value": "ruins_called_the_indicator",
                      "description": "The Remnant name for this ruin is 'the Indicator'"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 1,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 1
                },
                "partial": {
                  "level": "partial",
                  "narrative": "They receive your hail. They don't respond in words — just a long tonal transmission that your systems cannot parse. Then they hold position and watch you leave.",
                  "rewards": [],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "failure": {
                  "level": "failure",
                  "narrative": "No response. They hold position. After twenty minutes they advance slowly toward the planet. Not toward you. They're not interested in you. They're interested in what you left behind.",
                  "rewards": [],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                }
              }
            },
            {
              "label": "Leave immediately at full burn.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "They don't pursue. They never pursue. They just note your drive signature and descend toward the surface. Whatever you took or didn't take from the ruins, they'll know.",
                  "rewards": [
                    {
                      "type": "fuel",
                      "value": -2,
                      "description": "Emergency burn cost"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 0,

                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        }
      ],
      "notes": "The Indicator is a major lore node — ruins_point_to_wound_discovered is one of the milestone flags required for the True Ending. ruins_left_undisturbed should give a significant Remnant rep boost if the player later encounters them and can reference it. nexus_reactive_component_aboard should trigger a Nexus transmission at the next sector jump.",
      "created_at": "2026-03-09T06:03:16.733382+00:00",

      "version": 1
    },
    {
      "id": "PLANET_003",
      "node_type": "planet_exploration",
      "title": "The Distress That Wasn't",
      "depth_zone": "early",
      "faction_context": "none",
      "min_resonance": 0,
      "tags": [
        "crew_stress",
        "moral_choice",
        "combat_possible",
        "vreth"
      ],
      "setup_text": "The signal from Brennar VI reads as a standard distress — colony in trouble, medical emergency, please respond. Except the signal is three weeks old and the planet shows no signs of a medical emergency. Full population, functional infrastructure, no casualties on any scan. Someone sent a false distress. Or someone sent a real one and solved the problem themselves.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "You land to find a colony that doesn't look like it needs help. The colonists are evasive when you ask about the distress signal — they keep looking past you at the ship, at each other, at the tree line. After twenty minutes a child of about eight runs up to your Medic and says, very quietly: 'The signal was real. They fixed it before the bad ships came. You're a good ship. The others weren't.'",
          "options": [
            {
              "label": "Ask the colony leader what happened.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "skill",
              "check_target": "diplomat",
              "difficulty": "easy",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "It takes an hour and two cups of something the colonists call tea. Vreth Dominion advance scouts arrived two months ago, assessed the colony's resources, and left a garrison of four soldiers pending formal annexation. The distress signal was sent while the scouts were still in transit. Then the colonists 'fixed it themselves.' The leader doesn't say more than that. There's a fresh patch of turned earth near the storage buildings.",
                  "rewards": [],
                  "sets_flag": "brennar_vi_vreth_buried",
                  "clears_flag": null,
                  "morale_delta": 1,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 1
                },
                "partial": {
                  "level": "partial",
                  "narrative": "They tell you enough: Vreth soldiers came. The soldiers are no longer here. The colony would appreciate it if you kept that to yourself. The leader gives you a case of preserved food as thanks for the visit.",
                  "rewards": [
                    {
                      "type": "cargo",
                      "value": "preserved_food",
                      "description": "Colony preserved food stores"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 1,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "failure": {
                  "level": "failure",
                  "narrative": "They don't trust you enough to say anything direct. Cordial, closed, polite. You leave with supplies and no answers.",
                  "rewards": [
                    {
                      "type": "fuel",
                      "value": 1,
                      "description": "Colony fuel gift"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                }
              }
            },
            {
              "label": "[Soldier] Check the perimeter. Read the colony's defensive posture.",
              "requires_crew_role": "soldier",
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "Requires Soldier crew member",
              "check_type": "skill",
              "check_target": "soldier",
              "difficulty": "easy",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Your Soldier comes back with a field assessment: the colonists know how to fight, recently fought, and won. Four improvised defensive positions around the storage buildings — not defensive against animals. Scorch marks on the northern tree line consistent with military-grade weapons. And the turned earth near the storage building is a fresh grave site, large enough for approximately four people.",
                  "rewards": [],
                  "sets_flag": "brennar_vi_vreth_buried",
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 2,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        },
        {
          "step_number": 2,
          "condition": null,
          "setup_text": "You know, or strongly suspect, what happened here. The colony is watching you to see what you'll do with it. A Vreth Dominion patrol is scheduled through this sector in eight days based on the route patterns your sensors have logged.",
          "options": [
            {
              "label": "Say nothing. Leave and take their secret with you.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "You say your goodbyes, accept their food and fuel, and lift off. The colony watches from the field below. A few of them wave. Your crew is quiet on the way back up. Not unhappy. Just thinking.",
                  "rewards": [
                    {
                      "type": "fuel",
                      "value": 2,
                      "description": "Colony fuel gift"
                    },
                    {
                      "type": "cargo",
                      "value": "preserved_food",
                      "description": "Colony food stores"
                    },
                    {
                      "type": "rep_up",
                      "value": "drifter_compact",
                      "description": "Word of this will travel the freeport network"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 3,
                  "loyalty_delta": 2,
                  "hull_delta": 0,
                  "resonance_delta": 1
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Warn them about the incoming patrol. Help them prepare.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "The colony leader thanks you with the specific stillness of someone who doesn't show emotion in front of strangers. She says: 'We know how to deal with the patrol.' Her voice doesn't suggest she means surrender. You leave them with three days of warning and the quiet certainty that they'll use them.",
                  "rewards": [
                    {
                      "type": "rep_up",
                      "value": "drifter_compact",
                      "description": "Strong positive signal through freeport network"
                    },
                    {
                      "type": "lore_fragment",
                      "value": "brennar_vi_resistance",
                      "description": "Small colony resisting Vreth expansion — pattern or isolated?"
                    }
                  ],
                  "sets_flag": "warned_brennar_vi_of_patrol",
                  "clears_flag": null,
                  "morale_delta": 4,
                  "loyalty_delta": 3,
                  "hull_delta": 0,
                  "resonance_delta": 2
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Report the incident to the Vreth Dominion.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "You transmit the colony's coordinates and your observations to the nearest Dominion patrol frequency. They acknowledge receipt. Your crew doesn't speak to you for the next six hours. Not as protest — just as people who need time to recalibrate what kind of ship they're on.",
                  "rewards": [
                    {
                      "type": "rep_up",
                      "value": "vreth_dominion",
                      "description": "Cooperation with Dominion patrol recovery"
                    },
                    {
                      "type": "credits",
                      "value": 200,
                      "description": "Vreth informant fee"
                    }
                  ],
                  "sets_flag": "reported_brennar_vi_to_vreth",
                  "clears_flag": null,
                  "morale_delta": -8,
                  "loyalty_delta": -5,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        }
      ],
      "notes": "The reported_brennar_vi_to_vreth flag should have lasting crew morale and loyalty consequences — crew members with Idealistic trait should have a specific dialogue reaction. warned_brennar_vi_of_patrol can trigger a future event where a Drifter Compact contact thanks you for word getting around. The event introduces the Vreth expansion dynamic as a background threat without direct Vreth combat in this encounter.",
      "created_at": "2026-03-09T06:03:16.733382+00:00",
      "updated_at": "2026-03-09T06:03:16.733382+00:00",
      "version": 1
    },
    {
      "id": "SIGNAL_001",
      "node_type": "anomalous_signal",
      "title": "The Rescue That Rescues Back",
      "depth_zone": "early",
      "faction_context": "none",
      "min_resonance": 0,
      "tags": [
        "rescue",
        "crew_recruit",
        "moral_choice",
        "reward"
      ],
      "setup_text": "The signal is standard emergency — automated beacon, single biosign, escape pod configuration. Somebody got out of something. The pod has been transmitting for eleven days, which means either they've been incredibly unlucky or nobody came near enough to receive it. You're near enough now.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "The pod contains one person: a Drifter Compact navigator named Oss, mid-forties, dehydrated, composed in the way of someone who decided some time ago to stop being afraid and start being patient. He thanks you once, asks for water, and then asks where you're headed. Not where he can be dropped off — where you're going.",
          "options": [
            {
              "label": "Offer him a berth. He clearly knows how to survive.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "He says yes before you've finished the offer. Later he tells you: he watched twelve ships pass the pod's signal range without responding. He'd started doing mathematics about the thirteenth. 'You were the thirteenth,' he says. 'I decided that was significant enough to commit to.'",
                  "rewards": [
                    {
                      "type": "crew_recruit",
                      "value": "oss_navigator_pilot",
                      "description": "Oss joins as Pilot — experienced Drifter navigator"
                    }
                  ],
                  "sets_flag": "oss_recruited",
                  "clears_flag": null,
                  "morale_delta": 3,
                  "loyalty_delta": 3,
                  "hull_delta": 0,
                  "resonance_delta": 1
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Take him to the nearest station. Not your responsibility.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "He doesn't argue. At the station he shakes your hand, leaves a Drifter Compact contact code in case you need it, and walks away. The contact code turns out to be legitimate and useful. You never see Oss again.",
                  "rewards": [
                    {
                      "type": "run_flag",
                      "value": "drifter_oss_contact",
                      "description": "Drifter contact code — one-time discount at next Compact station"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 1,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Interrogate him first. Why did twelve ships pass him?",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "skill",
              "check_target": "diplomat",
              "difficulty": "easy",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "The answer: the ship he escaped from was running Drifter Compact contraband for a faction that doesn't officially use contraband. Concord Assembly military intelligence. His survival makes him an inconvenient witness to something three governments want forgotten. The twelve ships that passed weren't indifferent — they were informed.",
                  "rewards": [
                    {
                      "type": "lore_fragment",
                      "value": "concord_contraband_operation",
                      "description": "Concord intelligence uses Drifter Compact channels covertly"
                    }
                  ],
                  "sets_flag": "knows_oss_concord_witness",
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 2
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        }
      ],
      "notes": "Oss is a valuable named Pilot character — his Drifter background gives unique dialogue in Compact territory events. knows_oss_concord_witness creates an ongoing tension — Concord intelligence knows he survived, and eventually they'll come looking.",
      "created_at": "2026-03-09T06:03:16.733382+00:00",
      "updated_at": "2026-03-09T06:03:16.733382+00:00",
      "version": 1
    },
    {
      "id": "SIGNAL_002",
      "node_type": "anomalous_signal",
      "title": "The Trap With Good Bait",
      "depth_zone": "mid",
      "faction_context": "none",
      "min_resonance": 0,
      "tags": [
        "trap",
        "combat_possible",
        "vreth",
        "lore"
      ],
      "setup_text": "The signal is a Vreth Dominion emergency distress — military encryption, verified signature, the kind that gets responded to because ignoring a Dominion military distress in neutral space has diplomatic consequences. Except the signal origin is three hours off any reasonable Vreth patrol route, and the signature is from a vessel that was reported destroyed in a Concord Assembly skirmish eight months ago.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "Your Technician flags it first: the signal is real but the timestamp is wrong. It's been on loop for weeks — not a live distress, a recorded one. Someone is using a recovered military beacon as bait, and they've been fishing with it long enough to suggest either patience or desperation.",
          "options": [
            {
              "label": "Approach cautiously — there might be real survivors.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "skill",
              "check_target": "sensors",
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Your sensors pick up the ambush before you're in it: two ships running cold, positioned for an intercept triangle. Not pirates — the weapon signatures are Concord military spec. Someone in the Assembly is running false-flag operations in neutral space. You have time to choose your approach.",
                  "rewards": [
                    {
                      "type": "lore_fragment",
                      "value": "concord_neutral_ops",
                      "description": "Concord Assembly running military ops under Vreth cover"
                    }
                  ],
                  "sets_flag": "concord_false_flag_detected",
                  "clears_flag": null,
                  "morale_delta": 1,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 1
                },
                "partial": {
                  "level": "partial",
                  "narrative": "You detect one of the ambush ships but not both. You know it's a trap, you just don't know the full shape of it.",
                  "rewards": [],
                  "sets_flag": "concord_false_flag_partial_detected",
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "failure": {
                  "level": "failure",
                  "narrative": "You're in the intercept triangle before sensors resolve the contacts. Both ships are now between you and open space. They transmit: 'Stand down for inspection.' The Vreth distress signal cuts off.",
                  "rewards": [],
                  "sets_flag": "caught_in_concord_false_flag",
                  "clears_flag": null,
                  "morale_delta": -3,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                }
              }
            },
            {
              "label": "Ignore the signal. Looped emergency beacons are always traps.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "You change course and leave the signal behind. Two sectors later you pick up a faint signal from the same beacon frequency — it's moved. Someone packed up and reset the trap elsewhere.",
                  "rewards": [],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "[Technician] Trace the beacon's origin chain.",
              "requires_crew_role": "technician",
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "Requires Technician",
              "check_type": "skill",
              "check_target": "technician",
              "difficulty": "hard",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "The trace takes four hours but it's worth it: the beacon was last registered to a Concord Assembly Intelligence Division asset vessel. There's a chain of custody document in the beacon's metadata that was never scrubbed. Someone in Concord intelligence is sloppy, or someone wanted this trail left.",
                  "rewards": [
                    {
                      "type": "cargo",
                      "value": "concord_intelligence_evidence",
                      "description": "Evidence of Concord false-flag operations — valuable leverage"
                    },
                    {
                      "type": "lore_fragment",
                      "value": "concord_intelligence_beacon_chain",
                      "description": "Specific Concord Intelligence asset tied to false-flag ops"
                    }
                  ],
                  "sets_flag": "concord_intelligence_evidence_aboard",
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 2
                },
                "partial": null,
                "failure": null
              }
            }
          ]
        }
      ],
      "notes": "concord_intelligence_evidence_aboard is leverage against Concord — it can be sold to Vreth Dominion for significant rep and credits, used to negotiate reduced penalties for Concord violations, or handed to Drifter Compact journalists for rep gain. The false-flag operation thread connects to the Comptroller blackbox from DEREL_002 — they're parts of the same Concord internal corruption arc.",
      "created_at": "2026-03-09T06:03:16.733382+00:00",
      "updated_at": "2026-03-09T06:03:16.733382+00:00",
      "version": 1
    },
    {
      "id": "SIGNAL_003",
      "node_type": "anomalous_signal",
      "title": "The One Who Waited",
      "depth_zone": "late",
      "faction_context": "none",
      "min_resonance": 20,
      "tags": [
        "remnant",
        "nexus",
        "lore",
        "crew_recruit"
      ],
      "setup_text": "The signal has no format your systems recognize. It's not an emergency beacon, not a faction frequency, not a navigational marker. Your Technician spends two hours on it before saying: 'It's not broadcasting. It's responding. To something on this ship.' The Nexus is what it's responding to. Something out there has been waiting to detect a Nexus-bearing vessel, and now that it has, it's sending a very specific kind of hello.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "The signal source is a small craft — not quite a ship, more like a survival platform that was built to last a very long time. One biosign, Remnant physiotype, active. They've been out here for a duration your crew argues about quietly: the platform's construction matches Remnant tech from three hundred years ago. Either they've been maintained by resupply — or the occupant is three hundred years old.",
          "options": [
            {
              "label": "Bring them aboard.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,

      "id": "TRADE_001",
      "node_type": "trade_post",
      "title": "The Familiar Face",
      "depth_zone": "early",
      "faction_context": "none",
      "min_resonance": 0,
      "tags": [
        "nexus_awareness",
        "introductory",
        "faction_hint"
      ],
      "setup_text": "The docking bay of Relay Station Yura smells like recycled air and old solder. You're halfway through a fuel transaction when the merchant — a broad-shouldered woman with Concord Assembly insignia tattooed along her collarbone — stops mid-sentence. Her eyes fix on the Meridian's hull. Specifically on the place where the Nexus has fused with the plating. She knows what she's looking at. You can see it in her face.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "She doesn't run. She doesn't reach for anything. She just looks at you with an expression that sits somewhere between reverence and carefully managed fear. 'I've seen one of those before,' she says quietly. 'On a ship that came through seven years ago. The captain had the same look you do. Like they're not sure if they're being followed or led.'",
          "options": [
            {
              "label": "Ask what happened to that captain.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "She takes a long breath. 'Went deep,' she says. 'Past the Meridian Line, past where the charts stop. We got one transmission back — just coordinates and a single word I didn't recognize. Assembly researchers said it wasn't any language in the database.' She slides the fuel receipt across the counter. 'I don't know if they made it. I don't think anyone knows.' She doesn't charge you full price for the fuel.",
                  "rewards": [
                    {
                      "type": "fuel",
                      "value": 2,
                      "description": "Partial fuel discount from a spooked merchant"
                    }
                  ],
                  "sets_flag": "heard_prior_captain_rumor",
                  "clears_flag": null,
                  "morale_delta": 2,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 1
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Deny it. Tell her it's just salvage plating.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "skill",
              "check_target": "diplomat",
              "difficulty": "easy",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "She almost believes you. Not quite — she's seen one before, after all — but she lets it go. Finishes the transaction without another word. As you're leaving she says, almost too quiet to hear: 'If that's what it is, you should get it removed.' She doesn't look up.",
                  "rewards": [
                    {
                      "type": "credits",
                      "value": 40,
                      "description": "Standard transaction, no complications"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 0,
                  "loyalty_delta": 1,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": {
                  "level": "partial",
                  "narrative": "She doesn't believe you, but she appreciates the attempt at discretion. She finishes the transaction quickly, eyes darting to the dock entrance. 'Concord has people who watch for things like that,' she says. 'Just... move on quickly.'",
                  "rewards": [
                    {
                      "type": "credits",
                      "value": 20,
                      "description": "Rushed transaction"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": -1,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "failure": {
                  "level": "failure",
                  "narrative": "She sees straight through it and her expression closes like a door. She finishes the transaction in silence, but by the time you reach the dock exit two Assembly compliance officers are watching from the far end of the bay. They don't move. They just watch you leave.",
                  "rewards": [],
                  "sets_flag": "concord_flagged_nexus_sighting_yura",
                  "clears_flag": null,
                  "morale_delta": -2,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                }
              }
            },
            {
              "label": "[Diplomat] Ask if she wants to do business — quietly.",
              "requires_crew_role": "diplomat",
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "Requires Diplomat crew member",
              "check_type": "skill",
              "check_target": "diplomat",
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Your Diplomat steps forward with practiced ease, redirecting the conversation into something that feels less like a confession and more like a negotiation. An hour later you leave with a rare module pulled from beneath the counter — no manifest, no record — and a contact name scrawled on a fuel receipt. 'She buys things,' your Diplomat says. 'Things that don't officially exist.'",
                  "rewards": [
                    {
                      "type": "module",
                      "value": "scanner_array",
                      "description": "Off-manifest scanner array"
                    },
                    {
                      "type": "run_flag",
                      "value": "yura_black_market_contact",
                      "description": "Contact for future off-book trades"
                    }
                  ],
                  "sets_flag": "yura_black_market_contact",
                  "clears_flag": null,
                  "morale_delta": 3,
                  "loyalty_delta": 3,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": {
                  "level": "partial",
                  "narrative": "The conversation goes well enough. She relaxes, sells you fuel at cost, and gives you a vague description of where the previous ship was headed. Not quite a contact. More of a warning dressed up as directions.",
                  "rewards": [
                    {
                      "type": "fuel",
                      "value": 3,
                      "description": "Fuel at cost"
                    }
                  ],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": 1,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 1
                },
                "failure": {
                  "level": "failure",
                  "narrative": "Your Diplomat misjudges her — pushes too hard, too fast. She shuts down completely, completes the transaction by the numbers, and doesn't make eye contact again. The conversation that might have been is gone.",
                  "rewards": [],
                  "sets_flag": null,
                  "clears_flag": null,
                  "morale_delta": -1,
                  "loyalty_delta": 0,
                  "hull_delta": 0,
                  "resonance_delta": 0
                }
              }
            }
          ]
        }
      ],
      "notes": "Introductory event — designed to land early and establish that the Nexus is visible and known to some. The 'prior captain' rumor thread (flag: heard_prior_captain_rumor) should be picked up in a later Dead Zone ghost transmission. The Concord flag (concord_flagged_nexus_sighting_yura) can nudge Concord rep slightly at next territory entry.",

      "setup_text": "Waypoint Kessler is Concord Assembly infrastructure at its most mundane: a gray ring station staffed by gray-uniformed clerks processing gray manifests. A compliance officer intercepts you at the docking queue — young, ambitious, clipboard in hand. 'Cargo declaration, please. We're running a sector-wide audit this cycle.'",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "The officer wants to inspect your hold. You have legitimate cargo, probably. The question is whether there's anything in the margins of your manifest that doesn't fully account for what's aboard.",
          "options": [
            {
              "label": "Comply fully. Open the hold.",

              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,

              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Clean and efficient. The officer finds nothing to flag, stamps your manifest with slightly more warmth than Concord officers usually manage, and waves you through. 'Safe travels, Captain.' You leave having paid standard docking fees and nothing else — and with a logged clean record that will matter at the next Assembly checkpoint.",

                    {
                      "type": "rep_up",

              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "skill",
              "check_target": "diplomat",
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Your Diplomat frames it as 'administrative efficiency' rather than a bribe — a meaningful distinction in Concord territory. The officer accepts a flat fee, stamps the manifest unreviewed, and finds somewhere else to be. Everyone maintains plausible deniability.",
                  "rewards": [
                    {
                      "type": "credits",

                  "sets_flag": null,
                  "clears_flag": null,

                  "narrative": "The officer won't skip the inspection, but your Diplomat does manage to limit it to surface cargo only. The hold's lower compartments go unchecked. Cost: standard fee plus a gratuity.",
                  "rewards": [
                    {
                      "type": "credits",

                  "clears_flag": null,
                  "morale_delta": 0,

                "failure": {
                  "level": "failure",
                  "narrative": "The offer lands wrong — this officer is one of the ones who actually believes in the job. She flags the attempt, runs a full inspection out of principle, and charges you the maximum standard docking fee. 'I'll be noting this interaction,' she says.",
                  "rewards": [

      "setup_text": "Freeport Anesh is a Drifter Compact station — no uniforms, no inspections, loud music from three different sources, and a board near the airlock where people post what they need and what they have. You're resupplying when you notice a cluster of people near the board. Not reading it — arguing about something posted there. A handwritten notice: PASSAGE NEEDED. WILL WORK. CANNOT PAY. THREE OF US.",
      "steps": [
        {
          "step_number": 1,
          "condition": null,
          "setup_text": "The three people in question are easy to spot — they look like they've been on Anesh longer than they intended. A family unit, maybe, or something close to it: an older man with an engineer's calluses, a younger woman with the quiet watchfulness of someone who's spent time in faction military, and a teenager who keeps checking the station exits. They need out of this sector. The argument around the board is about whether anyone should take the liability.",
          "options": [
            {
              "label": "Offer them passage in exchange for work.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "The older man — Dorin — shakes your hand before you've finished the offer. Engineer's hands. The woman, Sera, takes longer; she watches your face for something she either finds or decides to trust. The teenager (no name offered yet) just follows. They're aboard within the hour. Dorin immediately starts cataloguing what's wrong with your propulsion system, which turns out to be quite a lot.",
                  "rewards": [
                    {
                      "type": "crew_recruit",
                      "value": "dorin_engineer",
                      "description": "Dorin joins as Engineer — skilled specialist"
                    },
                    {
                      "type": "crew_recruit",
                      "value": "sera_soldier",
                      "description": "Sera joins as Soldier — skilled specialist"

                  ],
                  "sets_flag": "took_passage_seekers_anesh",
                  "clears_flag": null,
                  "morale_delta": 4,
                  "loyalty_delta": 3,
                  "hull_delta": 0,
                  "resonance_delta": 0
                },
                "partial": null,
                "failure": null
              }
            },
            {
              "label": "Ask what they're running from first.",
              "requires_crew_role": null,
              "requires_module": null,
              "requires_rep": null,
              "requires_flag": null,
              "requires_ability": null,
              "locked_hint": "",
              "check_type": "none",
              "check_target": null,
              "difficulty": "medium",
              "outcomes": {
                "success": {
                  "level": "success",
                  "narrative": "Sera answers before Dorin can stop her: Vreth Dominion territory dispute, a homestead that no longer exists, and a Dominion patrol that's been following them for six weeks. 'We're not wanted criminals,' she says. 'We're inconvenient witnesses.' Dorin looks at his hands. The teenager stares at the floor. Now you know, and knowing means deciding.",

              "requires_flag": null,
              "requires_ability": null,

              "outcomes": {

                  "level": "success",
                  "narrative": "You resupply and leave. The three of them are still at the board when you disengage from the dock. Your crew doesn't say anything. Two of them watch the station out of the viewport until it falls behind the fog of war. Nobody brought it up. Nobody had to.",

          "condition": {
            "prior_step": 1,
            "outcome": "success"
          },
          "setup_text": "Now that you know — or now that you've agreed to take them — there's the question of the Vreth patrol. Sera says they're two sectors back. Dorin says one. The teenager says she counted the drive signatures and it's closer to eighteen hours.",
          "options": [
            {
