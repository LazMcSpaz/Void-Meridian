  return {
    active: false,
    ship: createShipState(),
    crew: [],
    captain: createCaptainState(),
    map: null,
    factions: createFactionReputation(),
    credits: 0,
    fuel: 10,
    depth: 0,
    runFlags: [],
    seenEventIds: [],
    log: [],
    currentNodeId: null,
    activeEvent: null,
    activeEventStep: 0,
    lastStepOutcomes: {},
    activeCombat: null,
  };
}

// ─── Game State (singleton) ─────────────────────────────────────

const GameState = {
  meta: createMetaState(),
  run: createRunState(),
  screen: 'title', // title | reconstruction | map | event | combat | trade | derelict | gameOver | ending

  // ─── Persistence ────────────────────────────────────────────

  save() {
    try {
      const data = {
        version: 1,
        meta: this.meta,
        run: this.run,
        screen: this.screen,
      };
      localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    } catch (e) {
      console.warn('Save failed:', e);
    }
  },

  load() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return false;
      const data = JSON.parse(raw);
      if (data.version !== 1) return false;
      this.meta = { ...createMetaState(), ...data.meta };
      this.run = { ...createRunState(), ...data.run };
      this.screen = data.screen || 'title';
      return true;
    } catch (e) {
      console.warn('Load failed:', e);
      return false;
    }
  },

  clearSave() {
    localStorage.removeItem(SAVE_KEY);
  },

  // ─── Run Lifecycle ──────────────────────────────────────────

  startNewRun() {
    this.run = createRunState();
    this.run.active = true;
    this.meta.totalRuns++;
    this.screen = 'reconstruction';
  },

  endRun(deathCause) {
    this.run.active = false;
    const summary = {
      depth: this.run.depth,
      crewLost: this.run.log.filter(e => e.type === 'crew_death').length,
      creditsEarned: this.run.credits,
      cause: deathCause || 'unknown',
    };
    this.meta.runHistory.push(summary);

    // Move surviving crew to graveyard for potential resurrection
    for (const member of this.run.crew) {
      if (!member.dead) {
        this.meta.crewGraveyard.push({
          id: member.id,
          name: member.name,
          role: member.role,
          personality: member.personality,
          runDepth: this.run.depth,
        });
      }
    }

    this.save();
  },

  // ─── Log ────────────────────────────────────────────────────

  addLog(type, message, data) {
    this.run.log.push({
      type,
      message,
      depth: this.run.depth,
      timestamp: Date.now(),
      ...data,
    });
  },

  // ─── Helpers ────────────────────────────────────────────────

  getResonanceTier() {
    const r = this.meta.resonance;
    if (r >= 500) return 5;
    if (r >= 200) return 4;
    if (r >= 80)  return 3;
    if (r >= 30)  return 2;
    if (r >= 10)  return 1;
    return 0;
  },

  getSalvagePoints() {
    const base = 8;
    return base + this.getResonanceTier() * 2 + Math.min(this.meta.totalRuns, 4);
  },
};

/* Void Meridian — Content Registry */

const Registry = {
  weapons: new Map(),
  modules: new Map(),
  crewArchetypes: new Map(),
  crewNamed: new Map(),
  enemies: new Map(),

  // Event library (loaded from events_master.json format)
  eventLibrary: [],
  eventIndex: {},
  eventsByType: {},

  // ─── Loading ────────────────────────────────────────────────

  loadAll() {
    // Merge both data sources — vm_ files take priority, base files fill gaps
    this._loadMerged('weapons',
      typeof DATA_VM_WEAPONS !== 'undefined' ? DATA_VM_WEAPONS : [],
      typeof DATA_WEAPONS !== 'undefined' ? DATA_WEAPONS : []);
    this._loadMerged('modules',
      typeof DATA_VM_MODULES !== 'undefined' ? DATA_VM_MODULES : [],
      typeof DATA_MODULES !== 'undefined' ? DATA_MODULES : []);
    this._loadCrewData(this._mergeArrays(
      typeof DATA_VM_CREW !== 'undefined' ? DATA_VM_CREW : [],
      typeof DATA_CREW !== 'undefined' ? DATA_CREW : []));
    this._loadMap('enemies', typeof DATA_ENEMIES !== 'undefined' ? DATA_ENEMIES : []);

    // If no weapons loaded from data files, use built-in starter set
    if (this.weapons.size === 0) this._loadFallbackWeapons();
    if (this.modules.size === 0) this._loadFallbackModules();

    this._loadEventLibrary();
    console.log(`Registry loaded: ${this.weapons.size} weapons, ${this.modules.size} modules, ${this.crewArchetypes.size} archetypes, ${this.crewNamed.size} named crew, ${this.eventLibrary.length} events, ${this.enemies.size} enemies`);
  },

  _mergeArrays(primary, secondary) {
    if (!Array.isArray(primary)) primary = [];
    if (!Array.isArray(secondary)) secondary = [];
    const seen = new Set(primary.filter(i => i && i.id).map(i => i.id));
    const merged = [...primary];
    for (const item of secondary) {
      if (item && item.id && !seen.has(item.id)) merged.push(item);
    }
    return merged;
  },

  _loadMerged(key, primary, secondary) {
    this[key].clear();
    const merged = this._mergeArrays(primary, secondary);
    for (const item of merged) {
      if (item && item.id) this[key].set(item.id, item);
    }
  },

  _loadMap(key, arr) {
    this[key].clear();
    if (!Array.isArray(arr)) return;
    for (const item of arr) {
      if (item && item.id) {
        this[key].set(item.id, item);
      }
    }
  },

  _loadCrewData(arr) {
    this.crewArchetypes.clear();
    this.crewNamed.clear();
    if (!Array.isArray(arr)) return;
    for (const item of arr) {
      if (!item || !item.id) continue;
      // Named characters have a fixed name and first_encounter object
      if (item.first_encounter || (item.name && !item.name_pool)) {
        this.crewNamed.set(item.id, item);
      } else {
        this.crewArchetypes.set(item.id, item);
      }
    }
  },

  _loadEventLibrary() {
    this.eventLibrary = [];
    this.eventIndex = {};
    this.eventsByType = {};

    const master = typeof DATA_EVENTS_MASTER !== 'undefined' ? DATA_EVENTS_MASTER : null;
    if (!master) return;

    const events = master.events || [];
    this.eventLibrary = events;

    for (const evt of events) {
      this.eventIndex[evt.id] = evt;
      const type = evt.node_type;
      if (!this.eventsByType[type]) this.eventsByType[type] = [];
      this.eventsByType[type].push(evt);
    }
  },

  // ─── Lookups ────────────────────────────────────────────────

  getWeapon(id)   { return this.weapons.get(id) || null; },
  getModule(id)   { return this.modules.get(id) || null; },
  getCrew(id)     { return this.crewNamed.get(id) || this.crewArchetypes.get(id) || null; },
  getEvent(id)    { return this.eventIndex[id] || null; },
  getEnemy(id)    { return this.enemies.get(id) || null; },

  getAllWeapons()      { return [...this.weapons.values()]; },
  getAllModules()      { return [...this.modules.values()]; },
  getAllCrewNamed()    { return [...this.crewNamed.values()]; },
  getAllCrewArchetypes() { return [...this.crewArchetypes.values()]; },
  getAllEvents()       { return this.eventLibrary; },
  getAllEnemies()      { return [...this.enemies.values()]; },

  // ─── Tier / Source Queries ────────────────────────────────────

  getWeaponsByTier(tier)  { return this.getAllWeapons().filter(w => w.tier === tier); },
  getModulesByTier(tier)  { return this.getAllModules().filter(m => m.tier === tier); },

  getWeaponsBySource(sourceKey) {
    return this.getAllWeapons().filter(w => w.gating && w.gating.source && w.gating.source.includes(sourceKey));
  },

  getModulesBySource(sourceKey) {
    return this.getAllModules().filter(m => m.source && m.source.includes(sourceKey));
  },

  getArchetypeByRole(role) {
    for (const arch of this.crewArchetypes.values()) {
      if (arch.role === role) return arch;
    }
    return null;
  },

  // ─── Gating System ───────────────────────────────────────────

  checkGating(requires) {
    if (!requires || requires.length === 0) return true;

    for (const req of requires) {
      switch (req.type) {
        case 'resonance_total':
          if (GameState.meta.resonance < (req.minimum || 0)) return false;
          break;

        case 'faction_reputation': {
          const rep = GameState.run.factions[req.faction] || 0;
          if (rep < (req.minimum || 0)) return false;
          break;
        }

        case 'milestone_flag':
          if (!GameState.meta.milestoneFlags.includes(req.flag)) return false;
          break;
      }
    }

    return true;
  },

  // ─── Event Selection ──────────────────────────────────────────

  getEligibleEvents(nodeType, factionContext) {
    const candidates = this.eventsByType[nodeType] || [];
    const run = GameState.run;
    const meta = GameState.meta;
    const maxDepth = run.map ? run.map.maxDepth : 30;
    const depthZone = this._getDepthZone(run.depth, maxDepth);

    return candidates.filter(evt => {
      if (evt.faction_context && evt.faction_context !== 'none') {
        if (evt.faction_context !== (factionContext || 'none')) return false;
      }
      if (evt.depth_zone && evt.depth_zone !== 'any') {
        if (evt.depth_zone !== depthZone) return false;
      }
      if ((evt.min_resonance || 0) > meta.resonance) return false;
      if (run.seenEventIds && run.seenEventIds.includes(evt.id)) return false;
      return true;
    });

/* Void Meridian — Star Map Generator */

const MapGenerator = {
  // Node types matching events_master.json schema
  NODE_TYPES: [
    'combat', 'trade_post', 'derelict', 'planet_exploration',
    'nexus_anomaly', 'anomalous_signal', 'faction_territory', 'dead_zone',
  ],

  // Weights for node type distribution by depth zone
  ZONE_WEIGHTS: {
    early: {
      combat: 2, trade_post: 3, derelict: 2, planet_exploration: 1,
      anomalous_signal: 2, dead_zone: 1, faction_territory: 2,
      nexus_anomaly: 0,
    },
    mid: {
      combat: 3, trade_post: 2, derelict: 3, planet_exploration: 2,
      anomalous_signal: 2, dead_zone: 2, faction_territory: 2,
      nexus_anomaly: 1,
    },
    late: {
      combat: 4, trade_post: 1, derelict: 2, planet_exploration: 2,
      anomalous_signal: 2, dead_zone: 3, faction_territory: 1,
      nexus_anomaly: 2,
    },
  },

  // Faction assignment for faction_territory nodes
  FACTIONS: ['concord_assembly', 'vreth_dominion', 'drifter_compact', 'remnant_collective'],

  generate() {
    const totalDepth = 15 + Math.floor(Math.random() * 16); // 15-30
    const nodes = [];
    const edges = [];
    let nodeId = 0;

    // Start node
    nodes.push({
      id: 'node_0',
      depth: 0,
      type: 'trade_post',
      revealed: true,
      visited: false,
      x: 0.5,
      faction: null,
    });

    // Generate layers
    for (let d = 1; d <= totalDepth; d++) {
      const nodesInLayer = 1 + Math.floor(Math.random() * 4); // 1-4 nodes per layer
      const zone = d <= totalDepth * 0.3 ? 'early' : d <= totalDepth * 0.7 ? 'mid' : 'late';

      for (let i = 0; i < nodesInLayer; i++) {
        nodeId++;
        const type = this._pickNodeType(zone);
        const faction = type === 'faction_territory'
          ? this.FACTIONS[Math.floor(Math.random() * this.FACTIONS.length)]
          : null;

        nodes.push({
          id: `node_${nodeId}`,
          depth: d,
          type,
          revealed: false,
          visited: false,
          x: (i + 0.5) / nodesInLayer,
          faction,
        });
      }
    }

    // Generate edges (connect each node to 1-3 nodes in the next layer)
    for (let d = 0; d < totalDepth; d++) {
      const currentLayer = nodes.filter(n => n.depth === d);
      const nextLayer = nodes.filter(n => n.depth === d + 1);
      if (nextLayer.length === 0) continue;

      for (const node of currentLayer) {
        const sorted = [...nextLayer].sort((a, b) =>
          Math.abs(a.x - node.x) - Math.abs(b.x - node.x)
        );

        const connectCount = 1 + Math.floor(Math.random() * 3); // 1-3 connections
        for (let i = 0; i < Math.min(connectCount, sorted.length); i++) {
          edges.push({ from: node.id, to: sorted[i].id });
        }
      }

      // Ensure every next-layer node has at least one incoming edge
      for (const next of nextLayer) {
        const hasIncoming = edges.some(e => e.to === next.id);
        if (!hasIncoming) {
          const nearest = currentLayer.reduce((best, n) =>
            Math.abs(n.x - next.x) < Math.abs(best.x - next.x) ? n : best
          , currentLayer[0]);
          edges.push({ from: nearest.id, to: next.id });
        }
      }
    }

    // Propagate faction influence: nodes leading into faction territory
    // get a nearbyFaction hint so the player sees it 1-2 jumps ahead
    for (const node of nodes) {
      if (node.faction) continue; // already faction territory
      // Check nodes reachable within 1-2 edges forward
      const directTargets = edges.filter(e => e.from === node.id).map(e => e.to);
      const twoHopTargets = [];
      for (const tid of directTargets) {
        for (const e2 of edges) {
          if (e2.from === tid) twoHopTargets.push(e2.to);
        }
      }
      const nearby = [...directTargets, ...twoHopTargets];
      for (const targetId of nearby) {
        const target = nodes.find(n => n.id === targetId);
        if (target && target.faction) {
          node.nearbyFaction = target.faction;
          break;
        }
      }
    }

    return {
      nodes,
      edges,
      maxDepth: totalDepth,
      startNodeId: 'node_0',
    };
  },

  _pickNodeType(zone) {
    const weights = this.ZONE_WEIGHTS[zone] || this.ZONE_WEIGHTS.mid;
    const entries = Object.entries(weights);
    const totalWeight = entries.reduce((sum, [, w]) => sum + w, 0);
    let roll = Math.random() * totalWeight;

    for (const [type, weight] of entries) {
      roll -= weight;
      if (roll <= 0) return type;
    }
    return 'combat';
  },
};

/* Void Meridian — Event Resolution Engine (events_master.json schema) */

const EventEngine = {

  // ─── Trigger an event at a map node ────────────────────────

  triggerNodeEvent(node) {
    const factionContext = node.faction || 'none';
    const eligible = Registry.getEligibleEvents(node.type, factionContext);

    let event;
    if (eligible.length > 0) {
      event = eligible[Math.floor(Math.random() * eligible.length)];
      event = JSON.parse(JSON.stringify(event)); // deep clone
    } else {
      // Relaxed fallback: ignore depth_zone
      const relaxed = (Registry.eventsByType[node.type] || []).filter(evt => {
        if (evt.faction_context && evt.faction_context !== 'none' && evt.faction_context !== factionContext) return false;
        if ((evt.min_resonance || 0) > GameState.meta.resonance) return false;
        if (GameState.run.seenEventIds && GameState.run.seenEventIds.includes(evt.id)) return false;
        return true;
      });
      if (relaxed.length > 0) {
        event = JSON.parse(JSON.stringify(relaxed[Math.floor(Math.random() * relaxed.length)]));
      } else {
        event = this._placeholderEvent();
      }
    }

    GameState.run.activeEvent = event;
    GameState.run.activeEventStep = 0;
    GameState.run.lastStepOutcomes = {};
    GameState.addLog('event', event.setup_text ? event.setup_text.substring(0, 80) + '...' : `Entered ${node.type} node`);
    GameState.screen = 'event';
    Tabs.activeTab = 'event';
    GameState.save();
    Game.render();
  },

  // ─── Check if an option is available ──────────────────────

  checkOptionAvailability(option) {
    const run = GameState.run;

    if (option.requires_crew_role) {
      if (!run.crew.some(c => !c.dead && c.role === option.requires_crew_role)) {
        return { available: false, hint: option.locked_hint || '' };
      }
    }

    if (option.requires_module) {
      const reqMod = option.requires_module;
      if (!run.ship.equippedModules.some(m => m.id === reqMod || m.id === 'mod_' + reqMod)) {
        return { available: false, hint: option.locked_hint || '' };
      }
    }

    if (option.requires_rep) {
      const faction = option.requires_rep.faction;
      const minTier = parseInt(option.requires_rep.min_tier, 10);
      const currentRep = run.factions[faction] || 0;
      if (currentRep < minTier) {
        return { available: false, hint: option.locked_hint || '' };
      }
    }

    if (option.requires_flag) {
      if (!run.runFlags.includes(option.requires_flag)) {
        return { available: false, hint: option.locked_hint || '' };
      }
    }

    if (option.requires_ability) {
      if (!run.captain.abilities.includes(option.requires_ability)) {
        return { available: false, hint: option.locked_hint || '' };
      }
    }

    return { available: true, hint: '' };
  },

  // ─── Resolve a check for a chosen option ──────────────────

  resolveCheck(option) {
    if (!option.check_type || option.check_type === 'none') {
      return 'success';
    }

    const run = GameState.run;
    let skillValue = 0;

    if (option.check_type === 'skill' && option.check_target) {
      // Find best crew member with the matching role
      const crewMember = run.crew.find(c => !c.dead && c.role === option.check_target);
      if (crewMember) {
        // Base role bonus: having the right role gives 30 points
        skillValue = 30;
        // Morale modifier: (morale - 50) * 0.2 gives -10 to +10
        skillValue += (crewMember.morale - 50) * 0.2;
      } else {
        // No matching role crew — attempt with lower skill
        skillValue = 10;
      }
    } else if (option.check_type === 'stat' && option.check_target) {
      // Captain ability check
      const statVal = run.captain.stats[option.check_target] || 0;
      skillValue = statVal * 10;
      // Average morale modifier
      const livingCrew = run.crew.filter(c => !c.dead);
      if (livingCrew.length > 0) {
        const avgMorale = livingCrew.reduce((sum, c) => sum + c.morale, 0) / livingCrew.length;
        skillValue += (avgMorale - 50) * 0.2;
      }
    }

    skillValue = Math.max(0, Math.min(100, skillValue));

    const thresholds = {
      easy:     { success: 40, partial: 20 },
      medium:   { success: 60, partial: 35 },
      hard:     { success: 75, partial: 50 },
      critical: { success: 90, partial: 70 },
    };

    const t = thresholds[option.difficulty] || thresholds.medium;
    const roll = Math.random() * 100;

    if (roll + skillValue >= t.success) return 'success';
    if (roll + skillValue >= t.partial) return 'partial';
    return 'failure';
  },

  // ─── Select option and resolve outcome ────────────────────

  selectOption(optionIndex) {
    const event = GameState.run.activeEvent;
    if (!event) return;

    const stepIdx = GameState.run.activeEventStep;
    const step = this._getCurrentStep(event, stepIdx);
    if (!step || !step.options || optionIndex >= step.options.length) return;

    const option = step.options[optionIndex];
    const outcomeLevel = this.resolveCheck(option);
    const outcome = option.outcomes[outcomeLevel];

    if (!outcome) {
      // Fallback to success if outcome level missing
      const fallback = option.outcomes.success;
      if (fallback) {
        this._applyOutcome(fallback, event);
      }
    } else {
      this._applyOutcome(outcome, event);
    }

    // Store step outcome for conditional branching
    GameState.run.lastStepOutcomes[step.step_number] = outcomeLevel;

    // Store for UI display
    event._lastOutcome = outcome || option.outcomes.success;
    event._lastOutcomeLevel = outcomeLevel;
    event._lastChoiceLabel = option.label;
    event._resolved = true;

    GameState.addLog('event', `Chose: "${option.label}" → ${outcomeLevel}`);
    GameState.save();
    Game.render();
  },

  // ─── Advance to next step or finish event ─────────────────

  advanceEvent() {
    const event = GameState.run.activeEvent;
    if (!event) return;

    event._resolved = false;
    event._lastOutcome = null;

    const nextStepIdx = GameState.run.activeEventStep + 1;

    // Look for the next valid step
    for (let i = nextStepIdx; i < event.steps.length; i++) {
      const step = event.steps[i];
      if (this._stepConditionMet(step)) {
        GameState.run.activeEventStep = i;
        GameState.save();
        Game.render();
        return;
      }
    }

    // No more steps — finish event
    this._finishEvent(event);
  },

  _stepConditionMet(step) {
    if (!step.condition) return true;
    const priorOutcome = GameState.run.lastStepOutcomes[step.condition.prior_step];
    return priorOutcome === step.condition.outcome;
  },

  _getCurrentStep(event, stepIdx) {
    if (!event.steps || stepIdx >= event.steps.length) return null;
    return event.steps[stepIdx];
  },

  _finishEvent(event) {
    // Mark event as seen
    if (event.id && event.id !== 'PLACEHOLDER') {
      if (!GameState.run.seenEventIds.includes(event.id)) {
        GameState.run.seenEventIds.push(event.id);
      }
    }

    GameState.run.activeEvent = null;
    GameState.run.activeEventStep = 0;
    GameState.run.lastStepOutcomes = {};

    // Crew tick after event
    CrewEngine.tickAfterEvent();

    // Ship visual update
    ShipEngine.updateVisualStage();

    // Check for hull death
    if (GameState.run.ship.hull <= 0) {
      GameState.endRun('hull_destroyed');
      NexusEngine.accumulateRunResonance();
      GameState.screen = 'gameOver';
    } else {
      Tabs.switchTo('map');
    }

    GameState.save();
    Game.render();
  },

  // ─── Apply outcome effects ────────────────────────────────

  _applyOutcome(outcome, event) {
    // 1. Hull delta
    if (outcome.hull_delta) {
      const ship = GameState.run.ship;
      ship.hull = Math.max(1, Math.min(ship.maxHull, ship.hull + outcome.hull_delta));
    }

    // 2. Morale delta (applied to all crew)
    if (outcome.morale_delta) {
      CrewEngine.adjustMoraleAll(outcome.morale_delta);
    }

    // 3. Loyalty delta (applied to all crew for non-assignment events)
    if (outcome.loyalty_delta) {
      for (const member of GameState.run.crew) {
        if (!member.dead) {
          CrewEngine.adjustLoyalty(member, outcome.loyalty_delta);
        }
      }
    }

    // 4. Resonance delta (meta-currency, persists across runs)
    if (outcome.resonance_delta) {
      GameState.meta.resonance += outcome.resonance_delta;
    }

    // 5. Process rewards array
    if (outcome.rewards && outcome.rewards.length > 0) {
      for (const reward of outcome.rewards) {
        this._processReward(reward);
      }
    }

    // 6. Set flag
    if (outcome.sets_flag) {
      if (!GameState.run.runFlags.includes(outcome.sets_flag)) {
        GameState.run.runFlags.push(outcome.sets_flag);
      }
    }

    // 7. Additional flags
    if (outcome.additional_flags) {
      for (const flag of outcome.additional_flags) {
        if (!GameState.run.runFlags.includes(flag)) {
          GameState.run.runFlags.push(flag);
        }
      }
    }

    // 8. Clear flag
    if (outcome.clears_flag) {
      const idx = GameState.run.runFlags.indexOf(outcome.clears_flag);
      if (idx !== -1) GameState.run.runFlags.splice(idx, 1);
    }
  },

  _processReward(reward) {
    const run = GameState.run;
    switch (reward.type) {
      case 'credits':
        run.credits = Math.max(0, run.credits + reward.value);
        if (reward.value > 0) GameState.addLog('event', `Gained ${reward.value} credits`);
        else if (reward.value < 0) GameState.addLog('event', `Lost ${Math.abs(reward.value)} credits`);
        break;

      case 'fuel':
        run.fuel = Math.max(0, run.fuel + reward.value);
        if (reward.value > 0) GameState.addLog('event', `Gained ${reward.value} fuel`);
        else if (reward.value < 0) GameState.addLog('event', `Lost ${Math.abs(reward.value)} fuel`);
        break;

      case 'hull_repair':
        ShipEngine.repair(reward.value);
        GameState.addLog('event', `Hull repaired by ${reward.value}%`);
        break;

      case 'module':
        ShipEngine.addModule(reward.value);
        break;

      case 'crew_recruit':
        CrewEngine.addCrewFromTemplate(reward.value);
        break;

      case 'rep_up':
        EconomyEngine.adjustReputation(reward.value, 1);
        break;

      case 'rep_down':
        EconomyEngine.adjustReputation(reward.value, -1);
        break;

      case 'resonance':
        GameState.meta.resonance += reward.value;
        GameState.addLog('nexus', `Resonance +${reward.value}`);
        break;

      case 'run_flag':
        if (!run.runFlags.includes(reward.value)) {
          run.runFlags.push(reward.value);
        }
        break;

      case 'cargo':
        run.ship.cargo.push(reward.value);
        GameState.addLog('event', `Acquired cargo: ${reward.description || reward.value}`);
        break;

      case 'lore_fragment':
        GameState.addLog('discovery', reward.description || `Lore fragment: ${reward.value}`);
        break;

      case 'unlock_hint':
        // Dev/internal only — no player-facing effect
        break;
    }
  },

  // ─── Placeholder event for empty pools ────────────────────

  _placeholderEvent() {
    return {
      id: 'PLACEHOLDER',
      node_type: 'unknown',
      setup_text: 'Nothing of interest here. You move on.',
      steps: [{
        step_number: 1,
        condition: null,
        setup_text: '',
        options: [{
          label: 'Continue.',
          check_type: 'none',
          requires_crew_role: null,
          requires_module: null,
          requires_rep: null,
          requires_flag: null,
          requires_ability: null,
          locked_hint: '',
          difficulty: 'medium',
          outcomes: {
            success: {
              level: 'success',
              narrative: 'You continue on.',
              rewards: [],
              sets_flag: null,
              clears_flag: null,
              morale_delta: 0,
              loyalty_delta: 0,
              hull_delta: 0,
              resonance_delta: 0,
            },
            partial: null,
            failure: null,
          },
        }],
      }],
    };
  },
};

/* Void Meridian — Combat Engine */

const CombatEngine = {

  // Weapon type vs shield interaction
  SHIELD_INTERACTION: {
    ballistic:    'partial',   // shields reduce by 1
    energy:       'blocked',   // fully blocked by shields
    missile:      'bypass',    // ignores shields
    emp:          'bypass',    // affects systems, not hull
    nexus_energy: 'bypass',    // ignores shields
  },

  startCombat(enemyId) {
    const enemyDef = Registry.getEnemy(enemyId);
    const enemy = enemyDef ? { ...enemyDef } : this._genericEnemy();

    GameState.run.activeCombat = {
      enemy: {
        name: enemy.name || 'Unknown Vessel',
        emoji: enemy.emoji || '🚀',
        hull: enemy.hull || 50,
        maxHull: enemy.hull || 50,
        shields: enemy.shields || 0,
        maxShields: enemy.shields || 0,
        attack: enemy.attack || 8,
        defense: enemy.defense || 3,
        faction: enemy.faction || null,
        lootTable: enemy.lootTable || [],
        scanned: false,
        weakness: enemy.weakness || null,
      },
      turn: 1,
      playerTurn: true,
      playerDefending: false,
      playerEvading: false,
      lastAction: null,
      fled: false,
    };

    GameState.screen = 'combat';
    GameState.addLog('combat', `Engaged ${enemy.name || 'hostile vessel'}`);
    Game.render();
  },

  playerAction(station) {
    const combat = GameState.run.activeCombat;
    if (!combat || !combat.playerTurn) return;

    combat.playerDefending = false;
    combat.playerEvading = false;

    switch (station) {
      case 'weapons':
        this._playerAttack(combat);
        break;
      case 'defense':
        this._playerDefend(combat);
        break;
      case 'helm':
        this._playerEvade(combat);
        break;
      case 'engineering':
        this._playerRepair(combat);
        break;
      case 'tactical':
        this._playerScan(combat);
        break;
    }

    if (combat.enemy.hull <= 0) {
      this._victory(combat);
      return;
    }

    combat.playerTurn = false;
    Game.render();

    setTimeout(() => {
      this._enemyTurn(combat);
      combat.turn++;
      combat.playerTurn = true;

      if (GameState.run.ship.hull <= 0) {
        this._playerDestroyed();
        return;
      }

      Game.render();
    }, 800);
  },

  _playerAttack(combat) {
    const ship = GameState.run.ship;
    const weapons = ship.equippedWeapons;

    if (!weapons || weapons.length === 0) {
      // Fallback: base system attack
      const weaponLevel = ship.baseSystems.weapons.level;
      const gunner = GameState.run.crew.find(c => !c.dead && c.role === 'soldier');
      const crewBonus = gunner ? 2 : 0;
      const baseDamage = 5 + weaponLevel * 3 + crewBonus;
      const damage = Math.round(baseDamage * (0.7 + Math.random() * 0.6));
      const actualDamage = Math.max(1, damage - combat.enemy.defense);
      combat.enemy.hull = Math.max(0, combat.enemy.hull - actualDamage);
      combat.lastAction = `Weapons fire! ${actualDamage} damage dealt.`;
      return;
    }

    // Fire all equipped weapons
    let totalDamage = 0;
    const actions = [];

    for (const wpn of weapons) {
      // Check ammo
      if (typeof wpn._currentAmmo === 'number' && wpn._currentAmmo <= 0) {
        actions.push(`${wpn.name}: no ammo`);
        continue;
      }

      let damage = wpn.stats.damage || 2;

      // Crew bonus from soldier
      const gunner = GameState.run.crew.find(c => !c.dead && c.role === 'soldier');
      if (gunner) damage += 1;

      // Roll variance
      damage = Math.round(damage * (0.7 + Math.random() * 0.6));

      // Shield interaction
      const shieldMode = this.SHIELD_INTERACTION[wpn.type] || 'partial';
      if (combat.enemy.shields > 0) {
        if (shieldMode === 'blocked') {
          const shieldDmg = Math.min(damage, combat.enemy.shields);
          combat.enemy.shields = Math.max(0, combat.enemy.shields - shieldDmg);
          actions.push(`${wpn.name}: ${shieldDmg} to shields`);
          if (typeof wpn._currentAmmo === 'number') wpn._currentAmmo--;
          continue;
        } else if (shieldMode === 'partial') {
          damage = Math.max(1, damage - 1);
        }
      }

      const actualDamage = Math.max(1, damage - combat.enemy.defense);
      totalDamage += actualDamage;
      actions.push(`${wpn.name}: ${actualDamage} dmg`);

      if (typeof wpn._currentAmmo === 'number') wpn._currentAmmo--;
    }

    combat.enemy.hull = Math.max(0, combat.enemy.hull - totalDamage);
    combat.lastAction = actions.join(' | ');

    if (combat.enemy.scanned && combat.enemy.weakness === 'weapons') {
      const bonus = Math.round(totalDamage * 0.3);
      combat.enemy.hull = Math.max(0, combat.enemy.hull - bonus);
      combat.lastAction += ` Weakness +${bonus}!`;
    }
  },

  _playerDefend(combat) {
    combat.playerDefending = true;
    combat.lastAction = 'Shields raised. Incoming damage will be reduced.';
  },

  _playerEvade(combat) {
    combat.playerEvading = true;
    const pilot = GameState.run.crew.find(c => !c.dead && c.role === 'pilot');
    const chance = pilot ? 60 : 35;
    combat.lastAction = `Evasive maneuver. ${chance}% dodge chance.`;
  },

  _playerRepair(combat) {
    const engineer = GameState.run.crew.find(c => !c.dead && c.role === 'engineer');
    const repair = engineer ? 12 : 6;
    ShipEngine.repair(repair);
    combat.lastAction = `Emergency repairs: +${repair} hull.`;
  },

  _playerScan(combat) {
    if (combat.enemy.scanned) {
      combat.lastAction = 'Enemy already scanned.';
      return;
    }
    const scientist = GameState.run.crew.find(c => !c.dead && c.role === 'scientist');
    const techie = GameState.run.crew.find(c => !c.dead && c.role === 'technician');
    const successChance = (scientist || techie) ? 80 : 50;

    if (Math.random() * 100 < successChance) {
      combat.enemy.scanned = true;
      const weaknesses = ['weapons', 'shields', 'engines'];
      combat.enemy.weakness = weaknesses[Math.floor(Math.random() * weaknesses.length)];
      combat.lastAction = `Scan complete. Weakness: ${combat.enemy.weakness}.`;
    } else {
      combat.lastAction = 'Scan inconclusive. Try again next turn.';
    }
  },

  _enemyTurn(combat) {
    if (combat.playerEvading) {
      const pilot = GameState.run.crew.find(c => !c.dead && c.role === 'pilot');
      const dodgeChance = pilot ? 0.6 : 0.35;
      if (Math.random() < dodgeChance) {
        combat.lastAction = 'Enemy fires — you dodge the attack!';
        return;
      }
    }

    const baseDamage = combat.enemy.attack;
    let damage = Math.round(baseDamage * (0.6 + Math.random() * 0.8));

    if (combat.playerDefending) {
      const shieldLevel = GameState.run.ship.baseSystems.shields_armor.level;
      damage = Math.max(1, damage - shieldLevel * 2 - 3);
    }

    ShipEngine.takeDamage(damage);
    combat.lastAction = `${combat.enemy.name} attacks for ${damage} damage!`;
  },

  attemptFlee() {
    const combat = GameState.run.activeCombat;
    if (!combat) return;

    const pilot = GameState.run.crew.find(c => !c.dead && c.role === 'pilot');
    const propLevel = GameState.run.ship.baseSystems.propulsion.level;
    const fleeChance = 30 + propLevel * 8 + (pilot ? 15 : 0);

    if (Math.random() * 100 < fleeChance) {
      combat.fled = true;
      GameState.run.activeCombat = null;
      GameState.run.activeEvent = null;
      GameState.run.fuel = Math.max(0, GameState.run.fuel - 1);
      GameState.addLog('combat', 'Fled from combat.');
      GameState.screen = 'map';
      Tabs.activeTab = 'map';
      Game.render();
    } else {
      combat.lastAction = 'Failed to flee! The enemy blocks your escape.';
      combat.playerTurn = false;
      Game.render();

      setTimeout(() => {
        this._enemyTurn(combat);
        combat.turn++;
        combat.playerTurn = true;

        if (GameState.run.ship.hull <= 0) {
          this._playerDestroyed();
          return;
        }
        Game.render();
      }, 800);
    }
  },

  surrender() {
    const combat = GameState.run.activeCombat;
    if (!combat) return;

    const lost = Math.floor(GameState.run.credits * 0.5);
    GameState.run.credits -= lost;
    GameState.run.activeCombat = null;
    GameState.run.activeEvent = null;
    GameState.addLog('combat', `Surrendered. Lost ₢${lost}.`);
    GameState.screen = 'map';
    Tabs.activeTab = 'map';
    Game.render();
  },

  _victory(combat) {
    const lootCredits = 10 + Math.floor(Math.random() * 30);
    GameState.run.credits += lootCredits;

    GameState.run.activeCombat = null;
    GameState.run.activeEvent = null;
    GameState.addLog('combat', `Destroyed ${combat.enemy.name}. Looted ₢${lootCredits}.`);

    if (combat.enemy.faction) {
      EconomyEngine.adjustReputation(combat.enemy.faction, -1);
    }

    GameState.screen = 'map';
    Tabs.activeTab = 'map';
    GameState.save();
    Game.render();
  },

  _playerDestroyed() {
    GameState.endRun('ship_destroyed');
    GameState.screen = 'reconstruction';
    ReconstructionUI.start();
  },

  _genericEnemy() {
    return {
      name: 'Hostile Vessel',
      emoji: '🚀',
      hull: 40,
      shields: 0,
      attack: 7,
      defense: 2,
    };
  },
};

/* Void Meridian — Economy & Faction System */

const EconomyEngine = {
  FACTIONS: ['concord_assembly', 'vreth_dominion', 'drifter_compact', 'remnant_collective'],
  REP_MIN: -3,
  REP_MAX: 3,

  REP_LABELS: {
    3: 'Honored',
    2: 'Allied',
    1: 'Friendly',
    0: 'Neutral',
    '-1': 'Suspicious',
    '-2': 'Hostile',
    '-3': 'Nemesis',
  },

  adjustReputation(faction, delta) {
    if (!GameState.run.factions.hasOwnProperty(faction)) return;
    const current = GameState.run.factions[faction];
    GameState.run.factions[faction] = Math.max(this.REP_MIN, Math.min(this.REP_MAX, current + delta));

    const label = this.getRepLabel(faction);
    const displayName = this.getFactionDisplayName(faction);
    GameState.addLog('system', `${displayName} reputation: ${label} (${GameState.run.factions[faction] > 0 ? '+' : ''}${GameState.run.factions[faction]})`);
  },

  getFactionDisplayName(faction) {
    const names = {
      concord_assembly: 'Concord Assembly',
      vreth_dominion: 'Vreth Dominion',
      drifter_compact: 'Drifter Compact',
      remnant_collective: 'Remnant Collective',
    };
    return names[faction] || faction;
  },

  getRepLabel(faction) {
    const val = GameState.run.factions[faction] || 0;
    return this.REP_LABELS[String(val)] || 'Neutral';
  },

  getPriceModifier(faction) {
    const rep = GameState.run.factions[faction] || 0;
    // Friendly factions give discounts, hostile charge more
    return 1 - rep * 0.1; // +3 = 0.7x, -3 = 1.3x
  },

  canAfford(cost) {
    return GameState.run.credits >= cost;
  },

  spend(amount) {
    if (!this.canAfford(amount)) return false;
    GameState.run.credits -= amount;
    return true;
  },

  earn(amount) {
    GameState.run.credits += amount;
  },
};

/* Void Meridian — Crew Simulation Engine */

const CrewEngine = {
  ROLES: ['engineer', 'pilot', 'medic', 'soldier', 'technician', 'diplomat', 'scientist'],
  TRAITS: ['reckless', 'stoic', 'vocal', 'curious', 'haunted', 'pragmatic', 'idealistic'],

  // ─── Crew Generation ──────────────────────────────────────────

  generateStarterCrew(count, qualityPoints) {
    const crew = [];
    const usedRoles = new Set();

    for (let i = 0; i < count; i++) {
      let role;
      const availableRoles = this.ROLES.filter(r => !usedRoles.has(r));
      if (availableRoles.length > 0) {
        role = availableRoles[Math.floor(Math.random() * availableRoles.length)];
      } else {
        role = this.ROLES[Math.floor(Math.random() * this.ROLES.length)];
      }
      usedRoles.add(role);

      crew.push(this._createFromArchetype(role, qualityPoints));
    }
    return crew;
  },

  _createFromArchetype(role, qualityBonus) {
    const archetype = Registry.getArchetypeByRole(role);

    let name, trait, morale, loyalty, combatStats, emoji;

    if (archetype) {
      name = archetype.name_pool
        ? archetype.name_pool[Math.floor(Math.random() * archetype.name_pool.length)]
        : this._generateName();
      trait = archetype.compatible_traits
        ? archetype.compatible_traits[Math.floor(Math.random() * archetype.compatible_traits.length)]
        : this.TRAITS[Math.floor(Math.random() * this.TRAITS.length)];
      const mRange = archetype.morale_start_range || [45, 65];
      const lRange = archetype.loyalty_start_range || [30, 50];
      morale = mRange[0] + Math.floor(Math.random() * (mRange[1] - mRange[0] + 1));
      loyalty = lRange[0] + Math.floor(Math.random() * (lRange[1] - lRange[0] + 1));
      combatStats = archetype.combat_stats || { atk_modifier: 0, def_modifier: 0 };
      emoji = archetype.emoji || this._roleEmoji(role);
    } else {
      name = this._generateName();
      trait = this.TRAITS[Math.floor(Math.random() * this.TRAITS.length)];
      morale = Math.min(100, 40 + (qualityBonus || 0) * 5 + Math.floor(Math.random() * 20));
      loyalty = Math.min(100, 35 + (qualityBonus || 0) * 4 + Math.floor(Math.random() * 20));
      combatStats = { atk_modifier: 0, def_modifier: 0 };
      emoji = this._roleEmoji(role);
    }

    if (qualityBonus) {
      morale = Math.min(100, morale + qualityBonus * 3);
      loyalty = Math.min(100, loyalty + qualityBonus * 2);
    }

    return {
      id: `crew_${Date.now()}_${Math.random().toString(36).substring(2, 6)}`,
      name,
      role,
      emoji,
      trait,
      morale,
      loyalty,
      combatStats,
      conditions: [],
      relationships: [],
      dead: false,
      isNamed: false,
      namedId: null,
      secretRevealed: false,
    };
  },

  // ─── Named Character Recruitment ──────────────────────────────

  addCrewFromTemplate(crewId) {
    const named = Registry.crewNamed.get(crewId);
    if (named) return this._recruitNamed(named);

    const archetype = Registry.crewArchetypes.get(crewId);
    if (archetype) {
      const member = this._createFromArchetype(archetype.role, 0);
      GameState.run.crew.push(member);
      GameState.addLog('crew', `${member.name} (${member.role}) joined the crew.`);
      return member;
    }

    // Fallback: parse role from crewId for event-referenced recruits
    const roleMatch = crewId.match(/(engineer|pilot|medic|soldier|technician|diplomat|scientist)/);
    if (roleMatch) {
      const member = this._createFromArchetype(roleMatch[1], 0);
      member.name = this._formatRecruitName(crewId);
      GameState.run.crew.push(member);
      GameState.addLog('crew', `${member.name} (${member.role}) joined the crew.`);
      return member;
    }

    return null;
  },

  _recruitNamed(named) {
    const member = {
      id: `crew_${Date.now()}_${Math.random().toString(36).substring(2, 6)}`,
      name: named.name,
      role: named.role,
      emoji: named.emoji || this._roleEmoji(named.role),
      trait: named.trait || 'stoic',
      morale: named.morale_start || 50,
      loyalty: named.loyalty_start || 30,
      combatStats: { atk_modifier: 0, def_modifier: 0 },
      conditions: [],
      relationships: [],
      dead: false,
      isNamed: true,
      namedId: named.id,
      secretRevealed: false,
      uniquePassive: named.unique_passive || null,
      personalityDescription: named.personality_description || null,
      factionAffiliation: named.faction_affiliation || null,
    };

    GameState.run.crew.push(member);

    // Track encounter in meta state
    if (!GameState.meta.namedCrewState[named.id]) {
      GameState.meta.namedCrewState[named.id] = { encountered: true, secret_revealed: false };
    } else {
      GameState.meta.namedCrewState[named.id].encountered = true;
    }

    GameState.addLog('crew', `${member.name} (${member.role}) joined the crew.`);
    return member;
  },

  _formatRecruitName(crewId) {
    return crewId.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  },

  // ─── Morale & Loyalty ─────────────────────────────────────────

  adjustMorale(member, delta) {
    if (member.dead) return;
    member.morale = Math.max(0, Math.min(100, member.morale + delta));

    if (member.trait === 'stoic') {
      if (delta < 0) member.morale = Math.min(member.morale + Math.floor(Math.abs(delta) * 0.2), 100);
    } else if (member.trait === 'vocal') {
      this._spreadMorale(member, Math.sign(delta) * 3);
    }
  },

  adjustMoraleAll(delta) {
    for (const member of GameState.run.crew) {
      if (!member.dead) this.adjustMorale(member, delta);
    }
  },

  adjustLoyalty(member, delta) {
    if (member.dead) return;
    member.loyalty = Math.max(0, Math.min(100, member.loyalty + delta));

    // Check for secret reveal on named characters
    if (member.isNamed && member.loyalty >= 80 && !member.secretRevealed) {
      this._revealSecret(member);
    }
  },

  _revealSecret(member) {
    member.secretRevealed = true;
    const named = Registry.crewNamed.get(member.namedId);
    if (named && named.secret_loyalty_80) {
      GameState.addLog('crew', `${member.name} trusts you enough to share a secret.`);
      GameState.addLog('crew', named.secret_loyalty_80);
    }
    if (member.namedId && GameState.meta.namedCrewState[member.namedId]) {
      GameState.meta.namedCrewState[member.namedId].secret_revealed = true;
    }
  },

  _spreadMorale(source, delta) {
    for (const member of GameState.run.crew) {
      if (member.id !== source.id && !member.dead) {
        member.morale = Math.max(0, Math.min(100, member.morale + delta));
      }
    }
  },

  // ─── Crew Death ───────────────────────────────────────────────

  killCrewMember(roleOrId) {
    let member;
    if (roleOrId.startsWith('crew_')) {
      member = GameState.run.crew.find(c => c.id === roleOrId && !c.dead);
    } else {
      member = GameState.run.crew.find(c => c.role === roleOrId && !c.dead);
    }

    if (!member) return null;

    member.dead = true;
    member.conditions = ['dead'];
    GameState.addLog('crew', `${member.name} (${member.role}) was lost.`);

    if (member.isNamed && member.uniquePassive) {
      GameState.addLog('crew', `${member.name}'s final act: ${member.uniquePassive}`);
    }

    this.adjustMoraleAll(-15);

    for (const c of GameState.run.crew) {
      if (!c.dead && c.trait === 'idealistic') {
        this.adjustLoyalty(c, -10);
      }
    }

    return member;
  },

  // ─── Post-Event Tick ──────────────────────────────────────────

  tickAfterEvent() {
    for (const member of GameState.run.crew) {
      if (member.dead) continue;

      if (member.morale > 55) member.morale -= 1;
      else if (member.morale < 45) member.morale += 1;

      if (member.loyalty <= 15) {
        this._checkMutiny(member);
      } else if (member.loyalty <= 30) {
        this._checkRefusal(member);
      }
    }
  },

  _checkRefusal(member) {
    if (Math.random() < 0.2) {
      GameState.addLog('system', `${member.name} is becoming unreliable. Loyalty critically low.`);
    }
  },

  _checkMutiny(member) {
    if (Math.random() < 0.1) {
      GameState.addLog('system', `${member.name} is on the verge of mutiny!`);
    }
  },

  // ─── Helpers ──────────────────────────────────────────────────

  _roleEmoji(role) {
    const emojis = {
      engineer: '🔧', pilot: '🚀', medic: '💉',
      soldier: '⚔', technician: '💻', diplomat: '🤝', scientist: '🔬',
    };
    return emojis[role] || '👤';
  },

  _generateName() {
    const first = ['Kira', 'Jace', 'Nev', 'Thane', 'Cass', 'Rook', 'Lyra', 'Dex', 'Senna', 'Vex',
                    'Kai', 'Brin', 'Zara', 'Hollis', 'Fen', 'Mira', 'Ash', 'Pax', 'Sable', 'Ren',
                    'Tove', 'Quinn', 'Wren', 'Corr', 'Haze', 'Leith', 'Nyx', 'Orin', 'Vale', 'Yael'];
    const last = ['Vance', 'Drex', 'Corva', 'Ashby', 'Kael', 'Morrow', 'Strand', 'Vex', 'Thorne', 'Cade',
                  'Holt', 'Reis', 'Voss', 'Kade', 'Cross', 'Lorn', 'Shade', 'Peak', 'Drift', 'Stone'];
    return first[Math.floor(Math.random() * first.length)] + ' ' +
           last[Math.floor(Math.random() * last.length)];
  },
};

/* Void Meridian — Ship Management Engine */

const ShipEngine = {
  HULL_THRESHOLDS: [
    { percent: 75, message: 'Hull integrity dropping. Minor breaches detected.' },
    { percent: 50, message: 'Significant hull damage. Non-essential sections venting.' },
    { percent: 25, message: 'Critical hull damage! Emergency bulkheads engaged.' },
    { percent: 10, message: 'Hull failure imminent. Abandon ship protocols available.' },
  ],

  SYSTEM_NAMES: {
    weapons: 'Weapons',
    propulsion: 'Propulsion',
    sensors: 'Sensors',
    shields_armor: 'Shields / Armor',
    cargo_hold: 'Cargo Hold',
    crew_quarters: 'Crew Quarters',
  },

  // ─── Hull Damage ──────────────────────────────────────────────

  takeDamage(amount) {
    const ship = GameState.run.ship;
    const prevPercent = (ship.hull / ship.maxHull) * 100;
    ship.hull = Math.max(0, ship.hull - amount);
    const newPercent = (ship.hull / ship.maxHull) * 100;

    for (const threshold of this.HULL_THRESHOLDS) {
      if (prevPercent > threshold.percent && newPercent <= threshold.percent) {
        GameState.addLog('system', threshold.message);

        if (threshold.percent <= 50 && Math.random() < 0.4) {
          const systems = Object.keys(ship.baseSystems);
          const target = systems[Math.floor(Math.random() * systems.length)];
          this.damageSystem(target);
        }
      }
    }

    if (ship.hull <= 0) {
      GameState.addLog('system', 'The Meridian breaks apart.');
    }
  },

  repair(amount) {
    const ship = GameState.run.ship;
    ship.hull = Math.min(ship.maxHull, ship.hull + amount);
  },

  damageSystem(systemName) {
    const ship = GameState.run.ship;
    const sys = ship.baseSystems[systemName];
    if (!sys || sys.damaged) return;

    sys.damaged = true;
    const displayName = this.SYSTEM_NAMES[systemName] || systemName;
    GameState.addLog('system', `${displayName} system damaged!`);
  },

  repairSystem(systemName) {
    const ship = GameState.run.ship;
    const sys = ship.baseSystems[systemName];
    if (!sys || !sys.damaged) return;

    sys.damaged = false;
    const displayName = this.SYSTEM_NAMES[systemName] || systemName;
    GameState.addLog('system', `${displayName} system repaired.`);
  },

  // ─── Weapon Management ────────────────────────────────────────

  equipWeapon(weaponId) {
    const wpn = Registry.getWeapon(weaponId);
    if (!wpn) return false;

    if (wpn.gating && wpn.gating.requires && !Registry.checkGating(wpn.gating.requires)) {
      return false;
    }

    const instance = JSON.parse(JSON.stringify(wpn));
    if (typeof instance.stats.ammo === 'number') {
      instance._currentAmmo = instance.stats.ammo;
    }
    if (instance.stats.special_charges > 0) {
      instance._currentCharges = instance.stats.special_charges;
    }

    GameState.run.ship.equippedWeapons.push(instance);
    GameState.addLog('system', `Weapon equipped: ${wpn.name}`);

    if (wpn.nexus_flavor) {
      Overlay.showNexusTransmission(wpn.nexus_flavor, 3500);
    }

    return true;
  },

  unequipWeapon(weaponId) {
    const weapons = GameState.run.ship.equippedWeapons;
    const idx = weapons.findIndex(w => w.id === weaponId);
    if (idx === -1) return false;

    const wpn = weapons[idx];
    if (wpn.irremovable) {
      GameState.addLog('system', `${wpn.name} cannot be removed. [⬡]`);
      return false;
    }

    weapons.splice(idx, 1);
    GameState.addLog('system', `Weapon removed: ${wpn.name}`);
    return true;
  },

  getEquippedWeapons() {
    return GameState.run.ship.equippedWeapons;
  },

  // ─── Module Management ────────────────────────────────────────

  addModule(moduleId) {
    const mod = Registry.getModule(moduleId);
    if (!mod) return false;

    if (mod.gating_requires && !Registry.checkGating(mod.gating_requires)) {
      return false;
    }

    const instance = JSON.parse(JSON.stringify(mod));
    GameState.run.ship.equippedModules.push(instance);
    GameState.addLog('system', `Module installed: ${mod.name} → ${this.SYSTEM_NAMES[mod.slots_onto] || mod.slots_onto}`);

    return true;
  },

  removeModule(moduleId) {
    const modules = GameState.run.ship.equippedModules;
    const idx = modules.findIndex(m => m.id === moduleId);
    if (idx === -1) return false;

    const mod = modules[idx];
    if (mod.irremovable) {
      GameState.addLog('system', `${mod.name} cannot be removed. [⬡]`);
      return false;
    }

    modules.splice(idx, 1);
    GameState.addLog('system', `Module removed: ${mod.name}`);
    return true;
  },

  hasModule(moduleId) {
    return GameState.run.ship.equippedModules.some(m => m.id === moduleId);
  },

  getModulesForSystem(systemKey) {
    return GameState.run.ship.equippedModules.filter(m => m.slots_onto === systemKey);
  },

  // ─── Nexus Integration ────────────────────────────────────────

  nexusForceIntegrate(moduleId) {
    const mod = Registry.getModule(moduleId);
    if (!mod) return;

    const instance = JSON.parse(JSON.stringify(mod));
    instance.irremovable = true;
    instance.nexus_integrated = true;

    GameState.run.ship.equippedModules.push(instance);
    GameState.run.ship.nexusIntegrations.push(moduleId);
    GameState.addLog('nexus', `The Nexus has integrated something into your ship: ${mod.name}`);

    Overlay.showNexusTransmission('i improved you. you are welcome.', 3000);
  },

  tickNexusResonance() {
    for (const mod of GameState.run.ship.equippedModules) {
      if (!mod.nexus_integrated) continue;
      const match = (mod.effect || '').match(/[Gg]enerates?\s+(\d+)\s+[Rr]esonance/);
      if (match) {
        const amount = parseInt(match[1], 10);
        GameState.meta.resonance += amount;
      }
    }
  },

  // ─── Visual Stage ─────────────────────────────────────────────

  updateVisualStage() {
    const ship = GameState.run.ship;
    const depth = GameState.run.depth;
    const maxDepth = GameState.run.map ? GameState.run.map.maxDepth : 30;
    const progress = depth / maxDepth;

    if (progress >= 0.66 && ship.visualStage < 3) {
      ship.visualStage = 3;
      GameState.addLog('system', 'The Meridian has changed. You can feel it.');
    } else if (progress >= 0.33 && ship.visualStage < 2) {
      ship.visualStage = 2;
      GameState.addLog('system', 'The ship looks different now. Battle-worn, but stronger.');
    }
  },
};

/* Void Meridian — Meta-Progression / Nexus System */

const NexusEngine = {
  RESONANCE_PER_DEPTH: 1,
  RESONANCE_PER_KILL: 0.5,
  RESONANCE_PER_DISCOVERY: 2,

  accumulateRunResonance() {
    const run = GameState.run;
    let gained = 0;

    gained += run.depth * this.RESONANCE_PER_DEPTH;
    gained += run.log.filter(e => e.type === 'combat').length * this.RESONANCE_PER_KILL;
    gained += run.log.filter(e => e.type === 'discovery').length * this.RESONANCE_PER_DISCOVERY;

    // Bonus for reaching deep sectors
    if (run.depth >= 20) gained += 5;
    if (run.depth >= 25) gained += 10;

    GameState.meta.resonance += Math.round(gained);
    return Math.round(gained);
  },

  getAvailableUnlocks() {
    const resonance = GameState.meta.resonance;
    const unlocked = new Set(GameState.meta.unlockedItems);

    // Define unlock tiers
    const allUnlocks = [
      { id: 'extra_crew_slot', cost: 15, label: 'Extra Crew Berth', desc: 'Start with room for one additional crew member' },
      { id: 'scanner_upgrade', cost: 20, label: 'Improved Scanners', desc: 'Reveal more of the star map at start' },
      { id: 'salvage_bonus', cost: 25, label: 'Salvage Efficiency', desc: '+2 salvage points at reconstruction' },
      { id: 'hull_reinforcement', cost: 30, label: 'Hull Reinforcement', desc: '+20 starting hull integrity' },
      { id: 'nexus_whispers', cost: 50, label: 'Nexus Whispers', desc: 'Occasionally sense danger before arriving at a node' },
      { id: 'crew_resurrection', cost: 40, label: 'Crew Recall', desc: 'Resurrect one crew member from a previous run at reconstruction' },
      { id: 'faction_memory', cost: 60, label: 'Faction Memory', desc: 'Carry partial faction reputation between runs' },
      { id: 'nexus_integration', cost: 80, label: 'Nexus Integration', desc: 'The Nexus may forcibly install modules on your ship' },
      { id: 'wound_sense', cost: 100, label: 'The Wound Beckons', desc: 'Begin to sense the location of The Wound on the star map' },
    ];

    return allUnlocks.filter(u => !unlocked.has(u.id) && resonance >= u.cost);
  },

  purchaseUnlock(unlockId) {
    const available = this.getAvailableUnlocks();
    const unlock = available.find(u => u.id === unlockId);
    if (!unlock) return false;

    GameState.meta.resonance -= unlock.cost;
    GameState.meta.unlockedItems.push(unlockId);
    GameState.addLog('nexus', `Unlocked: ${unlock.label}`);
    GameState.save();
    return true;
  },

  hasUnlock(id) {
    return GameState.meta.unlockedItems.includes(id);
  },

  checkMilestone(flag) {
    if (!GameState.meta.milestoneFlags.includes(flag)) {
      GameState.meta.milestoneFlags.push(flag);
      GameState.save();
      return true;
    }
    return false;
  },

  checkTrueEnding() {
    const required = ['wound_reached', 'wound_entered', 'nexus_confronted'];
    return required.every(f => GameState.meta.milestoneFlags.includes(f));
  },

  getTransmission() {
    const tier = GameState.getResonanceTier();
    const transmissions = {
      0: [
        'static.',
        '... ... ...',
        'signal lost.',
      ],
      1: [
        'you are not the first.',
        'the pattern... persists.',
        'i remember shapes.',
      ],
      2: [
        'i remember the shape of you.',
        'each reconstruction teaches me.',
        'you die differently each time. interesting.',
      ],
      3: [
        'the pattern persists. you persist.',
        'we are connected now. do you feel it?',
        'your crew — they do not understand what you are becoming.',
      ],
      4: [
        'each death teaches me more about what you are.',
        'the wound in space calls to us both.',
        'i am not sure which of us is the artifact anymore.',
      ],
      5: [
        'we are becoming something neither of us intended.',
        'the wound calls. can you hear it now?',
        'this is the last shape. i am certain of it.',
      ],
    };

    const pool = transmissions[tier] || transmissions[0];
    return pool[Math.floor(Math.random() * pool.length)];
  },
};

/* Void Meridian — Overlay: Nexus transmissions, modals */

const Overlay = {
  _queue: [],
  _active: false,

  showNexusTransmission(text, durationMs) {
    this._queue.push({ type: 'nexus', text, duration: durationMs || 4000 });
    if (!this._active) this._processQueue();
  },

  _processQueue() {
    if (this._queue.length === 0) {
      this._active = false;
      return;
    }
    this._active = true;
    const item = this._queue.shift();

    if (item.type === 'nexus') {
      this._showNexus(item.text, item.duration);
    }
  },

  _showNexus(text, duration) {
    let el = document.getElementById('nexus-overlay');
    if (!el) {
      el = document.createElement('div');
      el.id = 'nexus-overlay';
      el.className = 'nexus-overlay';
      el.innerHTML = '<div class="nexus-text"></div>';
      document.body.appendChild(el);
    }

    el.querySelector('.nexus-text').textContent = text;

    // Fade in
    requestAnimationFrame(() => {
      el.classList.add('active');
    });

    // Hold, then fade out
    setTimeout(() => {
      el.classList.remove('active');
      setTimeout(() => this._processQueue(), 600);
    }, duration);
  },
};
